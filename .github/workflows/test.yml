name: test

on:
  push:
    branches: [main]
  pull_request:

# 同一 PR / branch への連続 push で古い run を cancel して重複実行を避ける（第15回 C15-05）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build dist
        run: npm run build
