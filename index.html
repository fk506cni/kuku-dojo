                        : "w-20 h-12 rounded-full bg-slate-300 relative transition-colors focus:outline-none focus:ring-4 focus:ring-slate-300"
                    }
                  >
                    <span
                      className={
                        settings.effectsEnabled
                          ? "absolute top-1 right-1 w-10 h-10 bg-white rounded-full shadow transition-all"
                          : "absolute top-1 left-1 w-10 h-10 bg-white rounded-full shadow transition-all"
                      }
                      aria-hidden="true"
                    />
                  </button>
                  </div>
                </div>

                <div>
                  <div className="flex items-center justify-between">
                    <label htmlFor="kuku-volume-input" className="text-xl font-bold text-slate-700">
                      おんりょう
                    </label>
                    <span className="text-slate-500 text-sm">{Math.round(draftVolume * 100)}%</span>
                  </div>
                  <input
                    id="kuku-volume-input"
                    type="range"
                    min="0"
                    max="1"
                    step="0.05"
                    value={draftVolume}
                    onChange={(e) => setDraftVolume(Number(e.target.value))}
                    onPointerUp={commitVolume}
                    onKeyUp={commitVolume}
                    onBlur={commitVolume}
                    className="w-full mt-2 h-3 accent-indigo-600 disabled:opacity-40"
                    disabled={!settings.soundEnabled}
                  />
                </div>

              </div>

              {/* v1.1.0 §4.2.1 案 C: 「くわしい せってい」プログレッシブ開示。
                  基本 3 項目（おと / エフェクト / おんりょう）の下にトグルで wrongWeightBoost と
                  slowThresholdSec を開閉。Tab フォーカスは常にボタン自身に入り、aria-expanded で
                  折りたたみ状態を伝える。開閉状態は localStorage に保存しない (C13-04)。 */}
              <div className="mt-6 pt-5 border-t border-slate-200">
                <button
                  type="button"
                  aria-expanded={advancedOpen}
                  aria-controls="kuku-advanced-settings"
                  onClick={() => setAdvancedOpen((v) => !v)}
                  className="w-full min-h-[48px] px-4 py-3 bg-white text-slate-700 font-bold rounded-xl border-2 border-slate-300 hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-indigo-300 flex items-center justify-between"
                >
                  <span>くわしい せってい</span>
                  <span aria-hidden="true" className="text-slate-500">{advancedOpen ? "▲" : "▼"}</span>
                </button>

                {advancedOpen && (
                  <div id="kuku-advanced-settings" className="mt-4 space-y-5">
                    {/* にがて もんだいの でやすさ (SPEC §3.2 wrongWeightBoost 3 段プリセット)。
                        role="radiogroup" で選択肢の排他性をスクリーンリーダに伝える。 */}
                    <div>
                      <div className="flex items-center justify-between gap-2">
                        <span id="kuku-boost-label" className="text-xl font-bold text-slate-700">
                          にがて もんだい
                        </span>
                        <span className="text-slate-500 text-sm">でやすさ</span>
                      </div>
                      <p className="mt-1 text-sm text-slate-500 leading-relaxed">
                        まちがえた もんだいの でやすさを かえるよ
                      </p>
                      {/* C11-05: WAI-ARIA radiogroup pattern に沿い Arrow キー切替 + roving tabindex。
                          - Tab で「選択中ボタン」のみにフォーカスが入る (非選択は tabindex=-1 でスキップ)
                          - ArrowLeft/Up = 前、ArrowRight/Down = 次、Home/End で端へ
                          - Arrow キーで切替時は即座に選択変更 + フォーカス移動 (APG 既定) */}
                      <div
                        role="radiogroup"
                        aria-labelledby="kuku-boost-label"
                        className="mt-2 grid grid-cols-3 gap-2"
                        onKeyDown={(e) => {
                          const values = WRONG_WEIGHT_BOOST_PRESETS.map((p) => p.value);
                          const cur = values.indexOf(settings.wrongWeightBoost);
                          const idx = cur === -1 ? 1 : cur; // プリセット外 (C11-06 予防) なら「ふつう」起点
                          let nextIdx = null;
                          if (e.key === "ArrowLeft" || e.key === "ArrowUp") nextIdx = (idx - 1 + values.length) % values.length;
                          else if (e.key === "ArrowRight" || e.key === "ArrowDown") nextIdx = (idx + 1) % values.length;
                          else if (e.key === "Home") nextIdx = 0;
                          else if (e.key === "End") nextIdx = values.length - 1;
                          if (nextIdx === null) return;
                          e.preventDefault();
                          const nextValue = values[nextIdx];
                          onUpdate((prev) => ({ ...prev, wrongWeightBoost: nextValue }));
                          // フォーカスを次の radio に移す (roving tabindex)
                          const group = e.currentTarget;
                          const buttons = group.querySelectorAll('[role="radio"]');
                          if (buttons[nextIdx]) buttons[nextIdx].focus();
                        }}
                      >
                        {WRONG_WEIGHT_BOOST_PRESETS.map((preset) => {
                          const selected = settings.wrongWeightBoost === preset.value;
                          return (
                            <button
                              key={preset.value}
                              type="button"
                              role="radio"
                              aria-checked={selected}
                              aria-label={preset.label + ": " + preset.desc}
                              tabIndex={selected ? 0 : -1}
                              onClick={() => onUpdate((prev) => ({ ...prev, wrongWeightBoost: preset.value }))}
                              className={
                                selected
                                  ? "min-h-[56px] px-2 py-3 rounded-xl bg-indigo-600 text-white font-bold border-2 border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                                  : "min-h-[56px] px-2 py-3 rounded-xl bg-white text-slate-700 font-bold border-2 border-slate-300 hover:bg-indigo-50 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                              }
                            >
                              {preset.label}
                            </button>
                          );
                        })}
                      </div>
                    </div>

                    {/* じかんもくひょう (v1.1.0 §8.8 slowThresholdSec 4 段プリセット)。
                        「たつじん 5 秒」は到達時のミント背景可視化のみで、未達でもペナルティは発生しない
                        （SPEC §8.8.1 (5)）。保護者が押し付けないよう Release Notes / README で明記済み。 */}
                    <div>
                      <div className="flex items-center justify-between gap-2">
                        <span id="kuku-slow-label" className="text-xl font-bold text-slate-700">
                          じかんもくひょう
                        </span>
                        <span className="text-slate-500 text-sm">はやさ</span>
                      </div>
                      <p className="mt-1 text-sm text-slate-500 leading-relaxed">
                        これより はやく こたえられたら「とうたつ」だよ
                      </p>
                      <div
                        role="radiogroup"
                        aria-labelledby="kuku-slow-label"
                        className="mt-2 grid grid-cols-4 gap-2"
                        onKeyDown={(e) => {
                          const values = SLOW_THRESHOLD_PRESETS.map((p) => p.value);
                          const cur = values.indexOf(settings.slowThresholdSec);
                          const idx = cur === -1 ? 1 : cur; // プリセット外なら「ふつう」起点
                          let nextIdx = null;
                          if (e.key === "ArrowLeft" || e.key === "ArrowUp") nextIdx = (idx - 1 + values.length) % values.length;
                          else if (e.key === "ArrowRight" || e.key === "ArrowDown") nextIdx = (idx + 1) % values.length;
                          else if (e.key === "Home") nextIdx = 0;
                          else if (e.key === "End") nextIdx = values.length - 1;
                          if (nextIdx === null) return;
                          e.preventDefault();
                          const nextValue = values[nextIdx];
                          onUpdate((prev) => ({ ...prev, slowThresholdSec: nextValue }));
                          const group = e.currentTarget;
                          const buttons = group.querySelectorAll('[role="radio"]');
                          if (buttons[nextIdx]) buttons[nextIdx].focus();
                        }}
                      >
                        {SLOW_THRESHOLD_PRESETS.map((preset) => {
                          const selected = settings.slowThresholdSec === preset.value;
                          return (
                            <button
                              key={preset.value}
                              type="button"
                              role="radio"
                              aria-checked={selected}
                              aria-label={preset.label + " (" + preset.value + "びょう): " + preset.desc}
                              tabIndex={selected ? 0 : -1}
                              onClick={() => onUpdate((prev) => ({ ...prev, slowThresholdSec: preset.value }))}
                              className={
                                selected
                                  ? "min-h-[56px] px-2 py-3 rounded-xl bg-indigo-600 text-white font-bold border-2 border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                                  : "min-h-[56px] px-2 py-3 rounded-xl bg-white text-slate-700 font-bold border-2 border-slate-300 hover:bg-indigo-50 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                              }
                            >
                              {preset.label}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}
              </div>

              <button
                type="button"
                onClick={onClose}
                className="w-full mt-6 min-h-[48px] px-4 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-300"
              >
                とじる
              </button>

              <div className="mt-6 pt-5 border-t border-slate-200">
                <button
                  type="button"
                  onClick={onRequestDelete}
                  className="w-full min-h-[48px] px-4 py-3 bg-white text-rose-700 font-bold rounded-xl border-2 border-rose-300 hover:bg-rose-50 focus:outline-none focus:ring-4 focus:ring-rose-300"
                >
                  アカウントを さくじょ

              </div>
            </div>

        );

      /**
       * アカウント削除の確認ダイアログ。role="alertdialog" でスクリーンリーダに重大性を伝える。
       * Escape / 「やめる」でキャンセル、「けす」で onConfirm を呼ぶ。
       * @param {Object} props

       * @param {number} props.avatarIndex - 削除対象の識別性を上げるため絵文字を併記 (C05-15)

       * @param {() => void} props.onConfirm
       * @param {React.RefObject<Element|null>} props.previousFocusRef - トリガ要素の焦点復帰先 (C05-03)

      function DeleteConfirmModal({ accountName, avatarIndex, onCancel, onConfirm, previousFocusRef }) {
        const modalRef = useRef(null);

        return (
          <div

              </div>
              <div className="mt-6 flex gap-3">
                <button
                  type="button"
                  onClick={onCancel}

      /**
       * ホーム画面。段選択・問題数調整・はじめる / せいせき / ログアウト / 設定・削除の導線を持つ。
       * 段選択と問題数は AppContext に保存し、QuizScreen (Step 5) が読み取る (prompts.md Step 4)。
       * アバターは account.avatarIndex を表示する。くくちゃんマスコットは Step 7 で MascotCharacter に差し替え (C04-18)。
       */
      function HomeScreen() {
        const {
          account,
          selectedDans,
          setSelectedDans,
          totalQuestions,
          setTotalQuestions,
          settings,
          updateSettings,
          logout,
          removeAccount,
        } = useContext(AppContext);
        const [showSettings, setShowSettings] = useState(false);
        const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
        // モーダル閉じた後の焦点復帰先をトリガ側で捕捉する (C05-03)
        const settingsPrevFocusRef = useRef(null);
        const deletePrevFocusRef = useRef(null);

        // App の Navigation Guard が発火するまでの過渡フレームでは account が null になりうる (C04-05)。
        // null ガードで防御して HomeScreen 自体は落ちないようにする。
        if (!account) return null;

        const toggleDan = (dan) => {
          if (selectedDans.indexOf(dan) !== -1) {
            setSelectedDans(selectedDans.filter((d) => d !== dan));
          } else {
            setSelectedDans(selectedDans.concat(dan).sort((a, b) => a - b));
          }
        };
        const selectAllDans = () => setSelectedDans(DAN_LIST.slice());
        // 段選択が 0 のときは「はじめる」を無効化。エンジン側の fallback とは別に UI でも弾く (SPEC §3.1 二重防御)。
        const canStart = selectedDans.length > 0;

        const handleStart = () => {
          if (canStart) window.location.hash = "#/quiz";
        };
        const handleStats = () => {
          window.location.hash = "#/stats";
        };
        const handleLogout = () => {
          logout();
          // SPEC §4.1: 戻るボタンで前画面に戻るべきでない遷移は replace を使う。
          // ハッシュ直接代入 (= pushState 相当) だと Navigation Guard も追随で replace を呼び重複する (C05-08)。
          window.location.replace("#/login");
        };
        const handleDeleteConfirmed = () => {
          removeAccount();
          setShowDeleteConfirm(false);
          setShowSettings(false);

                <span className="text-5xl leading-none" aria-hidden="true">

                <h1 className="text-2xl md:text-3xl font-bold text-indigo-700 truncate">
                  {account.name}さん、こんにちは！
                </h1>
              </div>
              <div className="flex gap-2 shrink-0">
                <button
                  type="button"
                  onClick={handleLogout}
                  className="min-h-[48px] px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 focus:outline-none focus:ring-4 focus:ring-slate-300"
                >
                  ログアウト
                </button>
                <button
                  type="button"
                  onClick={() => {
                    // 閉じた後に歯車ボタンへ焦点を戻すため現焦点を保存 (C05-03)
                    settingsPrevFocusRef.current = document.activeElement;
                    setShowSettings(true);
                  }}
                  aria-label="せってい"
                  className="min-h-[48px] min-w-[48px] px-3 py-2 bg-slate-100 text-slate-700 text-2xl rounded-xl hover:bg-slate-200 focus:outline-none focus:ring-4 focus:ring-slate-300"
                >
                  <span aria-hidden="true">⚙</span>
                </button>
              </div>
            </header>

            <section
              className="mt-6 w-full max-w-3xl bg-white/80 backdrop-blur rounded-3xl shadow-lg border border-indigo-100 p-6"
              aria-labelledby="kuku-dan-legend"
            >
              <h2 id="kuku-dan-legend" className="text-xl font-bold text-slate-700">
                どのだんを れんしゅうする？
              </h2>
              <div className="mt-4 grid grid-cols-3 sm:grid-cols-9 gap-2 sm:gap-3" role="group" aria-labelledby="kuku-dan-legend">
                {DAN_LIST.map((dan) => {
                  const selected = selectedDans.indexOf(dan) !== -1;
                  return (
                    <button
                      key={dan}
                      type="button"
                      onClick={() => toggleDan(dan)}
                      aria-pressed={selected}
                      className={
                        selected
                          ? "min-h-[64px] text-xl font-bold rounded-2xl border-4 border-indigo-500 bg-indigo-500 text-white shadow-md focus:outline-none focus:ring-4 focus:ring-indigo-300"
                          : "min-h-[64px] text-xl font-bold rounded-2xl border-2 border-slate-300 bg-white text-slate-700 hover:bg-indigo-50 focus:outline-none focus:ring-4 focus:ring-indigo-300"
                      }
                    >
                      {dan}のだん
                    </button>
                  );
                })}
              </div>
              <button
                type="button"
                onClick={selectAllDans}
                className="mt-4 w-full min-h-[48px] px-4 py-3 bg-indigo-100 text-indigo-700 text-lg font-bold rounded-xl border-2 border-indigo-200 hover:bg-indigo-200 focus:outline-none focus:ring-4 focus:ring-indigo-300"
              >
                ぜんぶ
              </button>
              {!canStart && (
                // C10-14: 初回 render で !canStart===true で到達した経路 (ログイン直後 / 再入直後) でも SR が読み上げるよう
                //        role="alert" に aria-live="assertive" を併用する。条件付きレンダのため true→false→true で
                //        DOM 出し入れが起こる運用も残し、いずれの SR 実装でも読み上げられる冗長性を確保する。
                <p className="mt-3 text-rose-600 text-base font-bold text-center" role="alert" aria-live="assertive">だんを ひとつ いじょう えらんでね</p>
              )}
            </section>

            <section
              className="mt-6 w-full max-w-3xl bg-white/80 backdrop-blur rounded-3xl shadow-lg border border-indigo-100 p-6"
              aria-labelledby="kuku-count-legend"
            >
              <h2 id="kuku-count-legend" className="text-xl font-bold text-slate-700">
                なんもん やる？
              </h2>
              <div className="mt-4 text-center">
                <span className="text-7xl font-bold text-indigo-700 tabular-nums">{totalQuestions}</span>
                <span className="text-2xl text-slate-600 ml-2">もん</span>
              </div>
              <div className="mt-3 flex items-center gap-3">
                <span className="text-sm text-slate-500 w-6 text-right">{QUESTION_COUNT_MIN}</span>
                <input
                  type="range"
                  min={QUESTION_COUNT_MIN}
                  max={QUESTION_COUNT_MAX}
                  step="1"
                  value={totalQuestions}
                  onChange={(e) => setTotalQuestions(Number(e.target.value))}
                  className="flex-1 h-3 accent-indigo-600"
                  aria-label="もんだいの かず"
                  aria-valuemin={QUESTION_COUNT_MIN}
                  aria-valuemax={QUESTION_COUNT_MAX}
                  aria-valuenow={totalQuestions}
                />
                <span className="text-sm text-slate-500 w-6">{QUESTION_COUNT_MAX}</span>
              </div>
            </section>

            <section className="mt-8 w-full max-w-3xl flex flex-col items-center gap-3">
              <button
                type="button"
                onClick={handleStart}
                disabled={!canStart}
                className={
                  canStart
                    ? "w-full md:w-96 min-h-[72px] px-10 py-5 bg-indigo-600 text-white text-3xl font-bold rounded-2xl shadow-lg hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-300"
                    : "w-full md:w-96 min-h-[72px] px-10 py-5 bg-slate-300 text-white text-3xl font-bold rounded-2xl cursor-not-allowed"
                }
              >
                はじめる
              </button>
              <button
                type="button"
                onClick={handleStats}
                className="w-full md:w-96 min-h-[56px] px-8 py-4 bg-white text-indigo-700 text-xl font-bold rounded-2xl border-2 border-indigo-300 hover:bg-indigo-50 focus:outline-none focus:ring-4 focus:ring-indigo-300"
              >
                せいせき
              </button>
            </section>

            {showSettings && (
              <SettingsModal
                settings={settings}
                onUpdate={updateSettings}
                onClose={() => setShowSettings(false)}
                onRequestDelete={() => {
                  // 削除確認閉じた後に「アカウントを さくじょ」ボタンへ焦点を戻す (C05-03)
                  deletePrevFocusRef.current = document.activeElement;
                  setShowDeleteConfirm(true);
                }}
                previousFocusRef={settingsPrevFocusRef}

            {showDeleteConfirm && (
              <DeleteConfirmModal
                accountName={account.name}
                avatarIndex={account.avatarIndex}
                onCancel={() => setShowDeleteConfirm(false)}

                previousFocusRef={deletePrevFocusRef}
              />
            )}
          </main>
        );
      }

      // ── screens: QuizScreen ──────────────────────────────────────
      // 参照: SPEC.md §3.1 / §3.2 / §4.3 / §5.0 / prompts.md Step 5

      const ANSWER_MAX_LENGTH = 2;        // 9×9=81 なので 2 桁で十分
      const CORRECT_ADVANCE_MS = 800;     // 正解時の自動進行遅延 (prompts.md Step 5)
      const RECENT_BUFFER_SIZE = 2;       // recent: 直前 2 問分のキー (prompts.md Step 5)

      /**
       * 連続正解数 (combo) から祝福エフェクトのパラメータを返す純粋関数。
       *
       * Step 10 実機確認で「連続 5 問以上は演出が同一」のフィードバックを受け、
       * 7 / 10 / 15 / 20 連続の上位階層を追加して連続回数を反映するよう拡張。
       * SPEC §5.1 / §5.3 の 3連続=celebrate 1200ms / 5連続=celebrate 1500ms + 星バースト
       * の既存閾値は維持する。5 連続以上は celebrate 持続を SPEC 上限 1500ms で固定し、
       * 粒数増加のみでエスカレートさせる (個別アニメ 1.5 秒以内の PSE 規約を守るため)。
       *
       * 粒数は最大 80 で、セッション完了時の 60〜100 と同レンジに収まる (ConfettiCanvas 参照)。
       *
       * @param {number} combo
       * @returns {{particleCount:number, particleShape:"square"|"star", mascotDesired:"happy"|"celebrate", mascotCelebrateMs:number, toastMessage:string|null}}
       */
      function getComboCelebration(combo) {
        if (combo >= 20) return { particleCount: 80, particleShape: "star",   mascotDesired: "celebrate", mascotCelebrateMs: 1500, toastMessage: combo + "れんぞく でんせつ！" };
        if (combo >= 15) return { particleCount: 65, particleShape: "star",   mascotDesired: "celebrate", mascotCelebrateMs: 1500, toastMessage: combo + "れんぞく かんぺき！" };
        if (combo >= 10) return { particleCount: 55, particleShape: "star",   mascotDesired: "celebrate", mascotCelebrateMs: 1500, toastMessage: combo + "れんぞく てんさい！" };
        if (combo >= 7)  return { particleCount: 40, particleShape: "star",   mascotDesired: "celebrate", mascotCelebrateMs: 1500, toastMessage: combo + "れんぞく さいこう！" };
        if (combo >= 5)  return { particleCount: 30, particleShape: "star",   mascotDesired: "celebrate", mascotCelebrateMs: 1500, toastMessage: combo + "れんぞく すごい！" };
        if (combo >= 3)  return { particleCount: 25, particleShape: "square", mascotDesired: "celebrate", mascotCelebrateMs: 1200, toastMessage: "すごい！" };
        return             { particleCount: 15, particleShape: "square", mascotDesired: "happy",     mascotCelebrateMs: 0,    toastMessage: null };
      }

      /**
       * 中断確認ダイアログ (SPEC §4.3)。中断ボタン or ブラウザ戻るボタン両方から開く。
       * やめる を選ぶと未完了セッションは破棄して #/home に遷移 (localStorage には保存しない)。
       * @param {Object} props
       * @param {() => void} props.onCancel
       * @param {() => void} props.onConfirm
       * @param {React.RefObject<Element|null>} props.previousFocusRef
       */
      function PauseConfirmModal({ onCancel, onConfirm, previousFocusRef }) {
        const modalRef = useRef(null);
        useModalFocusTrap(modalRef, onCancel, previousFocusRef);

        return (
          <div
            ref={modalRef}
            className="fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4"
            role="alertdialog"
            aria-modal="true"
            aria-labelledby="kuku-pause-title"
            aria-describedby="kuku-pause-desc"
          >
            <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl p-6">
              <h2 id="kuku-pause-title" className="text-2xl font-bold text-indigo-700 text-center">
                ちゅうだん しますか？
              </h2>
              <p id="kuku-pause-desc" className="mt-3 text-center text-slate-700 text-lg">
                とちゅうの せいせきは のこらないよ
              </p>
              <div className="mt-6 flex gap-3">
                <button
                  type="button"
                  onClick={onCancel}
                  autoFocus
                  className="flex-1 min-h-[48px] px-4 py-3 bg-slate-200 text-slate-700 font-bold rounded-xl hover:bg-slate-300 focus:outline-none focus:ring-4 focus:ring-slate-300 transition-colors"
                >
                  つづける
                </button>
                <button
                  type="button"
                  onClick={onConfirm}
                  className="flex-1 min-h-[48px] px-4 py-3 bg-rose-600 text-white font-bold rounded-xl hover:bg-rose-700 focus:outline-none focus:ring-4 focus:ring-rose-300 transition-colors"
                >
                  やめる
                </button>
              </div>
            </div>
          </div>
        );
      }

      /**
       * 試験画面。マウント時に最初の問題を取得し、回答ごとに重みを更新しながら全問終了まで進める。
       * 完了時のみ SessionResult を Storage.saveSessions で追記する。中断時は保存しない (SPEC §4.3)。
       * 段選択・問題数は HomeScreen から Context 経由で受け取り、マウント時に snapshot で固定する。
       * 派手な視覚演出は Step 7 で追加するため、ここでは色とフェードのみ。3Hz 超点滅や強フラッシュは含まない (SPEC §5.0)。
       */
      function QuizScreen() {
        const { account, selectedDans, totalQuestions, settings } = useContext(AppContext);

        // マウント時の出題条件をスナップショット化。途中で HomeScreen の値を変えても追随しない。
        // pickQuestion 側も正規化しているが、UI 側でも二重防御 (SPEC §3.1 / C03-01)。
        const [snapshot] = useState(() => {
          const validDans = (Array.isArray(selectedDans) ? selectedDans : [])
            .filter((d) => Number.isInteger(d) && d >= 1 && d <= 9);
          const dans = validDans.length > 0
            ? Array.from(new Set(validDans)).sort((a, b) => a - b)
            : [1, 2, 3, 4, 5, 6, 7, 8, 9];
          const total = Number.isInteger(totalQuestions) && totalQuestions >= 1
            ? Math.min(81, totalQuestions)
            : 27;
          return { selectedDans: dans, totalQuestions: total };
        });

        // weights と 1 問目を同時に初期化して loadWeights の二重呼び出しを避ける。
        // 既存アカウントは createAccount 時に initialWeights を永続化済みだが、
        // 破損等で空が返った場合のフォールバックも兼ねる。
        const [quiz, setQuiz] = useState(() => {
          if (!account) return { weights: Engine.initialWeights(), currentQuestion: null };
          const loaded = Storage.loadWeights(account.id);
          const weights = Object.keys(loaded).length > 0 ? loaded : Engine.initialWeights();
          const currentQuestion = Engine.pickQuestion(snapshot.selectedDans, weights, []);
          return { weights, currentQuestion };
        });

        const [userInput, setUserInput] = useState("");
        const [questionIndex, setQuestionIndex] = useState(0);
        // feedback: null | { kind: "correct"|"wrong", userAnswer: number, correctAnswer: number }
        const [feedback, setFeedback] = useState(null);
        const [recent, setRecent] = useState([]);
        const [details, setDetails] = useState([]);
        const [correctCount, setCorrectCount] = useState(0);
        const [showPause, setShowPause] = useState(false);

        // Step 7 エフェクト state (SPEC §5.1 / prompts.md Step 7):
        // combo: 連続正解数 (不正解でリセット)
        // wrongStreak: 連続不正解数 (正解でリセット) — 3 連続で寄り添いトースト
        // mascotDesired: MascotCharacter の state prop に渡す値。実表示は component 内の celebrate ロックで制御
        // mascotCelebrateMs: celebrate 時の持続時間 (SPEC §5.3 で 3連続=1200 / 5連続=1500)。C08-06 対応。
        // confettiBurst: { id, count, shape }。id を更新すると ConfettiCanvas の useEffect が再発火
        // toast: { id, message, tone } — CelebrationToast 用。id ベースで key リセット
        const [combo, setCombo] = useState(0);
        const [wrongStreak, setWrongStreak] = useState(0);
        const [mascotDesired, setMascotDesired] = useState("thinking");
        const [mascotCelebrateMs, setMascotCelebrateMs] = useState(1500);
        const [confettiBurst, setConfettiBurst] = useState({ id: 0, count: 0, shape: "square" });
        const [toast, setToast] = useState(null);

        const pausePrevFocusRef = useRef(null);
        const sessionStartRef = useRef(Date.now());
        const questionStartRef = useRef(Date.now());
        const finishedRef = useRef(false);     // 完了・中断の二重実行防止
        const advanceTimerRef = useRef(null);  // 正解時 setTimeout のハンドル
        const toastTimerRef = useRef(null);    // トースト自動クリア用 (1.5s)
        // 高速連打での submitAnswer 二重実行を抑止 (C06-01)。
        // setFeedback の commit 前に 2 回目の Enter / タップが来ると closure の feedback===null 判定を
        // すり抜けて updateWeight / saveWeights / setDetails が二重実行されるため、同期 ref で gate する。
        // feedback が null に戻った時 (= 次問題開始) に useEffect で解除する。
        const submittingRef = useRef(false);

        const appendDigit = (d) => {
          if (feedback !== null) return;
          if (userInput.length >= ANSWER_MAX_LENGTH) return;
          // "0" で始まった入力に別数字を追加するときは先頭 0 を置き換える ("05" を避ける)。
          // "00" も意味がないので弾く。
          if (userInput === "0") {
            if (d === "0") return;
            setUserInput(d);
            return;
          }
          setUserInput(userInput + d);
        };

        const deleteDigit = () => {
          if (feedback !== null) return;
          if (userInput === "") return;
          setUserInput(userInput.slice(0, -1));
        };

        const submitAnswer = () => {
          if (submittingRef.current) return; // C06-01: 高速連打ガード
          if (finishedRef.current) return;
          if (feedback !== null) return;
          if (userInput === "") return;
          const parsed = parseInt(userInput, 10);
          if (!Number.isInteger(parsed)) return;
          if (!account) return;
          submittingRef.current = true;

          const q = quiz.currentQuestion;
          const correctAnswer = q.dan * q.multiplier;
          const isCorrect = parsed === correctAnswer;
          const responseTime = Math.max(0, Date.now() - questionStartRef.current);

          // 重み更新 → 永続化。書き込み失敗は _onStorageError バナーで可視化し遷移は継続 (C04-05)。
          // SPEC §3.2: 不正解加算 +2.0 に Settings.wrongWeightBoost (0.5/1.0/2.0) を掛ける。
          const boost = settings && typeof settings.wrongWeightBoost === "number" ? settings.wrongWeightBoost : 1.0;
          const nextWeights = Engine.updateWeight(quiz.weights, q.dan, q.multiplier, isCorrect, boost);
          Storage.saveWeights(account.id, nextWeights);

          const detail = {
            dan: q.dan,
            multiplier: q.multiplier,
            correctAnswer,
            userAnswer: parsed,
            isCorrect,
            responseTime,
          };

          setDetails((prev) => prev.concat(detail));
          if (isCorrect) setCorrectCount((prev) => prev + 1);
          setQuiz((prev) => ({ ...prev, weights: nextWeights }));
          setFeedback({ kind: isCorrect ? "correct" : "wrong", userAnswer: parsed, correctAnswer });

          // Step 7: エフェクト発火。combo / wrongStreak を同期的に計算して 3/5 閾値判定に使う
          const nextCombo = isCorrect ? combo + 1 : 0;
          const nextWrongStreak = isCorrect ? 0 : wrongStreak + 1;
          setCombo(nextCombo);
          setWrongStreak(nextWrongStreak);

          if (isCorrect) {
            SoundPlayer.playCorrect();
            // 連続回数に応じて段階的にエスカレートする (getComboCelebration 参照)。
            // SPEC §5.3 の 3連続=1200ms / 5連続以上=1500ms (上限 1.5s) は維持。
            const tier = getComboCelebration(nextCombo);
            triggerConfettiBurst(tier.particleCount, tier.particleShape);
            if (tier.mascotDesired === "celebrate") {
              setMascotCelebrateMs(tier.mascotCelebrateMs);
            }
            setMascotDesired(tier.mascotDesired);
            if (tier.toastMessage) {
              showCelebrationToast(tier.toastMessage, "celebrate");
            }
            // 800ms 後に自動で次の問題へ。latestHandlersRef 経由で最新 advance を呼び stale closure を避ける。
            advanceTimerRef.current = window.setTimeout(() => {
              advanceTimerRef.current = null;
              latestHandlersRef.current.advance();
            }, CORRECT_ADVANCE_MS);
          } else {
            SoundPlayer.playWrong();
            setMascotDesired("sad");
            // 3 連続不正解で寄り添いトースト (SPEC §5.1 / prompts.md Step 7)
            if (nextWrongStreak >= 3) {
              showCelebrationToast("いっしょに がんばろう", "encourage");
            }
          }
        };

        // 紙吹雪バーストのトリガ。id をインクリメントして ConfettiCanvas の useEffect を再発火させる
        const triggerConfettiBurst = (count, shape) => {
          setConfettiBurst((prev) => ({ id: prev.id + 1, count, shape: shape || "square" }));
        };

        // トーストを表示し 1.5s 後にクリア。連打されたときは既存タイマーをキャンセルして上書き
        const showCelebrationToast = (message, tone) => {
          setToast((prev) => ({ id: (prev && prev.id ? prev.id : 0) + 1, message, tone: tone || "celebrate" }));
          if (toastTimerRef.current) window.clearTimeout(toastTimerRef.current);
          toastTimerRef.current = window.setTimeout(() => {
            toastTimerRef.current = null;
            setToast(null);
          }, 1500);
        };

        const advance = () => {
          if (finishedRef.current) return;
          if (advanceTimerRef.current !== null) {
            clearTimeout(advanceTimerRef.current);
            advanceTimerRef.current = null;
          }
          const nextIndex = questionIndex + 1;
          if (nextIndex >= snapshot.totalQuestions) {
            // 完了遷移。advance は毎 render で再生成されるため details/correctCount は最新 render 時点の値。
            finishedRef.current = true;
            if (account) {
              // C06-09: 超高速セッションで elapsedTime===0 になるのを防ぎ最低 1 秒に丸める。
              const elapsedTime = Math.max(1, Math.round((Date.now() - sessionStartRef.current) / 1000));
              const result = {
                sessionId: Util.uuid(),
                timestamp: Date.now(),
                // C06-08: JSON.stringify で深コピーされるため .slice() は省略 (Object.freeze 契約は SPEC §2.2 に明記)。
                selectedDans: snapshot.selectedDans,
                totalQuestions: snapshot.totalQuestions,
                correctCount,
                elapsedTime,
                details,
              };
              const existing = Storage.loadSessions(account.id);
              const saved = Storage.saveSessions(account.id, existing.concat(result));
              // C07-04: saveSessions 失敗時は history.state に SessionResult を退避して
              // ResultScreen が前回セッションを誤表示しないようにする。成功時は localStorage が SSOT。
              leaveQuizWithMarker("#/result", saved ? null : { kukuSessionResult: result });
            } else {
              leaveQuizWithMarker("#/result");
            }
            return;
          }
          const q = quiz.currentQuestion;
          const qKey = q.dan + "-" + q.multiplier;
          const nextRecent = recent.concat(qKey).slice(-RECENT_BUFFER_SIZE);
          const nextQuestion = Engine.pickQuestion(snapshot.selectedDans, quiz.weights, nextRecent);
          setRecent(nextRecent);
          setQuiz((prev) => ({ ...prev, currentQuestion: nextQuestion }));
          setQuestionIndex(nextIndex);
          setUserInput("");
          setFeedback(null);
          // 次問題開始: マスコットは thinking に戻す (SPEC §5.3 状態遷移表)
          setMascotDesired("thinking");
          questionStartRef.current = Date.now();
        };

        const pressEnter = () => {
          if (finishedRef.current) return;
          if (feedback === null) {
            submitAnswer();
          } else if (feedback.kind === "wrong") {
            advance();
          }
          // feedback.kind === "correct" のときは自動進行中なので無視
        };

        const openPause = () => {
          pausePrevFocusRef.current = document.activeElement;
          setShowPause(true);
        };
        const closePause = () => setShowPause(false);
        const confirmPause = () => {
          finishedRef.current = true;
          if (advanceTimerRef.current !== null) {
            clearTimeout(advanceTimerRef.current);
            advanceTimerRef.current = null;
          }
          // C08-05: 3 連続不正解トースト等の 1.5s タイマが unmount より先に fire して
          //        dead component への setToast(null) を呼ぶ race を明示的に塞ぐ。
          //        unmount useEffect cleanup でも clear されるが、確実性のため中断経路でも明示 clear する。
          if (toastTimerRef.current !== null) {
            clearTimeout(toastTimerRef.current);
            toastTimerRef.current = null;
          }
          setShowPause(false);
          // 未完了セッションは saveSessions しない (SPEC §4.3)。
          // C06-02: バッファエントリに kukuExhausted マーカーを書いてから #/home を push して
          // 戻るボタンでの再入を抑止する。
          leaveQuizWithMarker("#/home");
        };

        // C06-02: advance 完了 / confirmPause の 2 経路で履歴を共通処理化。
        // 現バッファエントリに { kukuExhausted: true } マーカーを書き込み、
        // 次ルートを pushState + 手動 hashchange で App に通知する。
        // window.location.replace を使うと state が null 上書きされマーカーが失われるため使用しない。
        // C07-04: nextState を渡すと #/result 側エントリに kukuSessionResult を乗せられる。
        // try/catch は Safari の pushState throttle (C06-17) 対策。
        const leaveQuizWithMarker = (nextHash, nextState) => {
          try {
            window.history.replaceState({ kukuExhausted: true }, "", "#/quiz");
            window.history.pushState(nextState || null, "", nextHash);
          } catch (_) {
            // Safari の throttle などで pushState が失敗した場合は location.replace で fallback。
            window.location.replace(nextHash);
            return;
          }
          try {
            window.dispatchEvent(new Event("hashchange"));
          } catch (_) {
            // 古い環境で Event constructor が使えない場合は createEvent でフォールバック。
            const e = document.createEvent("Event");
            e.initEvent("hashchange", false, false);
            window.dispatchEvent(e);
          }
        };

        // window level の keydown / setTimeout から最新ハンドラを同期参照する (stale closure 回避)
        const latestHandlersRef = useRef({ advance, pressEnter, appendDigit, deleteDigit, submitAnswer, openPause });
        useEffect(() => {
          latestHandlersRef.current = { advance, pressEnter, appendDigit, deleteDigit, submitAnswer, openPause };
        });
        const showPauseRef = useRef(showPause);
        useEffect(() => { showPauseRef.current = showPause; });

        // feedback が null = 次問題の入力受付フェーズ → 連打ガードを解除 (C06-01)
        useEffect(() => {
          if (feedback === null) submittingRef.current = false;
        }, [feedback]);

        // 物理キーボード: 0-9 / Enter / Backspace / Esc (prompts.md Step 5)
        useEffect(() => {
          const onKey = (e) => {
            if (showPauseRef.current) return; // モーダル開閉中は useModalFocusTrap に委ねる
            // C06-05: IME 変換中の Enter / Backspace を遮断する。
            // CreateAccountModal C04-08 と同方針で isComposing / keyCode===229 を確認し、
            // 日本語 IME 合成終了直前の Enter で意図せず回答が確定しないようにする。
            if (e.isComposing || e.keyCode === 229) return;
            if (e.key === "Escape") {
              e.preventDefault();
              latestHandlersRef.current.openPause();
              return;
            }
            if (e.key === "Enter") {
              e.preventDefault();
              latestHandlersRef.current.pressEnter();
              return;
            }
            if (e.key === "Backspace") {
              e.preventDefault();
              latestHandlersRef.current.deleteDigit();
              return;
            }
            if (e.key.length === 1 && e.key >= "0" && e.key <= "9") {
              e.preventDefault();
              latestHandlersRef.current.appendDigit(e.key);
            }
          };
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, []);

        // ブラウザ戻るボタン: 中断確認ダイアログを挟む (SPEC §4.3)。
        // マウント時にダミー #/quiz エントリを積み、1 回の back をここで吸収する。
        // popstate 発火時に再度 pushState("#/quiz") して UI を保持しつつモーダルを開く。
        //
        // C06-02: 完了・中断経由で back した際は state.kukuExhausted マーカー付きの #/quiz に戻ってくる。
        // その場合は新セッションを始めずに #/home へ退避する。
        //
        // C06-17: Safari の pushState は 30 秒で 100 回の throttle 上限を持つため try/catch で握り潰す。
        useEffect(() => {
          if (window.history.state && window.history.state.kukuExhausted) {
            window.location.replace("#/home");
            return;
          }
          try { window.history.pushState(null, "", "#/quiz"); } catch (_) {}
          const onPopState = () => {
            if (finishedRef.current) return;
            // C06-04 / C06-06: モーダルが既に開いている間の追加 back は
            // バッファ補充のみに留め、pausePrevFocusRef をモーダル内ボタンで
            // 上書きしないようにする。
            if (showPauseRef.current) {
              try { window.history.pushState(null, "", "#/quiz"); } catch (_) {}
              return;
            }
            try { window.history.pushState(null, "", "#/quiz"); } catch (_) {}
            pausePrevFocusRef.current = document.activeElement;
            setShowPause(true);
          };
          window.addEventListener("popstate", onPopState);
          return () => window.removeEventListener("popstate", onPopState);
        }, []);

        // アンマウント時に保留中タイマを破棄 (画面遷移で即解除)
        useEffect(() => {
          return () => {
            if (advanceTimerRef.current !== null) {
              clearTimeout(advanceTimerRef.current);
              advanceTimerRef.current = null;
            }
            if (toastTimerRef.current !== null) {
              clearTimeout(toastTimerRef.current);
              toastTimerRef.current = null;
            }
          };
        }, []);

        // Navigation Guard 発火前の過渡フレーム対策 (C04-05)
        if (!account || !quiz.currentQuestion) return null;

        const q = quiz.currentQuestion;
        const progressPercent = Math.round((questionIndex / snapshot.totalQuestions) * 100);
        const canSubmit = feedback === null && userInput !== "";
        const canDelete = feedback === null && userInput !== "";

        return (
          <main className="min-h-screen flex flex-col px-4 py-4 max-w-2xl mx-auto w-full">
            <header className="flex items-center justify-between gap-3">
              <div className="text-slate-700 text-lg font-bold tabular-nums" aria-live="polite">
                もんだい {questionIndex + 1} / {snapshot.totalQuestions}
              </div>
              <div className="flex items-center gap-3">
                {/* マスコット: effectsEnabled=false なら component 側で null 返却 */}
                {/* C08-06: celebrateDurationMs を combo 閾値から送り分け (SPEC §5.3 準拠) */}
                <MascotCharacter state={mascotDesired} size="sm" celebrateDurationMs={mascotCelebrateMs} />
                <button
                  type="button"
                  onClick={openPause}
                  className="min-h-[48px] px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 focus:outline-none focus:ring-4 focus:ring-slate-300 transition-colors"
                >
                  ちゅうだん
                </button>
              </div>
            </header>

            {/* 進捗バー: width を transition-all (~150ms) で補間。点滅 / 強フラッシュは一切なし (SPEC §5.0) */}
            <div
              className="mt-3 h-2 bg-slate-200 rounded-full overflow-hidden"
              role="progressbar"
              aria-valuemin={0}
              aria-valuemax={snapshot.totalQuestions}
              aria-valuenow={questionIndex}
              aria-label="しんちょく"
            >
              <div
                className="h-full bg-indigo-500 transition-all"
                style={{ width: progressPercent + "%" }}
              />
            </div>

            <section className="mt-6 flex flex-col items-center">
              {/* 問題表示: 64px 以上要件 (text-7xl=72px / md:text-8xl=96px) */}
              <div className="text-center">
                <p className="text-7xl md:text-8xl font-bold text-indigo-700 tabular-nums leading-tight">
                  {q.dan} × {q.multiplier} = ?
                </p>
              </div>

              {/* 回答入力表示: feedback に応じて枠色・背景色をパステル域で切替 (SPEC §5.0) */}
              <div
                className={
                  feedback === null
                    ? "mt-6 w-full max-w-md min-h-[96px] rounded-2xl border-4 border-slate-300 bg-white flex items-center justify-center transition-colors"
                    : feedback.kind === "correct"
                      ? "mt-6 w-full max-w-md min-h-[96px] rounded-2xl border-4 border-green-500 bg-green-50 flex items-center justify-center transition-colors"
                      : "mt-6 w-full max-w-md min-h-[96px] rounded-2xl border-4 border-rose-500 bg-rose-50 flex items-center justify-center transition-colors"
                }
              >
                {userInput === "" ? (
                  <span className="text-6xl font-bold text-slate-300 tabular-nums" aria-hidden="true">?</span>
                ) : (
                  <span className="text-6xl font-bold text-slate-800 tabular-nums">{userInput}</span>
                )}
              </div>

              {/* フィードバック: aria-live="polite" で読み上げ。高さを固定してレイアウトジャンプを避ける */}
              <div className="mt-3 min-h-[96px] w-full max-w-md text-center" role="status" aria-live="polite">
                {feedback !== null && feedback.kind === "correct" && (
                  <p className="text-3xl font-bold text-green-600">○ せいかい！</p>
                )}
                {feedback !== null && feedback.kind === "wrong" && (
                  <div>
                    <p className="text-3xl font-bold text-rose-600">× おしいっ</p>
                    <p className="mt-2 text-xl text-slate-700">
                      こたえは{" "}
                      <span className="text-3xl font-bold text-indigo-700 tabular-nums">{feedback.correctAnswer}</span>
                      {" "}だよ
                    </p>
                  </div>
                )}
              </div>
            </section>

            {/* 下部: 不正解フィードバック中は「つぎへ」、それ以外はテンキー */}
            {feedback !== null && feedback.kind === "wrong" ? (
              <div className="mt-auto pt-4">
                <button
                  type="button"
                  onClick={advance}
                  autoFocus
                  className="w-full min-h-[72px] px-10 py-5 bg-indigo-600 text-white text-2xl font-bold rounded-2xl shadow-lg hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                >
                  つぎへ
                </button>
              </div>
            ) : (
              <div className="mt-auto pt-4 grid grid-cols-3 gap-2 sm:gap-3" role="group" aria-label="テンキー">
                {[7, 8, 9, 4, 5, 6, 1, 2, 3].map((n) => (
                  <button
                    key={n}
                    type="button"
                    onClick={() => appendDigit(String(n))}
                    disabled={feedback !== null}
                    aria-label={String(n)}
                    className={
                      feedback !== null
                        ? "min-h-[72px] text-3xl font-bold rounded-2xl border-2 border-slate-200 bg-slate-100 text-slate-400 cursor-not-allowed transition-colors"
                        : "min-h-[72px] text-3xl font-bold rounded-2xl border-2 border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                    }
                  >
                    {n}
                  </button>
                ))}
                <button
                  type="button"
                  onClick={deleteDigit}
                  disabled={!canDelete}
                  className={
                    canDelete
                      ? "min-h-[72px] text-xl font-bold rounded-2xl border-2 border-amber-300 bg-white text-amber-700 hover:bg-amber-50 focus:outline-none focus:ring-4 focus:ring-amber-300 transition-colors"
                      : "min-h-[72px] text-xl font-bold rounded-2xl border-2 border-slate-200 bg-slate-100 text-slate-400 cursor-not-allowed transition-colors"
                  }
                >
                  けす
                </button>
                <button
                  type="button"
                  onClick={() => appendDigit("0")}
                  disabled={feedback !== null}
                  aria-label="0"
                  className={
                    feedback !== null
                      ? "min-h-[72px] text-3xl font-bold rounded-2xl border-2 border-slate-200 bg-slate-100 text-slate-400 cursor-not-allowed transition-colors"
                      : "min-h-[72px] text-3xl font-bold rounded-2xl border-2 border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                  }
                >
                  0
                </button>
                <button
                  type="button"
                  onClick={submitAnswer}
                  disabled={!canSubmit}
                  className={
                    canSubmit
                      ? "min-h-[72px] text-xl font-bold rounded-2xl bg-indigo-600 text-white shadow-md hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                      : "min-h-[72px] text-xl font-bold rounded-2xl bg-slate-300 text-white cursor-not-allowed transition-colors"
                  }
                >
                  こたえる
                </button>
              </div>
            )}

            {showPause && (
              <PauseConfirmModal
                onCancel={closePause}
                onConfirm={confirmPause}
                previousFocusRef={pausePrevFocusRef}
              />
            )}

            {/* Step 7 オーバーレイエフェクト。effectsEnabled=false なら各 component が null を返す */}
            <ConfettiCanvas burstId={confettiBurst.id} count={confettiBurst.count} shape={confettiBurst.shape} />
            <ComboCounter combo={combo} />
            <CelebrationToast
              burstKey={toast ? toast.id : 0}
              message={toast ? toast.message : null}
              tone={toast ? toast.tone : null}
            />
          </main>
        );
      }

      // ── screens: ResultScreen ────────────────────────────────────
      // 参照: SPEC.md §2.2 / §4.1 / §5.0 / prompts.md Step 6
      // 本画面で使う ResultHelpers は helpers 節 (L616 付近) に移設済み (C14-06)。

      /**
       * セッション完了後の結果サマリー画面。
       * - SessionResult は localStorage の最新エントリ (timestamp 降順) から取得 (SPEC §2.2)。
       * - C06-13: 取得した SessionResult / QuestionDetail は読み取り専用で扱い、加工は slice / filter で新配列を作る。
       * - SPEC §4.1: 「ホームへ」遷移は replace を使い back で結果に戻れないようにする。
       * - C05-14 救済: 「もういちど」では SessionResult.selectedDans / totalQuestions を Context に書き戻してから
       *   #/quiz に遷移する。これによりリロード経由で Context が初期値に戻ったケースでも同条件で再開できる。
       * - 結果が無い (直接 #/result アクセス / 履歴破損 等) は useEffect で #/home に退避する。
       */
      function ResultScreen() {
        const { account, setSelectedDans, setTotalQuestions } = useContext(AppContext);
        // C07-13: iOS Safari BFCache 復元時に useMemo キャッシュが陳腐化するため、
        // pageshow (persisted=true) でカウンタを増やし再計算する。
        const [reloadTick, setReloadTick] = useState(0);
        useEffect(() => {
          const onPageShow = (e) => { if (e.persisted) setReloadTick((n) => n + 1); };
          window.addEventListener("pageshow", onPageShow);
          return () => window.removeEventListener("pageshow", onPageShow);
        }, []);

        // Step 7 結果画面エフェクト state: マウント直後に大紙吹雪 + ファンファーレ + マスコット celebrate
        const [confettiBurst, setConfettiBurst] = useState({ id: 0, count: 0, shape: "square" });
        const [mascotDesired, setMascotDesired] = useState("idle");

        // セッションを取得する。account 切替の過渡フレームでは null になりうる (C04-05 / C06-10)。
        // C07-04: QuizScreen が saveSessions 失敗時に history.state に退避した kukuSessionResult を
        // 優先参照し、localStorage からの誤った前回セッション表示を避ける。
        // useMemo の dep には account.id と reloadTick を入れる (C07-13)。
        const sessionData = useMemo(function () {
          if (!account) return { latest: null, previous: null };
          const stored = ResultHelpers.pickLatestAndPrevious(Storage.loadSessions(account.id));
          const fromState = (window.history && window.history.state && window.history.state.kukuSessionResult) || null;
          if (fromState && ResultHelpers.isValidSession(fromState)) {
            // stored.latest は saveSessions 失敗時には「前回」扱い。
            return { latest: fromState, previous: stored.latest };
          }
          return stored;
        }, [account ? account.id : null, reloadTick]);

        const latest = sessionData.latest;
        const previous = sessionData.previous;

        // セッション 0 件で #/result に直接到達したケースは #/home に退避。
        // render 中の navigate 副作用は React 違反のため useEffect 経由で実行する。
        useEffect(() => {
          if (account && !latest) {
            window.location.replace("#/home");
          }
        }, [account, latest]);

        // Esc キーで「ホームへ」(= window.location.replace("#/home")) と同等の動作 (Step 9 キーボード操作完全対応)。
        // ここで早期 return より前に hook を呼び出さないと Hooks 規則違反になるため、
        // handleHome 相当の navigate 処理は hook 内で完結させる (C10-08: stale closure 回避のため
        // window.location を直接参照し handleHome の参照は持たない)。
        // モーダル表示中は ModalStack 経由の Esc を尊重し二重発火させない (C10-09)。
        useEffect(() => {
          const onKey = (e) => {
            if (ModalStack.length > 0) return;
            if (e.isComposing || e.keyCode === 229) return;
            if (e.key === "Escape") {
              e.preventDefault();
              window.location.replace("#/home");
            }
          };
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, []);

        // C10-01: 祝祭演出 useEffect と firedForSessionRef を早期 return より前に配置する。
        //        以前は `if (!latest) return <main>...</main>` の後方に定義していたため、
        //        latest が null→truthy に遷移するレンダで「Rendered more hooks」エラーを起こす
        //        潜在的 Hooks 規則違反があった。hook 内部で `if (!latest) return;` ガードして
        //        副作用を抑止する。
        //        C08-02: #/result 直接リロード経路で firstGesture 未発火のまま useEffect がまず走るため、
        //                ensureAudioContext を先行呼び出しして suspended なら resume を試みた後に playFanfare する。
        //                iOS は gesture tick 外の resume を許さないため直接リロード時の無音は避けられないが、
        //                それ以外の正常導線 (HomeScreen 経由 / BFCache 復元 + visibilitychange invalidate 後) では
        //                復帰時に発音できる。
        const firedForSessionRef = useRef(null);
        useEffect(() => {
          if (!latest) return;
          if (firedForSessionRef.current === latest.sessionId) return;
          firedForSessionRef.current = latest.sessionId;
          const rate = latest.totalQuestions > 0
            ? latest.correctCount / latest.totalQuestions
            : 0;
          const isStrong = rate >= 0.8;
          // 60-100 粒 (正答率が高いほど多く)
          const particleCount = isStrong ? 90 : 65;
          const shape = isStrong ? "star" : "square";
          setConfettiBurst({ id: Date.now(), count: particleCount, shape });
          setMascotDesired(isStrong ? "celebrate" : "happy");
          const p = SoundPlayer.ensureAudioContext();
          if (p && typeof p.then === "function") {
            p.then(function () { SoundPlayer.playFanfare(); })
              .catch(function (err) {
                console.warn("[kuku-dojo] audio: result fanfare ensure failed:", err && err.message);
                SoundPlayer.playFanfare(); // 失敗しても play 側の内部 guard で黙って落ちるだけ
              });
          } else {
            SoundPlayer.playFanfare();
          }
        }, [latest ? latest.sessionId : null]);

        // 過渡フレーム / アカウント未確定は完全に描画なし (App が LoginScreen にフォールバック)
        if (!account) return null;
        // C07-07: 直接 #/result アクセス / セッション 0 件のケースで空白フレームを見せない。
        // useEffect の replace("#/home") が走るまでの 1 フレームに中継文言を出す。
        if (!latest) {
          return (
            <main className="min-h-screen flex items-center justify-center px-4 py-6">
              <p className="text-lg text-slate-600">ホームへ もどるよ…</p>
            </main>
          );
        }

        // latest は ResultHelpers.isValidSession で totalQuestions > 0 / correctCount 整合が保証済 (C07-03 / C07-08)
        const total = latest.totalQuestions;
        const correct = latest.correctCount;
        const correctRate = correct / total;
        const ratePercent = Math.round(correctRate * 100);
        const stars = ResultHelpers.starRating(correctRate);
        const elapsedDisplay = ResultHelpers.formatTime(latest.elapsedTime);

        // 間違えた問題: details から isCorrect===false を抽出。filter は新配列を返すため C06-13 違反にならない。
        // details は出題順なので時系列で並ぶ。
        const wrongDetails = (Array.isArray(latest.details) ? latest.details : [])
          .filter(function (d) { return d && d.isCorrect === false; });
        // C07-06: 「ぜんぶ せいかい」表示は correctCount と wrongDetails の両方で整合を要求。
        // details 破損 (length=0) + correctCount<total のケースで誤って「ぜんぶ せいかい」と出さない。
        const isAllCorrect = correct >= total && wrongDetails.length === 0;
        const isDetailsMissing = wrongDetails.length === 0 && !isAllCorrect;

        // 前回比較: previous が無い (= 初回セッション) なら null で非表示
        const previousRate = previous && previous.totalQuestions > 0
          ? previous.correctCount / previous.totalQuestions
          : null;
        const rateDiff = previousRate !== null ? ratePercent - Math.round(previousRate * 100) : null;

        // Step 7: マウント直後の大紙吹雪 + ファンファーレは C10-01 で早期 return より前に移設済み。

        // C07-10: 「もういちど」で何が始まるかをボタン内に明示するための表示文字列。
        // selectedDans が不正な場合は [1..9] にフォールバックし Engine 側の正規化と揃える。
        const retryDans = Array.isArray(latest.selectedDans) && latest.selectedDans.length > 0
          ? latest.selectedDans.filter((d) => Number.isInteger(d) && d >= 1 && d <= 9)
          : [];
        const retryDanLabel = retryDans.length === 0 || retryDans.length >= 9
          ? "ぜんぶの だん"
          : retryDans.join("・") + "の だん";
        const retrySummary = retryDanLabel + " / " + latest.totalQuestions + "もん";

        const handleRetry = () => {
          // 同じ設定で新セッション。Context が破棄されている経路 (リロード等) でも復元できる (C05-14)。
          // C06-13: 配列は slice で防御的に複製。Engine 側の正規化があるため値域は不問。
          const restoredDans = retryDans.length > 0
            ? retryDans.slice()
            : [1, 2, 3, 4, 5, 6, 7, 8, 9];
          setSelectedDans(restoredDans);
          setTotalQuestions(latest.totalQuestions);
          // push 遷移。HomeScreen.handleStart と同じ挙動で、QuizScreen 側 popstate ガードに任せる。
          window.location.hash = "#/quiz";
        };

        const handleHome = () => {
          // SPEC §4.1: 結果サマリーからホームへの遷移は replace で back を抑止する。
          window.location.replace("#/home");
        };

        return (
          <main className="min-h-screen flex flex-col items-center px-4 py-6">
            <div className="w-full max-w-2xl flex flex-col gap-4">
              <header className="text-center">
                <h1 className="text-3xl md:text-4xl font-bold text-indigo-700">
                  けっか はっぴょう
                </h1>
                {/* マスコットは effectsEnabled=false なら非表示 (SPEC §5.4 純テキスト退行) */}
                {/* C08-06: SPEC §5.3 結果画面は celebrate 1500ms を明示的に指定 */}
                <div className="mt-2 flex justify-center">
                  <MascotCharacter state={mascotDesired} size="lg" celebrateDurationMs={1500} />
                </div>
                {/* C06-11: 完了の達成感を aria-live で読み上げる。
                    C07-02: 正答率帯で文言を分岐し、低スコア時も寄り添う言葉を出す。 */}
                <p className="mt-2 text-lg text-slate-700" aria-live="polite">
                  {correctRate >= 0.9
                    ? "すごい！ " + correct + " / " + total + " もん せいかい！"
                    : correctRate >= 0.5
                      ? correct + " / " + total + " もん できたよ！"
                      : correct + " / " + total + " もん できたね！ つぎも いっしょに がんばろう"}
                </p>
              </header>

              {/* メインスコアカード */}
              <section
                className="bg-white/80 backdrop-blur rounded-3xl shadow-lg border border-indigo-100 p-6 text-center"
                aria-labelledby="kuku-result-score"
              >
                <h2 id="kuku-result-score" className="sr-only">スコア</h2>
                <div className="text-7xl md:text-8xl font-bold text-indigo-700 tabular-nums leading-tight">
                  <span>{correct}</span>
                  <span className="text-3xl md:text-4xl text-slate-400 mx-2" aria-hidden="true">/</span>
                  <span>{total}</span>
                </div>
                <div className="mt-3 text-xl text-slate-600">
                  せいかいりつ{" "}
                  <span className="text-2xl font-bold text-indigo-700 tabular-nums">{ratePercent}</span>
                  <span className="text-2xl font-bold text-indigo-700">%</span>
                </div>
                <div className="mt-1 text-xl text-slate-600">
                  じかん{" "}
                  <span className="text-2xl font-bold text-slate-800 tabular-nums">{elapsedDisplay}</span>
                </div>

                {/* 星評価: 1〜5 個の SVG 星を amber / slate で塗り分ける。
                    C07-01: ★ (U+2605) は OS の絵文字カラーフォントで color 上書きが効かない端末があるため SVG 化。
                    C07-12: amber-400 の対白コントラスト ~2:1 から amber-500 に格上げし WCAG 1.4.11 3:1 に近付ける。 */}
                <div
                  className="mt-4 flex justify-center gap-1"
                  role="img"
                  aria-label={"ほし " + stars + " こ"}
                >
                  {[1, 2, 3, 4, 5].map((i) => (
                    <svg
                      key={i}
                      aria-hidden="true"
                      viewBox="0 0 20 20"
                      fill="currentColor"
                      className={
                        i <= stars
                          ? "w-12 h-12 text-amber-500 drop-shadow-sm"
                          : "w-12 h-12 text-slate-300"
                      }
                    >
                      <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.951.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.196-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118L2.098 10.1c-.783-.57-.38-1.81.588-1.81h4.915a1 1 0 00.951-.69l1.519-4.674z" />
                    </svg>
                  ))}
                </div>

                {/* 前回比較: previous が無い (= 初回) なら非表示
                    C07-02 / C07-05: 負号表示・赤色を廃し、悪化時も寄り添う文言に差し替え。
                    rose-600 は自己否定的に読めるため indigo-600 に変更し、Math.abs で "-" を見せない。 */}
                {rateDiff !== null && (
                  <div className="mt-4 text-base text-slate-600">
                    {rateDiff > 0 ? (
                      <span>
                        まえより{" "}
                        <span className="text-lg font-bold text-green-600 tabular-nums">
                          {rateDiff}%
                        </span>
                        {" "}あがった！
                      </span>
                    ) : rateDiff < 0 ? (
                      <span>
                        まえより{" "}
                        <span className="text-lg font-bold text-indigo-600 tabular-nums">
                          {Math.abs(rateDiff)}%
                        </span>
                        {" "}もうちょっと！
                      </span>
                    ) : (
                      <span className="text-lg font-bold text-slate-600">まえと おなじくらい がんばった！</span>
                    )}
                  </div>
                )}
              </section>

              {/* 間違えた問題一覧: max-h + overflow-y-auto で問題数に関係なくスクロール表示 */}
              <section
                className="bg-white/80 backdrop-blur rounded-3xl shadow-lg border border-indigo-100 p-6"
                aria-labelledby="kuku-result-wrong-title"
              >
                <h2 id="kuku-result-wrong-title" className="text-xl font-bold text-slate-700">
                  まちがえた もんだい
                </h2>
                {isAllCorrect ? (
                  <p className="mt-3 text-lg text-green-700">ぜんぶ せいかい！すごいね！</p>
                ) : isDetailsMissing ? (
                  <p className="mt-3 text-base text-slate-500">きろくの いちぶが みつからないよ</p>
                ) : (
                  <ul className="mt-3 max-h-[40vh] overflow-y-auto pr-1 divide-y divide-slate-200">
                    {/* C07-14: 同一問題が複数回出題されるケースを想定し key を複合化 (Step 7 でアニメ追加時の差分保護)。 */}
                    {wrongDetails.map((d, i) => (
                      <li key={d.dan + "x" + d.multiplier + "-" + i} className="py-3 flex items-center justify-between gap-3">
                        <span className="text-2xl font-bold text-slate-800 tabular-nums">
                          {d.dan} × {d.multiplier} =
                        </span>
                        {/* 色覚多様性配慮 (Step 9): 色だけでなく × / ○ 記号で正誤を示す。
                            aria-hidden で SR 読み上げは重複させず、行頭ラベル「きみ」「せいかい」に委ねる。
                            C10-03: 不正解マークは QuizScreen と同じ × (U+00D7) を使う。U+2717 (HEAVY BALLOT X) は
                            iOS で Apple Color Emoji のフォールバックに載り text-rose-600 の currentColor が
                            効かない端末があるため避ける。 */}
                        <span className="text-base text-slate-600 flex flex-col items-end gap-0.5">
                          <span>
                            <span className="text-rose-600 font-bold mr-1" aria-hidden="true">×</span>
                            きみ:{" "}
                            <span className="text-rose-600 font-bold tabular-nums">{d.userAnswer}</span>
                          </span>
                          <span>
                            <span className="text-green-700 font-bold mr-1" aria-hidden="true">○</span>
                            せいかい:{" "}
                            <span className="text-indigo-700 font-bold tabular-nums">{d.correctAnswer}</span>
                          </span>
                        </span>
                      </li>
                    ))}
                  </ul>
                )}
              </section>

              {/* ボタン: もういちど (primary) / ホームへ (secondary)
                  C07-10: 「もういちど」下に retrySummary を小さく配置し、遷移先の設定を子供に明示する。 */}
              <section className="flex flex-col sm:flex-row gap-3 mt-2">
                <button
                  type="button"
                  onClick={handleRetry}
                  className="flex-1 min-h-[72px] px-8 py-4 bg-indigo-600 text-white rounded-2xl shadow-lg hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                >
                  <span className="block text-2xl font-bold">もういちど</span>
                  <span className="block text-sm font-normal text-indigo-100 mt-0.5">{retrySummary}</span>
                </button>
                <button
                  type="button"
                  onClick={handleHome}
                  className="flex-1 min-h-[72px] px-8 py-4 bg-white text-indigo-700 rounded-2xl border-2 border-indigo-300 hover:bg-indigo-50 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                >
                  <span className="block text-2xl font-bold">ホームへ</span>
                  <span className="block text-sm font-normal text-indigo-400 mt-0.5">だんを えらびなおす</span>
                </button>
              </section>
            </div>

            {/* Step 7 大紙吹雪オーバーレイ。effectsEnabled=false なら component 側で null */}
            <ConfettiCanvas burstId={confettiBurst.id} count={confettiBurst.count} shape={confettiBurst.shape} />
          </main>
        );
      }

      // ── screens: StatsScreen ─────────────────────────────────────
      // 参照: SPEC.md §2.2 / §3.3 / §4.1 / prompts.md Step 8
      // 本画面で使う StatsHelpers / STATS_RECENT_N は helpers 節 (L616 付近) に移設済み (C14-06)。

      // 習熟度レベル (SPEC §3.3) に対応する UI メタ。
      // Tailwind CLI は正規表現ベースで class を抽出するため、cellCls / legendCls は
      // **完全な class 文字列**で静的に列挙する (CLAUDE.md 「Tailwind クラスの記述ルール」)。
      // 色は SPEC §3.3 の参考色に最も近い Tailwind パステル系を採用 (SPEC §5.0 彩度方針とも整合)。
      const PROFICIENCY_META = [
        { label: "みちょうせん", cellCls: "bg-slate-200 text-slate-600 border-slate-300", legendCls: "bg-slate-200 text-slate-700 border-slate-300" },
        { label: "にがて",        cellCls: "bg-rose-300 text-rose-900 border-rose-400",   legendCls: "bg-rose-300 text-rose-900 border-rose-400" },
        { label: "もうすこし",    cellCls: "bg-orange-300 text-orange-900 border-orange-400", legendCls: "bg-orange-300 text-orange-900 border-orange-400" },
        { label: "まあまあ",      cellCls: "bg-yellow-200 text-yellow-900 border-yellow-400", legendCls: "bg-yellow-200 text-yellow-900 border-yellow-400" },
        { label: "とくい",        cellCls: "bg-green-300 text-green-900 border-green-400", legendCls: "bg-green-300 text-green-900 border-green-400" },
      ];

      /**
       * 成績画面。
       * - タブ切替で「れきし / だんべつ / マップ / にがて」を出し分け
       * - 習熟度マップ (9×9) は SPEC §3.3 の 5 段階 (L0〜L4) で塗り分け、タップで詳細カードを表示
       * - 履歴 0 件時はタブによらず優しく案内する
       * - 「もどる」は push 遷移 (SPEC §4.1)。結果画面のような replace は不要。
       */
      function StatsScreen() {
        const { account, settings } = useContext(AppContext);
        const [tab, setTab] = useState("history");
        const [selectedCell, setSelectedCell] = useState(null);
        const detailRef = useRef(null);
        // v1.1.0 §4.2.1 / C13-12: タブ間 ArrowKey 遷移のための配列定義。
        // 追加順は UI 表示順と一致 (history → dans → map → time → weak)。
        const TAB_ORDER = ["history", "dans", "map", "time", "weak"];

        const accountId = account ? account.id : null;

        // React Hooks は条件分岐より前に呼ぶ。account 未確定時は空値を返すだけで副作用なし。
        const weights = useMemo(
          function () { return accountId ? Storage.loadWeights(accountId) : {}; },
          [accountId]
        );
        const sessions = useMemo(
          function () { return accountId ? Storage.loadSessions(accountId) : []; },
          [accountId]
        );
        const agg = useMemo(function () { return StatsHelpers.aggregate(sessions); }, [sessions]);

        // 苦手問題ワースト 5: 現在の重み (WeightMap) を降順ソートして上位 5 件。
        // 下限 0.5〜デフォルト 1.0 は「まだ取り組んでいない / 得意」であり「苦手」ではないため除外する (C09-09)。
        // これにより新規アカウントや全段未練習時に sort 安定性で 1×1〜1×5 が辞書順固定表示される問題を回避。
        const weakTop5 = useMemo(function () {
          const entries = [];
          for (let dan = 1; dan <= 9; dan++) {
            for (let m = 1; m <= 9; m++) {
              const key = dan + "-" + m;
              const w = typeof weights[key] === "number" ? weights[key] : 1.0;
              if (w <= 1.0) continue;
              entries.push({ dan: dan, multiplier: m, weight: w, key: key });
            }
          }
          entries.sort(function (a, b) { return b.weight - a.weight; });
          return entries.slice(0, 5);
        }, [weights]);

        // StatsScreen は閲覧画面のため push 遷移でよい (SPEC §4.1)。
        // ResultScreen の replace とは異なり、戻るボタンで #/stats に再入できる UX を許容する (C09-11)。
        const handleBack = () => { window.location.hash = "#/home"; };
        const selectTab = (id) => { setTab(id); setSelectedCell(null); };

        // Esc ハンドラが最新の selectedCell を参照するための ref (C10-02)。
        // useEffect([]) の closure 初回キャプチャで stale 化するのを避ける。
        const selectedCellRef = useRef(selectedCell);
        useEffect(() => { selectedCellRef.current = selectedCell; });

        // Esc キーで「もどる」と同等の動作 (Step 9 キーボード操作完全対応)。
        // IME 合成中の Esc はブラウザが変換キャンセルを優先するため isComposing でガードする。
        // C10-02: 詳細カード (selectedCell) が開いているときはまずカードを閉じる。画面遷移は最後の手段。
        //        これにより 9×9 セル (C09-04 Tab 走査) + Esc の組合せでカード閉じ経路が確保される。
        // C10-09: 将来の子モーダル追加に備え、ModalStack が積まれているときは window レベルで発火させない。
        // C10-08: handleBack の参照を持たず window.location を直接書くことで stale closure を構造的に回避する。
        // C10-10: iOS Safari の日本語 IME では isComposing の立ち上がり/立ち下がりが他ブラウザと異なるケースが
        //         報告されているため、実機検証 (Step 10 C08-14) で挙動差異を要確認。
        useEffect(() => {
          const onKey = (e) => {
            if (ModalStack.length > 0) return;
            if (e.isComposing || e.keyCode === 229) return;
            if (e.key === "Escape") {
              e.preventDefault();
              if (selectedCellRef.current) {
                setSelectedCell(null);
                return;
              }
              window.location.hash = "#/home";
            }
          };
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, []);

        // セル選択時に詳細カードをビューポート内にスクロール (C09-10)。
        // 下段セル (9 の段等) タップ時にカードが画面外生成される視覚欠落を防ぐ。
        useEffect(function () {
          if (selectedCell && detailRef.current) {
            detailRef.current.scrollIntoView({ block: "nearest", behavior: "smooth" });
          }
        }, [selectedCell]);

        // App の Navigation Guard が発火するまでの過渡フレームでは account が null になりうる。
        if (!account) return null;

        const hasData = agg.sortedDesc.length > 0;

        // 選択セルの詳細表示用。splitのコスト低、selectedCell 毎に計算。
        let detail = null;
        if (selectedCell) {
          const parts = selectedCell.split("-");
          const dDan = Number(parts[0]);
          const dM = Number(parts[1]);
          const cs = agg.cellStats[selectedCell];
          const w = typeof weights[selectedCell] === "number" ? weights[selectedCell] : 1.0;
          const lvl = Engine.proficiencyLevel(w, cs.correctRate, cs.attempts);
          detail = { dan: dDan, multiplier: dM, weight: w, cs: cs, level: lvl, meta: PROFICIENCY_META[lvl] };
        }

        const tabBtnCls = (id) => (
          tab === id
            ? "flex-1 min-h-[48px] px-3 py-2 text-base font-bold rounded-xl bg-indigo-600 text-white shadow-md focus:outline-none focus:ring-4 focus:ring-indigo-300"
            : "flex-1 min-h-[48px] px-3 py-2 text-base font-bold rounded-xl bg-white text-indigo-700 border-2 border-indigo-200 hover:bg-indigo-50 focus:outline-none focus:ring-4 focus:ring-indigo-300"
        );

        return (
          <main className="min-h-screen px-4 py-6 flex flex-col items-center">
            <div className="w-full max-w-3xl flex flex-col gap-4">
              <header className="flex items-center justify-between gap-3">
                <div className="flex items-center gap-3 min-w-0">
                  <span className="text-4xl leading-none" aria-hidden="true">
                    {LoginHelpers.avatarOf(account.avatarIndex)}
                  </span>
                  <h1 className="text-2xl md:text-3xl font-bold text-indigo-700 truncate">
                    {account.name}さんの せいせき
                  </h1>
                </div>
                <button
                  type="button"
                  onClick={handleBack}
                  className="shrink-0 min-h-[48px] px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 focus:outline-none focus:ring-4 focus:ring-slate-300"
                >
                  もどる
                </button>
              </header>

              {/* タブ: role=tablist + aria-controls / role=tabpanel の紐付けで ARIA tab パターンを満たす (C09-07)。
                  v1.1.0 C13-12: ArrowKey でタブ間移動 + Home/End で端へ。roving tabindex で選択中タブのみ
                  Tab フォーカス可能にし、Tab キーの 1 ストロークでパネル内フォーカスへ抜ける。 */}
              <nav
                role="tablist"
                aria-label="せいせき カテゴリ"
                className="flex flex-wrap gap-2"
                onKeyDown={(e) => {
                  const cur = TAB_ORDER.indexOf(tab);
                  const idx = cur === -1 ? 0 : cur;
                  let nextIdx = null;
                  if (e.key === "ArrowLeft" || e.key === "ArrowUp") nextIdx = (idx - 1 + TAB_ORDER.length) % TAB_ORDER.length;
                  else if (e.key === "ArrowRight" || e.key === "ArrowDown") nextIdx = (idx + 1) % TAB_ORDER.length;
                  else if (e.key === "Home") nextIdx = 0;
                  else if (e.key === "End") nextIdx = TAB_ORDER.length - 1;
                  if (nextIdx === null) return;
                  e.preventDefault();
                  const nextId = TAB_ORDER[nextIdx];
                  selectTab(nextId); // 詳細カードも閉じる (C13-12)
                  const group = e.currentTarget;
                  const buttons = group.querySelectorAll('[role="tab"]');
                  if (buttons[nextIdx]) buttons[nextIdx].focus();
                }}
              >
                <button type="button" role="tab" id="kuku-stats-tab-history" aria-selected={tab === "history"} aria-controls="kuku-stats-panel-history" tabIndex={tab === "history" ? 0 : -1} onClick={() => selectTab("history")} className={tabBtnCls("history")}>
                  れきし
                </button>
                <button type="button" role="tab" id="kuku-stats-tab-dans" aria-selected={tab === "dans"} aria-controls="kuku-stats-panel-dans" tabIndex={tab === "dans" ? 0 : -1} onClick={() => selectTab("dans")} className={tabBtnCls("dans")}>
                  だんべつ
                </button>
                <button type="button" role="tab" id="kuku-stats-tab-map" aria-selected={tab === "map"} aria-controls="kuku-stats-panel-map" tabIndex={tab === "map" ? 0 : -1} onClick={() => selectTab("map")} className={tabBtnCls("map")}>
                  マップ
                </button>
                <button type="button" role="tab" id="kuku-stats-tab-time" aria-selected={tab === "time"} aria-controls="kuku-stats-panel-time" tabIndex={tab === "time" ? 0 : -1} onClick={() => selectTab("time")} className={tabBtnCls("time")}>
                  がんばった きろく
                </button>
                <button type="button" role="tab" id="kuku-stats-tab-weak" aria-selected={tab === "weak"} aria-controls="kuku-stats-panel-weak" tabIndex={tab === "weak" ? 0 : -1} onClick={() => selectTab("weak")} className={tabBtnCls("weak")}>
                  にがて
                </button>
              </nav>

              {/* 履歴 0 件のやさしい案内。マップ / がんばったきろく は「未挑戦」表示で自然に空を表現するため条件外。 */}
              {!hasData && tab !== "map" && tab !== "time" && (
                <section className="bg-white/80 backdrop-blur rounded-3xl shadow-lg border border-indigo-100 p-8 text-center">
                  <p className="text-5xl leading-none" aria-hidden="true">🐣</p>
                  <p className="mt-3 text-xl text-slate-700">まだ データが ありません</p>
                  <p className="mt-2 text-base text-slate-500">ホームから 1かい あそんでみよう！</p>
                </section>
              )}

              {/* ── れきし ── */}
              {tab === "history" && hasData && (
                <section
                  id="kuku-stats-panel-history"
                  role="tabpanel"
                  aria-labelledby="kuku-stats-tab-history"
                  className="bg-white/80 backdrop-blur rounded-3xl shadow-lg border border-indigo-100 p-6"
                >
                  <h2 id="kuku-stats-history-title" className="text-xl font-bold text-slate-700 mb-3">
                    プレイ りれき <span className="text-sm font-normal text-slate-500">（あたらしい じゅん）</span>
                  </h2>
                  <ul className="divide-y divide-slate-200 max-h-[60vh] overflow-y-auto pr-1">
                    {agg.sortedDesc.map(function (s, i) {
                      const rate = Math.round((s.correctCount / s.totalQuestions) * 100);
                      return (
                        <li
                          key={s.timestamp + "-" + i}
                          className="py-3 flex items-center justify-between gap-3"
                        >
