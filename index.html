              ) : (
                <ul className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {accounts.map((a, i) => (
                    <AccountCard
                      key={a.id}
                      account={a}
                      onSelect={() => handleSelect(a.id)}
                      autoFocus={i === 0}
                    />
                  ))}
                </ul>
              )}

              <div className="mt-8 flex justify-center">
                <button
                  type="button"
                  onClick={() => {
                    // モーダルを閉じたときの復帰先をトリガ要素で先に捕捉 (C05-03)
                    createModalPrevFocusRef.current = document.activeElement;
                    setShowModal(true);
                  }}
                  autoFocus={accounts.length === 0}
                  className="min-h-[56px] px-10 py-4 bg-indigo-600 text-white text-xl font-bold rounded-2xl shadow-lg hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-300"
                >
                  {Util.t("login.createButton")}
                </button>
              </div>
            </section>

            {showModal && (
              <CreateAccountModal
                onCancel={() => setShowModal(false)}
                onCreate={handleCreate}
                existingNames={existingNames}
                previousFocusRef={createModalPrevFocusRef}
              />
            )}
          </main>
        );
      }

      // ── screens: HomeScreen ───────────────────────────────────────
      // 参照: SPEC.md §2.3 / §4.1 / prompts.md Step 4

      // 段選択・問題数スライダーで使う定数。値域外が Context に入らないように UI 側でも clamp する (C03-01 二重防御)。
      const DAN_LIST = [1, 2, 3, 4, 5, 6, 7, 8, 9];
      const QUESTION_COUNT_MIN = 10;
      const QUESTION_COUNT_MAX = 81;

      /**
       * 音量・エフェクト・サウンドの設定モーダル。アカウント削除のエントリもここに持つ。
       * 変更は即 Context + localStorage に反映する (updateSettings)。
       * @param {Object} props
       * @param {Settings} props.settings
       * @param {(updater: Settings | ((prev: Settings) => Settings)) => void} props.onUpdate - オブジェクト or 関数型 setter 両対応 (C05-06)
       * @param {() => void} props.onClose
       * @param {() => void} props.onRequestDelete
       * @param {React.RefObject<Element|null>} props.previousFocusRef - トリガ要素の焦点復帰先 (C05-03)
       */
      function SettingsModal({ settings, onUpdate, onClose, onRequestDelete, previousFocusRef }) {
        const modalRef = useRef(null);
        useModalFocusTrap(modalRef, onClose, previousFocusRef);

        // 関数型 setter を使って stale closure の差し込みを防ぐ (C05-06)
        const toggle = (key) => {
          onUpdate((prev) => ({ ...prev, [key]: !prev[key] }));
        };
        // ドラッグ中は React ローカル state で即時プレビュー、
        // 指を離した瞬間 (pointerup / keyup / blur) に 1 回だけ localStorage に永続化する (C05-05)。
        // 60fps ドラッグで `saveSettings` が毎フレーム走るのを避ける。
        const [draftVolume, setDraftVolume] = useState(settings.volume);
        useEffect(() => { setDraftVolume(settings.volume); }, [settings.volume]);
        const commitVolume = () => {
          onUpdate((prev) => ({ ...prev, volume: draftVolume }));
        };

        // v1.1.0 SPEC §4.2.1 案 C: プログレッシブ開示。
        // wrongWeightBoost / slowThresholdSec は「くわしい せってい」折りたたみ内にまとめる。
        // 開閉状態は localStorage に保存しない（モーダルを閉じる度にリセット）。
        // v1.2.0 で lang が追加される時も本節に追加する (第13回 C13-04)。
        const [advancedOpen, setAdvancedOpen] = useState(false);

        return (
          <div
            ref={modalRef}
            className="fixed inset-0 z-40 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4"
            role="dialog"
            aria-modal="true"
            aria-labelledby="kuku-settings-title"
          >
            <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl p-6">
              <h2 id="kuku-settings-title" className="text-2xl font-bold text-indigo-700 text-center">
                {Util.t("settings.title")}
              </h2>

              <div className="mt-6 space-y-5">
                <div className="flex items-center justify-between">
                  <span className="text-xl font-bold text-slate-700">{Util.t("settings.sound.label")}</span>
                  <div className="flex items-center gap-3">
                    {/* 色覚多様性配慮: 色と位置だけでなく文字でも ON/OFF を示す (C05-17)。
                        aria-checked でスクリーンリーダ読み上げは十分なので aria-hidden="true" */}
                    <span className="text-sm font-bold w-8 text-right text-slate-600" aria-hidden="true">
                      {settings.soundEnabled ? Util.t("settings.sound.on") : Util.t("settings.sound.off")}
                    </span>
                  <button
                    type="button"
                    role="switch"
                    aria-checked={settings.soundEnabled}
                    aria-label={Util.t("settings.sound.label")}
                    onClick={() => toggle("soundEnabled")}
                    className={
                      settings.soundEnabled
                        ? "w-20 h-12 rounded-full bg-indigo-600 relative transition-colors focus:outline-none focus:ring-4 focus:ring-indigo-300"
                        : "w-20 h-12 rounded-full bg-slate-300 relative transition-colors focus:outline-none focus:ring-4 focus:ring-slate-300"
                    }
                  >
                    <span
                      className={
                        settings.soundEnabled
                          ? "absolute top-1 right-1 w-10 h-10 bg-white rounded-full shadow transition-all"
                          : "absolute top-1 left-1 w-10 h-10 bg-white rounded-full shadow transition-all"
                      }
                      aria-hidden="true"
                    />
                  </button>
                  </div>
                </div>

                <div className="flex items-center justify-between">
                  <span className="text-xl font-bold text-slate-700">{Util.t("settings.effects.label")}</span>
                  <div className="flex items-center gap-3">
                    <span className="text-sm font-bold w-8 text-right text-slate-600" aria-hidden="true">
                      {settings.effectsEnabled ? Util.t("settings.sound.on") : Util.t("settings.sound.off")}
                    </span>
                  <button
                    type="button"
                    role="switch"
                    aria-checked={settings.effectsEnabled}
                    aria-label={Util.t("settings.effects.label")}
                    onClick={() => toggle("effectsEnabled")}
                    className={
                      settings.effectsEnabled
                        ? "w-20 h-12 rounded-full bg-indigo-600 relative transition-colors focus:outline-none focus:ring-4 focus:ring-indigo-300"
                        : "w-20 h-12 rounded-full bg-slate-300 relative transition-colors focus:outline-none focus:ring-4 focus:ring-slate-300"
                    }
                  >
                    <span
                      className={
                        settings.effectsEnabled
                          ? "absolute top-1 right-1 w-10 h-10 bg-white rounded-full shadow transition-all"
                          : "absolute top-1 left-1 w-10 h-10 bg-white rounded-full shadow transition-all"
                      }
                      aria-hidden="true"
                    />
                  </button>
                  </div>
                </div>

                <div>
                  <div className="flex items-center justify-between">
                    <label htmlFor="kuku-volume-input" className="text-xl font-bold text-slate-700">
                      {Util.t("settings.volume.label")}
                    </label>
                    <span className="text-slate-500 text-sm">{Math.round(draftVolume * 100)}%</span>
                  </div>
                  <input
                    id="kuku-volume-input"
                    type="range"
                    min="0"
                    max="1"
                    step="0.05"
                    value={draftVolume}
                    onChange={(e) => setDraftVolume(Number(e.target.value))}
                    onPointerUp={commitVolume}
                    onKeyUp={commitVolume}
                    onBlur={commitVolume}
                    className="w-full mt-2 h-3 accent-indigo-600 disabled:opacity-40"
                    disabled={!settings.soundEnabled}
                  />
                </div>

              </div>

              {/* v1.1.0 §4.2.1 案 C: 「くわしい せってい」プログレッシブ開示。
                  基本 3 項目（おと / エフェクト / おんりょう）の下にトグルで wrongWeightBoost と
                  slowThresholdSec を開閉。Tab フォーカスは常にボタン自身に入り、aria-expanded で
                  折りたたみ状態を伝える。開閉状態は localStorage に保存しない (C13-04)。 */}
              <div className="mt-6 pt-5 border-t border-slate-200">
                <button
                  type="button"
                  aria-expanded={advancedOpen}
                  aria-controls="kuku-advanced-settings"
                  onClick={() => setAdvancedOpen((v) => !v)}
                  className="w-full min-h-[48px] px-4 py-3 bg-white text-slate-700 font-bold rounded-xl border-2 border-slate-300 hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-indigo-300 flex items-center justify-between"
                >
                  <span>{Util.t("settings.advanced.toggle")}</span>
                  <span aria-hidden="true" className="text-slate-500">{advancedOpen ? "▲" : "▼"}</span>
                </button>

                {advancedOpen && (
                  <div id="kuku-advanced-settings" className="mt-4 space-y-5">
                    {/* にがて もんだいの でやすさ (SPEC §3.2 wrongWeightBoost 3 段プリセット)。
                        role="radiogroup" で選択肢の排他性をスクリーンリーダに伝える。 */}
                    <div>
                      <div className="flex items-center justify-between gap-2">
                        <span id="kuku-boost-label" className="text-xl font-bold text-slate-700">
                          {Util.t("settings.wrongWeightBoost.label")}
                        </span>
                        <span className="text-slate-500 text-sm">{Util.t("settings.wrongWeightBoost.subLabel")}</span>
                      </div>
                      <p className="mt-1 text-sm text-slate-500 leading-relaxed">
                        {Util.t("settings.wrongWeightBoost.description")}
                      </p>
                      {/* C11-05: WAI-ARIA radiogroup pattern に沿い Arrow キー切替 + roving tabindex。
                          - Tab で「選択中ボタン」のみにフォーカスが入る (非選択は tabindex=-1 でスキップ)
                          - ArrowLeft/Up = 前、ArrowRight/Down = 次、Home/End で端へ
                          - Arrow キーで切替時は即座に選択変更 + フォーカス移動 (APG 既定) */}
                      <div
                        role="radiogroup"
                        aria-labelledby="kuku-boost-label"
                        className="mt-2 grid grid-cols-3 gap-2"
                        onKeyDown={(e) => {
                          // v1.2.0 Phase A: PRESETS は [value,...] のフラット配列。
                          const cur = WRONG_WEIGHT_BOOST_PRESETS.indexOf(settings.wrongWeightBoost);
                          const idx = cur === -1 ? 1 : cur; // プリセット外 (C11-06 予防) なら「ふつう」起点
                          const len = WRONG_WEIGHT_BOOST_PRESETS.length;
                          let nextIdx = null;
                          if (e.key === "ArrowLeft" || e.key === "ArrowUp") nextIdx = (idx - 1 + len) % len;
                          else if (e.key === "ArrowRight" || e.key === "ArrowDown") nextIdx = (idx + 1) % len;
                          else if (e.key === "Home") nextIdx = 0;
                          else if (e.key === "End") nextIdx = len - 1;
                          if (nextIdx === null) return;
                          e.preventDefault();
                          const nextValue = WRONG_WEIGHT_BOOST_PRESETS[nextIdx];
                          onUpdate((prev) => ({ ...prev, wrongWeightBoost: nextValue }));
                          // フォーカスを次の radio に移す (roving tabindex)
                          const group = e.currentTarget;
                          const buttons = group.querySelectorAll('[role="radio"]');
                          if (buttons[nextIdx]) buttons[nextIdx].focus();
                        }}
                      >
                        {WRONG_WEIGHT_BOOST_PRESETS.map((value) => {
                          const selected = settings.wrongWeightBoost === value;
                          const label = Util.t("settings.wrongWeightBoost." + value + ".label");
                          const desc = Util.t("settings.wrongWeightBoost." + value + ".desc");
                          return (
                            <button
                              key={value}
                              type="button"
                              role="radio"
                              aria-checked={selected}
                              aria-label={label + ": " + desc}
                              tabIndex={selected ? 0 : -1}
                              onClick={() => onUpdate((prev) => ({ ...prev, wrongWeightBoost: value }))}
                              className={
                                selected
                                  ? "min-h-[56px] px-2 py-3 rounded-xl bg-indigo-600 text-white font-bold border-2 border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                                  : "min-h-[56px] px-2 py-3 rounded-xl bg-white text-slate-700 font-bold border-2 border-slate-300 hover:bg-indigo-50 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                              }
                            >
                              {label}
                            </button>
                          );
                        })}
                      </div>
                    </div>

                    {/* じかんもくひょう (v1.1.0 §8.8 slowThresholdSec 4 段プリセット)。
                        「たつじん 5 秒」は到達時のミント背景可視化のみで、未達でもペナルティは発生しない
                        （SPEC §8.8.1 (5)）。保護者が押し付けないよう Release Notes / README で明記済み。 */}
                    <div>
                      <div className="flex items-center justify-between gap-2">
                        <span id="kuku-slow-label" className="text-xl font-bold text-slate-700">
                          {Util.t("settings.slowThreshold.label")}
                        </span>
                        <span className="text-slate-500 text-sm">{Util.t("settings.slowThreshold.subLabel")}</span>
                      </div>
                      <p className="mt-1 text-sm text-slate-500 leading-relaxed">
                        {Util.t("settings.slowThreshold.description")}
                      </p>
                      <div
                        role="radiogroup"
                        aria-labelledby="kuku-slow-label"
                        className="mt-2 grid grid-cols-4 gap-2"
                        onKeyDown={(e) => {
                          const cur = SLOW_THRESHOLD_PRESETS.indexOf(settings.slowThresholdSec);
                          const idx = cur === -1 ? 1 : cur; // プリセット外なら「ふつう」起点
                          const len = SLOW_THRESHOLD_PRESETS.length;
                          let nextIdx = null;
                          if (e.key === "ArrowLeft" || e.key === "ArrowUp") nextIdx = (idx - 1 + len) % len;
                          else if (e.key === "ArrowRight" || e.key === "ArrowDown") nextIdx = (idx + 1) % len;
                          else if (e.key === "Home") nextIdx = 0;
                          else if (e.key === "End") nextIdx = len - 1;
                          if (nextIdx === null) return;
                          e.preventDefault();
                          const nextValue = SLOW_THRESHOLD_PRESETS[nextIdx];
                          onUpdate((prev) => ({ ...prev, slowThresholdSec: nextValue }));
                          const group = e.currentTarget;
                          const buttons = group.querySelectorAll('[role="radio"]');
                          if (buttons[nextIdx]) buttons[nextIdx].focus();
                        }}
                      >
                        {SLOW_THRESHOLD_PRESETS.map((value) => {
                          const selected = settings.slowThresholdSec === value;
                          const label = Util.t("settings.slowThreshold." + value + ".label");
                          const desc = Util.t("settings.slowThreshold." + value + ".desc");
                          return (
                            <button
                              key={value}
                              type="button"
                              role="radio"
                              aria-checked={selected}
                              aria-label={label + " (" + value + Util.t("settings.slowThreshold.unit") + "): " + desc}
                              tabIndex={selected ? 0 : -1}
                              onClick={() => onUpdate((prev) => ({ ...prev, slowThresholdSec: value }))}
                              className={
                                selected
                                  ? "min-h-[56px] px-2 py-3 rounded-xl bg-indigo-600 text-white font-bold border-2 border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                                  : "min-h-[56px] px-2 py-3 rounded-xl bg-white text-slate-700 font-bold border-2 border-slate-300 hover:bg-indigo-50 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                              }
                            >
                              {label}
                            </button>
                          );
                        })}
                      </div>
                    </div>

                    {/* げんご (v1.2.0 Phase A / SPEC §8.9)。Phase A は ja 単独なので "じどう"
                        "にほんご" 以外を選んでも Util.t の ja フォールバックで UI は ja 表示。
                        Phase B 以降で en 等の辞書が揃うと選択がそのまま効くようになる。
                        radiogroup + Arrow/Home/End + roving tabindex は他プリセットと同パターン (C11-05)。 */}
                    <div>
                      <div className="flex items-center justify-between gap-2">
                        <span id="kuku-lang-label" className="text-xl font-bold text-slate-700">
                          {Util.t("settings.lang.label")}
                        </span>
                      </div>
                      <p className="mt-1 text-sm text-slate-500 leading-relaxed">
                        {Util.t("settings.lang.description")}
                      </p>
                      <div
                        role="radiogroup"
                        aria-labelledby="kuku-lang-label"
                        className="mt-2 grid grid-cols-3 gap-2"
                        onKeyDown={(e) => {
                          const cur = SUPPORTED_LANGS.indexOf(settings.lang);
                          const idx = cur === -1 ? 0 : cur; // 値域外なら "auto" 起点
                          const len = SUPPORTED_LANGS.length;
                          let nextIdx = null;
                          if (e.key === "ArrowLeft" || e.key === "ArrowUp") nextIdx = (idx - 1 + len) % len;
                          else if (e.key === "ArrowRight" || e.key === "ArrowDown") nextIdx = (idx + 1) % len;
                          else if (e.key === "Home") nextIdx = 0;
                          else if (e.key === "End") nextIdx = len - 1;
                          if (nextIdx === null) return;
                          e.preventDefault();
                          const nextValue = SUPPORTED_LANGS[nextIdx];
                          onUpdate((prev) => ({ ...prev, lang: nextValue }));
                          const group = e.currentTarget;
                          const buttons = group.querySelectorAll('[role="radio"]');
                          if (buttons[nextIdx]) buttons[nextIdx].focus();
                        }}
                      >
                        {SUPPORTED_LANGS.map((value) => {
                          const selected = settings.lang === value;
                          const label = value === "auto"
                            ? Util.t("settings.lang.auto")
                            : Util.t("settings.lang.name." + value);
                          return (
                            <button
                              key={value}
                              type="button"
                              role="radio"
                              aria-checked={selected}
                              aria-label={label}
                              tabIndex={selected ? 0 : -1}
                              onClick={() => onUpdate((prev) => ({ ...prev, lang: value }))}
                              className={
                                selected
                                  ? "min-h-[56px] px-2 py-3 rounded-xl bg-indigo-600 text-white font-bold border-2 border-indigo-600 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                                  : "min-h-[56px] px-2 py-3 rounded-xl bg-white text-slate-700 font-bold border-2 border-slate-300 hover:bg-indigo-50 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors"
                              }
                            >
                              {label}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}
              </div>

              <button
                type="button"
                onClick={onClose}
                className="w-full mt-6 min-h-[48px] px-4 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-300"
              >
                {Util.t("settings.close")}
              </button>

              <div className="mt-6 pt-5 border-t border-slate-200">
                <button
                  type="button"
                  onClick={onRequestDelete}
                  className="w-full min-h-[48px] px-4 py-3 bg-white text-rose-700 font-bold rounded-xl border-2 border-rose-300 hover:bg-rose-50 focus:outline-none focus:ring-4 focus:ring-rose-300"
                >
                  {Util.t("settings.deleteAccount")}
                </button>
              </div>
            </div>
          </div>
        );
      }

      /**
       * アカウント削除の確認ダイアログ。role="alertdialog" でスクリーンリーダに重大性を伝える。
       * Escape / 「やめる」でキャンセル、「けす」で onConfirm を呼ぶ。
       * @param {Object} props
       * @param {string} props.accountName
       * @param {number} props.avatarIndex - 削除対象の識別性を上げるため絵文字を併記 (C05-15)
       * @param {() => void} props.onCancel
       * @param {() => void} props.onConfirm
       * @param {React.RefObject<Element|null>} props.previousFocusRef - トリガ要素の焦点復帰先 (C05-03)
       */
      function DeleteConfirmModal({ accountName, avatarIndex, onCancel, onConfirm, previousFocusRef }) {
        const modalRef = useRef(null);
        useModalFocusTrap(modalRef, onCancel, previousFocusRef);

        return (
          <div
            ref={modalRef}
            className="fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4"
            role="alertdialog"
            aria-modal="true"
            aria-labelledby="kuku-delete-title"
            aria-describedby="kuku-delete-desc"
          >
            <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl p-6">
              <h2 id="kuku-delete-title" className="text-2xl font-bold text-rose-700 text-center">
                {Util.t("delete.title")}
              </h2>
              <div className="mt-4 flex flex-col items-center">
                {/* 削除対象のアバターを併記して識別性を上げる (C05-15) */}
                <span className="text-6xl leading-none" aria-hidden="true">
                  {LoginHelpers.avatarOf(avatarIndex)}
                </span>
                <p id="kuku-delete-desc" className="mt-3 text-center text-slate-700 text-lg leading-relaxed">
                  {Util.t("delete.desc.line1", { name: accountName })}<br />
                  {Util.t("delete.desc.line2")}
                </p>
              </div>
              <div className="mt-6 flex gap-3">
                <button
                  type="button"
                  onClick={onCancel}
                  autoFocus
                  className="flex-1 min-h-[48px] px-4 py-3 bg-slate-200 text-slate-700 font-bold rounded-xl hover:bg-slate-300 focus:outline-none focus:ring-4 focus:ring-slate-300"
                >
                  {Util.t("delete.cancel")}
                </button>
                <button
                  type="button"
                  onClick={onConfirm}
                  className="flex-1 min-h-[48px] px-4 py-3 bg-rose-600 text-white font-bold rounded-xl hover:bg-rose-700 focus:outline-none focus:ring-4 focus:ring-rose-300"
                >
                  {Util.t("delete.confirm")}
                </button>
              </div>
            </div>
          </div>
        );
      }

      /**
       * ホーム画面。段選択・問題数調整・はじめる / せいせき / ログアウト / 設定・削除の導線を持つ。
       * 段選択と問題数は AppContext に保存し、QuizScreen (Step 5) が読み取る (prompts.md Step 4)。
       * アバターは account.avatarIndex を表示する。くくちゃんマスコットは Step 7 で MascotCharacter に差し替え (C04-18)。
       */
      function HomeScreen() {
        const {
          account,
          selectedDans,
          setSelectedDans,
          totalQuestions,
          setTotalQuestions,
          settings,
          updateSettings,
          logout,
          removeAccount,
        } = useContext(AppContext);
        const [showSettings, setShowSettings] = useState(false);
        const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
        // モーダル閉じた後の焦点復帰先をトリガ側で捕捉する (C05-03)
        const settingsPrevFocusRef = useRef(null);
        const deletePrevFocusRef = useRef(null);

        // App の Navigation Guard が発火するまでの過渡フレームでは account が null になりうる (C04-05)。
        // null ガードで防御して HomeScreen 自体は落ちないようにする。
        if (!account) return null;

        const toggleDan = (dan) => {
          if (selectedDans.indexOf(dan) !== -1) {
            setSelectedDans(selectedDans.filter((d) => d !== dan));
          } else {
            setSelectedDans(selectedDans.concat(dan).sort((a, b) => a - b));

        const selectAllDans = () => setSelectedDans(DAN_LIST.slice());
        // 段選択が 0 のときは「はじめる」を無効化。エンジン側の fallback とは別に UI でも弾く (SPEC §3.1 二重防御)。
        const canStart = selectedDans.length > 0;

        const handleStart = () => {
          if (canStart) window.location.hash = "#/quiz";
        };
        const handleStats = () => {

        const handleLogout = () => {

          // SPEC §4.1: 戻るボタンで前画面に戻るべきでない遷移は replace を使う。
          // ハッシュ直接代入 (= pushState 相当) だと Navigation Guard も追随で replace を呼び重複する (C05-08)。
          window.location.replace("#/login");

        const handleDeleteConfirmed = () => {
          removeAccount();
          setShowDeleteConfirm(false);
          setShowSettings(false);
          // 削除後の #/login 遷移は履歴エントリを積まず差し替え (C05-08)
          window.location.replace("#/login");
        };

        return (
          <main className="min-h-screen px-4 py-6 flex flex-col items-center">
            <header className="w-full max-w-3xl flex items-center justify-between gap-3">
              <div className="flex items-center gap-3 min-w-0">

                </span>

                  {Util.t("home.greeting", { name: account.name })}

              </div>
              <div className="flex gap-2 shrink-0">
                <button
                  type="button"
                  onClick={handleLogout}
                  className="min-h-[48px] px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 focus:outline-none focus:ring-4 focus:ring-slate-300"
                >
                  {Util.t("home.logout")}
                </button>
                <button
                  type="button"
                  onClick={() => {
                    // 閉じた後に歯車ボタンへ焦点を戻すため現焦点を保存 (C05-03)
                    settingsPrevFocusRef.current = document.activeElement;
                    setShowSettings(true);
                  }}
                  aria-label={Util.t("settings.title")}
                  className="min-h-[48px] min-w-[48px] px-3 py-2 bg-slate-100 text-slate-700 text-2xl rounded-xl hover:bg-slate-200 focus:outline-none focus:ring-4 focus:ring-slate-300"
                >
                  <span aria-hidden="true">⚙</span>
                </button>
              </div>
            </header>

            <section
              className="mt-6 w-full max-w-3xl bg-white/80 backdrop-blur rounded-3xl shadow-lg border border-indigo-100 p-6"
              aria-labelledby="kuku-dan-legend"
            >
              <h2 id="kuku-dan-legend" className="text-xl font-bold text-slate-700">
                {Util.t("home.danLegend")}
              </h2>
              <div className="mt-4 grid grid-cols-3 sm:grid-cols-9 gap-2 sm:gap-3" role="group" aria-labelledby="kuku-dan-legend">
                {DAN_LIST.map((dan) => {
                  const selected = selectedDans.indexOf(dan) !== -1;
                  return (
                    <button
                      key={dan}
                      type="button"
                      onClick={() => toggleDan(dan)}
                      aria-pressed={selected}
                      className={
                        selected
                          ? "min-h-[64px] text-xl font-bold rounded-2xl border-4 border-indigo-500 bg-indigo-500 text-white shadow-md focus:outline-none focus:ring-4 focus:ring-indigo-300"
                          : "min-h-[64px] text-xl font-bold rounded-2xl border-2 border-slate-300 bg-white text-slate-700 hover:bg-indigo-50 focus:outline-none focus:ring-4 focus:ring-indigo-300"
                      }
                    >
                      {Util.t("home.danButton", { dan })}
                    </button>
                  );
                })}
              </div>
              <button
                type="button"
                onClick={selectAllDans}
                className="mt-4 w-full min-h-[48px] px-4 py-3 bg-indigo-100 text-indigo-700 text-lg font-bold rounded-xl border-2 border-indigo-200 hover:bg-indigo-200 focus:outline-none focus:ring-4 focus:ring-indigo-300"
              >
                {Util.t("home.selectAllDans")}
              </button>
              {!canStart && (
                // C10-14: 初回 render で !canStart===true で到達した経路 (ログイン直後 / 再入直後) でも SR が読み上げるよう
                //        role="alert" に aria-live="assertive" を併用する。条件付きレンダのため true→false→true で
                //        DOM 出し入れが起こる運用も残し、いずれの SR 実装でも読み上げられる冗長性を確保する。
                <p className="mt-3 text-rose-600 text-base font-bold text-center" role="alert" aria-live="assertive">{Util.t("home.selectDanHint")}</p>
              )}
            </section>

            <section
              className="mt-6 w-full max-w-3xl bg-white/80 backdrop-blur rounded-3xl shadow-lg border border-indigo-100 p-6"
              aria-labelledby="kuku-count-legend"
            >
              <h2 id="kuku-count-legend" className="text-xl font-bold text-slate-700">
                {Util.t("home.countLegend")}
              </h2>
              <div className="mt-4 text-center">
                <span className="text-7xl font-bold text-indigo-700 tabular-nums">{totalQuestions}</span>
                <span className="text-2xl text-slate-600 ml-2">{Util.t("home.countUnit")}</span>
