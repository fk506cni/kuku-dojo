                          />
                          <span className="text-slate-600">{Util.t("proficiency." + i + ".label")}</span>
                        </li>
                      );
                    })}
                  </ul>

                  {/* 9×9 グリッド: 先頭行 / 先頭列に軸ラベルを置く 10 列レイアウト。
                      role="grid" は付けない (C09-03): row / rowgroup / gridcell の階層を伴わないため
                      ARIA grid パターンとして不整合になり、通常のボタン群として扱う方が SR 走査が素直になる。
                      セルは 48px 以上 (C09-01 / CLAUDE.md タッチターゲット規約) を満たす 3rem 角で描画。 */}
                  <div className="overflow-x-auto">
                    <div className="grid grid-cols-10 gap-1 min-w-[32rem]" role="group" aria-label={Util.t("stats.map.grid.aria")}>
                      <span aria-hidden="true" />
                      {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(function (m) {
                        return (
                          <span key={"h-" + m} className="text-xs text-slate-500 text-center font-bold self-center" aria-hidden="true">
                            ×{m}
                          </span>
                        );
                      })}
                      {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(function (dan) {
                        return (
                          <React.Fragment key={"row-" + dan}>
                            <span className="text-xs text-slate-500 text-right font-bold self-center pr-1" aria-hidden="true">
                              {Util.t("stats.map.axis.dan", { dan })}
                            </span>
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(function (m) {
                              const key = dan + "-" + m;
                              const cs = agg.cellStats[key];
                              const w = typeof weights[key] === "number" ? weights[key] : 1.0;
                              const level = Engine.proficiencyLevel(w, cs.correctRate, cs.attempts);
                              const meta = PROFICIENCY_META[level];
                              const isSel = selectedCell === key;
                              // cellCls は静的文字列から完全に構成されているので Tailwind 抽出 OK。
                              // min-w / min-h 3rem = 48px で CLAUDE.md タッチターゲット規約に準拠 (C09-01)。
                              const cls = isSel
                                ? "aspect-square min-w-[3rem] min-h-[3rem] rounded-lg text-sm font-bold border-2 ring-4 ring-indigo-400 focus:outline-none transition-colors tabular-nums " + meta.cellCls
                                : "aspect-square min-w-[3rem] min-h-[3rem] rounded-lg text-sm font-bold border-2 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors tabular-nums " + meta.cellCls;
                              return (
                                <button
                                  key={key}
                                  type="button"
                                  onClick={() => setSelectedCell(isSel ? null : key)}
                                  aria-label={Util.t("stats.map.cell.aria", { dan, m, product: dan * m, label: Util.t("proficiency." + level + ".label") })}
                                  aria-pressed={isSel}
                                  className={cls}
                                >
                                  {dan * m}
                                </button>
                              );
                            })}
                          </React.Fragment>
                        );
                      })}
                    </div>
                  </div>

                  {/* セル詳細カード (タップで開閉)。
                      role="region" を外し aria-live のみに留めることで SR の冗長読み上げを回避 (C09-05)。
                      選択変化時に scrollIntoView で可視領域へ寄せる (C09-10 useEffect 参照)。 */}
                  {detail && (
                    <div
                      ref={detailRef}
                      className="mt-4 p-4 bg-indigo-50 rounded-2xl border border-indigo-200"
                      aria-live="polite"
                    >
                      <div className="flex items-center justify-between gap-2">
                        <span className="text-2xl font-bold text-indigo-700 tabular-nums">
                          {detail.dan} × {detail.multiplier} = {detail.dan * detail.multiplier}
                        </span>
                        <span className={"text-xs font-bold px-3 py-1 rounded-full border-2 " + detail.meta.legendCls}>
                          {Util.t("proficiency." + detail.level + ".label")}
                        </span>
                      </div>
                      <dl className="mt-3 grid grid-cols-3 gap-2 text-sm">
                        <div className="bg-white rounded-xl p-2 text-center">
                          <dt className="text-slate-500">{Util.t("stats.map.detail.weightLabel")}</dt>
                          <dd className="text-lg font-bold text-slate-800 tabular-nums">{detail.weight.toFixed(1)}</dd>
                        </div>
                        <div className="bg-white rounded-xl p-2 text-center">
                          <dt className="text-slate-500">{Util.t("stats.map.detail.correctLabel")}</dt>
                          <dd className="text-lg font-bold text-green-700 tabular-nums">{Util.t("stats.map.detail.countUnit", { n: detail.cs.correct })}</dd>
                        </div>
                        <div className="bg-white rounded-xl p-2 text-center">
                          <dt className="text-slate-500">{Util.t("stats.map.detail.wrongLabel")}</dt>
                          <dd className="text-lg font-bold text-rose-700 tabular-nums">{Util.t("stats.map.detail.countUnit", { n: detail.cs.wrong })}</dd>
                        </div>
                      </dl>
                      {detail.cs.attempts === 0 && (
                        <p className="mt-2 text-sm text-slate-500">{Util.t("stats.map.detail.noRecent", { n: STATS_RECENT_N })}</p>
                      )}
                    </div>
                  )}
                </section>
              )}

              {/* ── がんばった きろく (v1.1.0 §8.8) ──
                  マップ側とは **意図的にデータ表現を分離** (C12-02 UX 毀損回避): マップは習熟度 5 階調、
                  こちらは時間。9×9 グリッドの形は同じだがセルに表示する値は avg (秒) で、到達セルのみ
                  bg-emerald-50 / border-emerald-200 の薄ミント。未達セルに派手な演出は付けない。
                  詳細カード: 横棒グラフ + 「だいたい ○びょう」 + 3 種類のバッジ + per-cell サンプル下限。 */}
              {tab === "time" && (
                <section
                  id="kuku-stats-panel-time"
                  role="tabpanel"
                  aria-labelledby="kuku-stats-tab-time"
                  className="bg-white/80 backdrop-blur rounded-3xl shadow-lg border border-indigo-100 p-6"
                >
                  <h2 id="kuku-stats-time-title" className="text-xl font-bold text-slate-700 mb-1">
                    {Util.t("stats.time.title")}
                  </h2>
                  {/* C16-12 / C16-13: 「みずいろ」は emerald (緑寄り) との色認識齟齬があるため「みどり + ★」に変更。
                      「-」セルと cold start の説明を足して、空欄セルが「データ不足」か「未練習」かを子供が推測できるようにする。 */}
                  <p className="text-sm text-slate-500 mb-3">
                    {Util.t("stats.time.desc.line1")}
                    {Util.t("stats.time.desc.line2")}
                  </p>

                  {/* 9×9 グリッド。マップ側と同じレイアウトを踏襲し、スクリーンリーダ UX の一貫性を保つ (C09-03)。
                      セル本体の背景は「到達 (emerald) / データあり (white) / データなし (slate)」の 3 段階のみ。
                      いずれも静的クラス文字列で三項分岐 (CLAUDE.md Tailwind 規約)。 */}
                  <div className="overflow-x-auto">
                    <div className="grid grid-cols-10 gap-1 min-w-[32rem]" role="group" aria-label={Util.t("stats.time.grid.aria")}>
                      <span aria-hidden="true" />
                      {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(function (m) {
                        return (
                          <span key={"th-" + m} className="text-xs text-slate-500 text-center font-bold self-center" aria-hidden="true">
                            ×{m}
                          </span>
                        );
                      })}
                      {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(function (dan) {
                        return (
                          <React.Fragment key={"trow-" + dan}>
                            <span className="text-xs text-slate-500 text-right font-bold self-center pr-1" aria-hidden="true">
                              {Util.t("stats.map.axis.dan", { dan })}
                            </span>
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(function (m) {
                              const key = dan + "-" + m;
                              const cs = agg.cellStats[key];
                              const hasSamples = Array.isArray(cs.responseTimes) && cs.responseTimes.length > 0;
                              const avgMs = typeof cs.avgResponseMs === "number" ? cs.avgResponseMs : null;
                              const reached = hasSamples && avgMs !== null && avgMs < settings.slowThresholdSec * 1000;
                              const isSel = selectedCell === key;
                              const avgSec = hasSamples ? (Math.round(avgMs / 100) / 10) : null;
                              // C16-08: 色覚多様性 (deuteranopia 等) 下で bg-emerald-50 と bg-white が
                              //   判別困難なため、reached セルは border-emerald-400 (濃い縁) に変更し、
                              //   さらに cell 本文先頭に "★" 記号を prepend して色以外の冗長手がかりを追加する。
                              //   aria-label の「とうたつ」と合わせて、視覚・SR の両方で非色情報を確保。
                              //   ★ (U+2605) は一部端末で絵文字カラーフォントに寄ることがある (C07-01 既知) が、
                              //   本用途は「色以外の冗長手がかり」なので emoji 化しても視認性を損なわない
                              //   （むしろ黄金色化は emerald 背景とのコントラストが増して色覚多様性にも有利）。
                              // bg 3 段階はそれぞれ完全な class 文字列で列挙 (CLAUDE.md Tailwind 規約)
                              const baseCls = reached
                                ? "bg-emerald-50 text-emerald-900 border-emerald-400"
                                : hasSamples
                                  ? "bg-white text-slate-800 border-slate-300"
                                  : "bg-slate-100 text-slate-400 border-slate-200";
                              const cls = isSel
                                ? "aspect-square min-w-[3rem] min-h-[3rem] rounded-lg text-xs font-bold border-2 ring-4 ring-indigo-400 focus:outline-none transition-colors tabular-nums " + baseCls
                                : "aspect-square min-w-[3rem] min-h-[3rem] rounded-lg text-xs font-bold border-2 focus:outline-none focus:ring-4 focus:ring-indigo-300 transition-colors tabular-nums " + baseCls;
                              const aria = hasSamples
                                ? Util.t(reached ? "stats.time.cell.aria.reached" : "stats.time.cell.aria.normal", { dan, m, sec: avgSec })
                                : Util.t("stats.time.cell.aria.noData", { dan, m });
                              const cellText = hasSamples
                                ? (reached ? "★" + avgSec : avgSec)
                                : "-";
                              return (
                                <button
                                  key={key}
                                  type="button"
                                  onClick={() => setSelectedCell(isSel ? null : key)}
                                  aria-label={aria}
                                  aria-pressed={isSel}
                                  className={cls}
                                >
                                  {cellText}
                                </button>
                              );
                            })}
                          </React.Fragment>
                        );
                      })}
                    </div>
                  </div>

                  {/* 詳細カード (タップで開閉)。
                      マップ側とは別計算（cs.responseTimes / cs.avgResponseMs / cs.responseAttempts を使う）で、
                      習熟度ラベル (PROFICIENCY_META) は出さない。時間と習熟度の混在を避ける (C12-02)。 */}
                  {selectedCell && (function () {
                    const parts = selectedCell.split("-");
                    const tDan = Number(parts[0]);
                    const tM = Number(parts[1]);
                    const cs = agg.cellStats[selectedCell];
                    const times = Array.isArray(cs.responseTimes) ? cs.responseTimes : [];
                    const avgMs = typeof cs.avgResponseMs === "number" ? cs.avgResponseMs : null;
                    const avgSec = avgMs !== null ? (Math.round(avgMs / 100) / 10) : null;
                    const slowBadge = Engine.isSlowAverage(avgMs, settings.slowThresholdSec);
                    // 直近と前回平均の差 (C13-11): 直近 1 サンプル vs それ以外の平均。
                    // responseTimes は新→古の順で最大 5 件。
                    const latest = times.length > 0 ? times[0] : null;
                    const older = times.slice(1);
                    const olderAvg = older.length > 0
                      ? older.reduce(function (a, b) { return a + b; }, 0) / older.length
                      : null;
                    const diffSec = (latest !== null && olderAvg !== null)
                      ? (latest - olderAvg) / 1000
                      : null;
                    // C16-07: N=2 (1 vs 1 サンプル) 比較は統計的に噪音が大きいため、older が 2 件以上 (= times 3 件以上)
                    // に到達してから praise を出す。SPEC §8.8.1 (5) C13-11「直近と前回平均の差」が「平均」を前提とする記述と整合。
                    const praiseBadge = diffSec !== null && diffSec <= -0.3 && older.length >= 2;
                    const praiseText = praiseBadge ? Math.abs(diffSec).toFixed(1) : null;
                    // reached (セル背景色) と同じ判定式を詳細カード側でも再計算する。
                    // C16-04: fewSamples メッセージは reached セルでは抑制し、「到達しているのにもっとやれ」の UX 矛盾を避ける。
                    const reachedDetail = avgMs !== null && avgMs < settings.slowThresholdSec * 1000;
                    // per-cell サンプル下限 (C13-07 / C16-04): 累積 responseTime 3 件未満 かつ 未到達 のセルにのみ表示。
                    const fewSamples = cs.responseAttempts < 3 && !reachedDetail;
                    // 棒グラフの max 幅基準: しきい値の 1.5 倍を 100% 相当にする。超過値は 100% に clamp。
                    const barMaxMs = settings.slowThresholdSec * 1000 * 1.5;
                    return (
                      <div
                        ref={detailRef}
                        className="mt-4 p-4 bg-indigo-50 rounded-2xl border border-indigo-200"
                        aria-live="polite"
                      >
                        <div className="flex items-center justify-between gap-2 flex-wrap">
                          <span className="text-2xl font-bold text-indigo-700 tabular-nums">
                            {tDan} × {tM} = {tDan * tM}
                          </span>
                          {avgSec !== null && (
                            <span className="text-base font-bold text-slate-700">
                              {Util.t("stats.time.detail.avgPrefix")}{" "}
                              <span className="text-2xl text-indigo-700 tabular-nums">{avgSec}</span>
                              <span className="ml-1">{Util.t("stats.time.detail.avgUnit")}</span>
                            </span>
                          )}
                        </div>
                        {/* C16-11: avgResponseMs は「直近最大 5 サンプルの平均」だが、
                            responseAttempts は lifetime 累積で semantic が異なる。
                            「直近 N 回の平均」であることを明示して、保護者が統計的信頼性を判断できるようにする。 */}
                        {avgSec !== null && times.length > 0 && (
                          <p className="mt-1 text-sm text-slate-500">
                            {Util.t("stats.time.detail.avgInfo", { n: times.length, total: cs.responseAttempts })}
                          </p>
                        )}

                        {times.length > 0 ? (
                          <ul className="mt-3 flex flex-col gap-1" aria-label={Util.t("stats.time.detail.list.aria", { n: times.length })}>
                            {times.map(function (rt, i) {
                              const sec = Math.round(rt / 100) / 10;
                              const widthPct = Math.min(100, (rt / barMaxMs) * 100);
                              // i===0 が最新。配列先頭ほど新しい。
                              return (
                                <li key={i} className="flex items-center gap-2">
                                  <span className="w-14 text-xs text-slate-500 shrink-0">
                                    {/* C16-01: i=1 は「1 つ前」なので `i + "かいまえ"` が正（旧 `(i+1) + "かいまえ"` は
                                        i=1 で「2かいまえ」になる off-by-one）。自然な日本語で「Nかいまえ」= N 回前。 */}
                                    {i === 0 ? Util.t("stats.time.detail.latest") : Util.t("stats.time.detail.nAgo", { n: i })}
                                  </span>
                                  <div className="flex-1 h-4 bg-white rounded-full overflow-hidden border border-slate-200">
                                    <div
                                      className="h-full bg-indigo-400"
                                      style={{ width: widthPct + "%" }}
                                      aria-hidden="true"
                                    />
                                  </div>
                                  <span className="w-14 text-right text-sm text-slate-700 tabular-nums shrink-0">
                                    {sec}{Util.t("stats.time.detail.secUnit")}
                                  </span>
                                </li>
                              );
                            })}
                          </ul>
                        ) : (
                          <p className="mt-3 text-sm text-slate-500">
                            {Util.t("stats.time.detail.noRecords")}
                          </p>
                        )}

                        {(praiseBadge || slowBadge) && (
                          <div className="mt-3 flex flex-wrap gap-2">
                            {praiseBadge && (
                              <span className="inline-flex items-center px-3 py-1 text-sm font-bold rounded-full bg-emerald-100 text-emerald-800 border-2 border-emerald-200">
                                {/* C16-02: 内部計算は latest 1 サンプル vs それ以外の平均 (最大 4 件) なので
                                    「このまえ」(単数) ではなく「さいきんの へいきん」で複数サンプル平均と整合させる。 */}
                                {Util.t("stats.time.detail.praise", { sec: praiseText })}
                              </span>
                            )}
                            {slowBadge && (
                              <span className="inline-flex items-center px-3 py-1 text-sm font-bold rounded-full bg-amber-50 text-amber-800 border-2 border-amber-200">
                                {Util.t("stats.time.detail.slow")}
                              </span>
                            )}
                          </div>
                        )}

                        {fewSamples && (
                          <p className="mt-3 text-sm text-slate-500">
                            {/* C16-04: 「もっとやれ」ではなく「解くと精度が上がる」の統計的ガイダンス寄りに。
                                reached セルでは fewSamples 自体が false になるので、この表示は未到達セル限定。 */}
                            {Util.t("stats.time.detail.fewSamples")}
                          </p>
                        )}
                      </div>
                    );
                  })()}
                </section>
              )}

              {/* ── にがて ワースト 5 ── */}
              {tab === "weak" && hasData && (
                <section
                  id="kuku-stats-panel-weak"
                  role="tabpanel"
                  aria-labelledby="kuku-stats-tab-weak"
                  className="bg-white/80 backdrop-blur rounded-3xl shadow-lg border border-indigo-100 p-6"
                >
                  <h2 id="kuku-stats-weak-title" className="text-xl font-bold text-slate-700 mb-1">
                    {Util.t("stats.weak.title")}
                  </h2>
                  {weakTop5.length === 0 ? (
                    // weight > 1.0 のエントリが 1 件も無い = まだ苦手問題が顕在化していない状態 (C09-09)
                    <p className="mt-2 text-base text-slate-700">
                      {Util.t("stats.weak.empty.line1")}<br />{Util.t("stats.weak.empty.line2")}
                    </p>
                  ) : (<>
                  <p className="text-sm text-slate-500 mb-3">{Util.t("stats.weak.hint")}</p>
                  <ul className="flex flex-col gap-2">
                    {weakTop5.map(function (item, i) {
                      const cs = agg.cellStats[item.key];
                      return (
                        <li
                          key={item.key}
                          className="flex items-center gap-3 p-3 bg-white rounded-xl border-2 border-rose-200"
                        >
                          <span className="text-xl font-bold text-rose-600 tabular-nums w-8 text-center shrink-0">
                            {i + 1}
                          </span>
                          <span className="text-2xl font-bold text-slate-800 tabular-nums flex-1">
                            {item.dan} × {item.multiplier} = {item.dan * item.multiplier}
                          </span>
                          <span className="text-xs text-slate-600 text-right shrink-0 leading-tight">
                            <span className="block">
                              {Util.t("stats.weak.weightLabel")}{" "}
                              <span className="text-base font-bold text-rose-700 tabular-nums">
                                {item.weight.toFixed(1)}
                              </span>
                            </span>
                            <span className="block">
                              {cs.attempts > 0
                                ? Util.t("stats.weak.stats", { correct: cs.correct, attempts: cs.attempts })
                                : Util.t("stats.weak.noData")}
                            </span>
                          </span>
                        </li>
                      );
                    })}
                  </ul>
                  </>)}
                </section>
              )}
            </div>
          </main>
        );
      }

      // ── screens: WelcomeNotice ───────────────────────────────────
      // 初回起動時のデータ消失注意 (prompts.md Step 9)。kuku_welcomed が未書き込みの
      // ユーザーにだけ一度だけ表示する。プライベートブラウズではそもそも保存できないので
      // Storage.isFirstLaunch が false を返し、このモーダルは出ない (毎回出るのを避けるため)。
      function WelcomeNotice({ onDismiss }) {
        const modalRef = useRef(null);
        // 自動で開くモーダルなのでトリガ要素がない。autoFocus が commit 中に activeElement を
        // モーダル内ボタンへ移してしまうため、ここで前フォーカス捕捉を試みても意味がない。
        // 閉じたら body に戻り、ユーザは LoginScreen 内を tab で辿れるので実害なし。
        useModalFocusTrap(modalRef, onDismiss, null);

        return (
          <div
            ref={modalRef}
            className="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4"
            role="dialog"
            aria-modal="true"
            aria-labelledby="kuku-welcome-title"
            aria-describedby="kuku-welcome-desc"
          >
            <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl p-6 text-center">
              <div className="text-6xl leading-none" aria-hidden="true">🐱</div>
              <h2 id="kuku-welcome-title" className="mt-3 text-2xl font-bold text-indigo-700">
                {Util.t("welcome.title")}
              </h2>
              <p id="kuku-welcome-desc" className="mt-4 text-base text-slate-700 leading-relaxed">
                {Util.t("welcome.line1")}<br />
                {Util.t("welcome.line2")}<br />
                {Util.t("welcome.line3")}
              </p>
              <button
                type="button"
                onClick={onDismiss}
                autoFocus
                className="w-full mt-6 min-h-[56px] px-4 py-3 bg-indigo-600 text-white text-xl font-bold rounded-2xl shadow-md hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-300"
              >
                {Util.t("welcome.dismiss")}
              </button>
            </div>
          </div>
        );
      }

      // ── app (routing) ─────────────────────────────────────────────
      // 保護されたルート: account が null のときに #/login に差し戻す対象
      const PROTECTED_ROUTES = ["#/home", "#/quiz", "#/result", "#/stats"];

      function App() {
        const hash = useHash();
        const [accounts, setAccounts] = useState(() => Storage.loadAccounts());
        const [currentAccountId, setCurrentAccountId] = useState(() => Storage.loadCurrentAccountId());
        const [storageWarning, setStorageWarning] = useState(null);
        // 初回起動案内。checkAvailability は useEffect 内で走るため、初期値は false に固定し
        // useEffect 側で isFirstLaunch を評価してから開く (Step 9 / prompts.md)。
        const [showWelcome, setShowWelcome] = useState(false);
        // quiz 設定 (段選択・問題数) はセッション跨ぎで保持しない。初期値は SPEC.md §2.3 のデフォルト。
        const [selectedDans, setSelectedDans] = useState(() => [1, 2, 3, 4, 5, 6, 7, 8, 9]);
        const [totalQuestions, setTotalQuestions] = useState(27);
        const [settings, setSettings] = useState(() => {
          const id = Storage.loadCurrentAccountId();
          const s = id ? Storage.loadSettings(id) : { ...DEFAULT_SETTINGS };
          // v1.2.0 Phase A / SPEC §8.9 / C13-15: 初回 render より前に I18n.current を確定させる。
          // useState 初期化関数は mount 時 1 回だけ同期実行されるので、JSX 側の Util.t が
          // 最初から正しい言語を引く。v1.2.0 Phase B / C17-09: <html lang> も同時に同期する。
          // 第18回 ユーザー判断 案 A: id が無い場合 (Login 画面起動 / ログアウト後再起動) は
          // device-level lang preference を優先参照することで「ja 環境ブラウザ + en 設定 Account」
          // ユーザーの Login 画面 ja 表示退行を解消する (initialLang)。
          const initialLang = id ? s.lang : Storage.loadLangPreference();
          applyEffectiveLang(initialLang);
          return s;
        });

        const account = useMemo(
          () => accounts.find((a) => a.id === currentAccountId) || null,
          [accounts, currentAccountId]
        );

        // アカウント切替時に設定を再読込。削除直後 (currentAccountId===null) はデフォルトに戻す。
        // v1.2.0 Phase A: setSettings より前に I18n.current を同期更新し、次 render で即座に
        // 新アカウントの言語で描画できるようにする。v1.2.0 Phase B / C17-09: <html lang> も同時同期。
        // 第18回 ユーザー判断 案 A: アカウント確定時は Settings.lang を device-level preference に
        // 保存し、ログアウト後の Login 画面起動時に最後の言語を引き継ぐ。null 経路 (Logout/削除直後)
        // では device pref を読み戻し、現在ブラウザ言語ではなく直近のユーザー意図に従う。
        useEffect(() => {
          if (currentAccountId) {
            const loaded = Storage.loadSettings(currentAccountId);
            applyEffectiveLang(loaded.lang);
            Storage.saveLangPreference(loaded.lang);
            setSettings(loaded);
          } else {
            applyEffectiveLang(Storage.loadLangPreference());
            setSettings({ ...DEFAULT_SETTINGS });
          }
        }, [currentAccountId]);

        // Step 7: SoundPlayer は React 外にある singleton のため、settings 変化時に明示同期する。
        // soundEnabled === false で playCorrect/Wrong/Fanfare が即 return する契約の前提 (prompts.md Step 7)。
        // 初期 mount / アカウント切替 / Settings モーダル操作のすべてで追従する。
        useEffect(() => {
          SoundPlayer.setSettings(settings);
        }, [settings]);

        // Navigation guard: 保護ルートで account が無ければ #/login に差し戻す。
        // LoginScreen 直接のリロード対策 + アカウント削除直後に #/home 履歴が残っているケースを補正。
        useEffect(() => {
          if (PROTECTED_ROUTES.indexOf(hash) !== -1 && !account) {
            window.location.replace("#/login");
          }
        }, [hash, account]);

        const ctxValue = useMemo(
          () => ({
            accounts,
            account,
            settings,
            selectedDans,
            totalQuestions,
            setSelectedDans,
            setTotalQuestions,
            // オブジェクト or 関数型 setter の両方を受ける (C05-06)。
            // 関数型の場合は `prev` を受けて新しい settings を返す。
            updateSettings: (updater) => {
              setSettings((prev) => {
                const next = typeof updater === "function" ? updater(prev) : updater;
                // v1.2.0 Phase A: lang 変更を同期で I18n.current に反映 (次 render が新言語で描画)。
                // v1.2.0 Phase B / C17-09: <html lang> も同時同期する。
                // 第18回 ユーザー判断 案 A: lang 変更時は device-level preference にも保存し、
                // ログアウト後の Login 画面起動時にも引き継ぐ。
                if (next && typeof next.lang === "string") {
                  applyEffectiveLang(next.lang);
                  Storage.saveLangPreference(next.lang);
                }
                if (currentAccountId) Storage.saveSettings(currentAccountId, next);
                return next;
              });
            },
            // accounts の closure が stale になる余地を塞ぐため関数型 setter を使う (C05-16)。
            createAccount: (name, avatarIndex) => {
              const newAccount = {
                id: Util.uuid(),
                name,
                avatarIndex,
                createdAt: Date.now(),
              };
              // accounts 更新と独立した weights / settings 永続化は先に実行 (C04-04)。
              Storage.saveWeights(newAccount.id, Engine.initialWeights());
              Storage.saveSettings(newAccount.id, { ...DEFAULT_SETTINGS });
              setAccounts((prev) => {
                const next = prev.concat(newAccount);
                Storage.saveAccounts(next);
                return next;
              });
              return newAccount;
            },
            login: (id) => {
              // 失敗は Storage._onStorageError 経由のバナー通知で可視化。遷移は継続 (C04-05)。
              Storage.saveCurrentAccountId(id);
              setCurrentAccountId(id);
            },
            logout: () => {
              Storage.saveCurrentAccountId(null);
              setCurrentAccountId(null);
            },
            removeAccount: () => {
              if (!currentAccountId) return;
              Storage.deleteAccount(currentAccountId);
              setCurrentAccountId(null);
              setAccounts(Storage.loadAccounts());
            },
          }),
          // `account` は `accounts` / `currentAccountId` から導出されるため deps には含めない (C05-07)。
          // 両者の変化時に自動で ctxValue が再生成され、`account` 参照も新値に追従する。
          [accounts, settings, selectedDans, totalQuestions, currentAccountId]
        );

        useEffect(() => {
          // ストレージエラーハンドラ登録 (SPEC.md §2.4)
          Storage._onStorageError = (msg) => setStorageWarning(msg);

          // プライベートブラウズ検出
          Storage.checkAvailability();

          // 初回起動の案内 (Step 9 / prompts.md)。checkAvailability 後に評価する。
          // プライベートブラウズ時は isFirstLaunch が false を返すため、案内は出さない。
          if (Storage.isFirstLaunch()) setShowWelcome(true);

          // SPEC §5.2: 最初のユーザー操作で AudioContext.resume() を呼ぶ。
          // LoginScreen の特定ハンドラではなく document level の once リスナで拾うことで、
          // 新規作成フローの「あたらしくつくる」タップ (C04-01) も Escape (C04-12) も包括対応。
          // async 関数の Promise 拒否は .catch で握り潰し、Step 7 退行を console.warn で可視化 (C04-02)。
          const firstGesture = () => {
            document.removeEventListener("pointerdown", firstGesture, true);
            document.removeEventListener("keydown", firstGesture, true);
            try {
              const p = SoundPlayer.ensureAudioContext();
              if (p && typeof p.catch === "function") {
                p.catch(function (err) {
                  console.warn("[kuku-dojo] audio: ensureAudioContext rejected:", err && err.message);
                });
              }
            } catch (e) {
              console.warn("[kuku-dojo] audio: ensureAudioContext threw:", e.message);
            }
          };
          document.addEventListener("pointerdown", firstGesture, true);
          document.addEventListener("keydown", firstGesture, true);

          // C08-01: タブ復帰 / BFCache 復元で AudioContext が interrupted 相当になっている可能性に備え、
          //        次の play 前に ensureAudioContext を走らせ直すため _resumed を落とす。
          //        実際の再生成は次のユーザージェスチャ or ResultScreen の ensureAudioContext 先行呼び出しで行う。
          const onVisibilityChange = () => {
            if (document.visibilityState === "visible") {
              SoundPlayer.invalidate();
            }
          };
          const onPageShow = (e) => {
            if (e.persisted) SoundPlayer.invalidate();
          };
          document.addEventListener("visibilitychange", onVisibilityChange);
          window.addEventListener("pageshow", onPageShow);

          // 起動完了マーク: 2 指標を同時に出す (C01-02 / SPEC.md §6.1.1)
          //   total : navigationStart → App mount の総合時間 (HTML/CDN ダウンロード + Babel + React 含む)
          //   js    : <script type="text/babel"> 先頭 → App mount (Babel 変換 + 初回レンダのみ)
          // SPEC.md §6.1 の「起動 5 秒以内」目標は total を指す。js は退行の原因切り分け用。
          performance.mark("kuku-app-mounted");
          const totalMs = Math.round(performance.now());
          let jsMs = null;
          try {
            performance.measure("kuku-startup-js", "kuku-app-script-start", "kuku-app-mounted");
            const m = performance.getEntriesByName("kuku-startup-js").pop();
            if (m) jsMs = Math.round(m.duration);
          } catch (e) {
            // 古いブラウザで measure が使えなくても無害
          }
          console.info(
            "[kuku-dojo] startup:",
            "total=" + totalMs + "ms",
            jsMs !== null ? "js=" + jsMs + "ms" : ""
          );

          return () => {
            Storage._onStorageError = null;
            document.removeEventListener("pointerdown", firstGesture, true);
            document.removeEventListener("keydown", firstGesture, true);
            document.removeEventListener("visibilitychange", onVisibilityChange);
            window.removeEventListener("pageshow", onPageShow);
          };
        }, []);

        // C10-12: storageWarning バナーも Esc で閉じられるようにする (他モーダル・画面との一貫性確保)。
        //        screen レベル Esc listener (StatsScreen / ResultScreen / QuizScreen openPause) が先に
        //        e.preventDefault() を呼んだ場合はこちらはスキップして二重動作を避ける。
        //        ModalStack が積まれているときは最上位モーダルの Esc を尊重する。
        useEffect(() => {
          if (!storageWarning) return;
          const onKey = (e) => {
            if (e.defaultPrevented) return;
            if (ModalStack.length > 0) return;
            if (e.isComposing || e.keyCode === 229) return;
            if (e.key === "Escape") {
              setStorageWarning(null);
            }
          };
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, [storageWarning]);

        // 保護ルートで account が無い過渡フレームは LoginScreen にフォールバック (useEffect の replace 前)。
        const needsAccount = PROTECTED_ROUTES.indexOf(hash) !== -1;
        let screen;
        if (needsAccount && !account) {
          screen = <LoginScreen />;
        } else {
          switch (hash) {
            case "#/login":  screen = <LoginScreen />; break;
            case "#/home":   screen = <HomeScreen />; break;
            case "#/quiz":   screen = <QuizScreen />; break;
            case "#/result": screen = <ResultScreen />; break;
            case "#/stats":  screen = <StatsScreen />; break;
            default:
              // 不明ハッシュは #/login に差し戻す (SPEC.md §4.1)
              window.location.replace("#/login");
              screen = <LoginScreen />;
          }
        }

        const dismissWelcome = () => {
          // C10-11: 書き込み失敗 (Storage._available=false / Quota) でも UI はモーダルを閉じる。
          //        永続化失敗自体は Storage._onStorageError 経由の storageWarning バナーで可視化されるため
          //        「わかったよ」のクリック応答自体は子供に即座にフィードバックする。
          Storage.markLaunched();
          setShowWelcome(false);
        };

        return (
          <AppContext.Provider value={ctxValue}>
            {storageWarning && (
              // C10-06: z-[60] でモーダル層 (z-50) より上位に配置する。データ永続化エラーは
              //        モーダル操作より優先度が高い通知のため、全モーダルに被らせて可視化する。
              //        z-[60] は Tailwind の任意値クラスとして静的リテラルで確保される (CLAUDE.md ルール)。
              <div className="fixed top-0 left-0 right-0 bg-amber-100 text-amber-800 z-[60] flex items-center justify-center gap-3 px-3 py-2">
                <span className="text-base">{storageWarning}</span>
                {/* 閉じるボタン: 48px タッチターゲットを確保 (C05-13 / CLAUDE.md 48px ルール) */}
                <button
                  type="button"
                  onClick={() => setStorageWarning(null)}
                  aria-label={Util.t("app.banner.close")}
                  className="min-h-[48px] min-w-[48px] text-amber-900 text-2xl font-bold hover:bg-amber-200 rounded-lg focus:outline-none focus:ring-4 focus:ring-amber-300"
                >
                  <span aria-hidden="true">×</span>
                </button>
              </div>
            )}
            {screen}
            {showWelcome && <WelcomeNotice onDismiss={dismissWelcome} />}
          </AppContext.Provider>
        );
      }

      // ── mount ─────────────────────────────────────────────────────
      const rootEl = document.getElementById("root");
      if (!rootEl) {
        // ここに来る時点でテンプレート破損。最低限のエラーを素の HTML で出す (C01-10)
        document.body.innerHTML =
          '<main style="padding:2rem;font-family:sans-serif">エラー: #root がみつかりません</main>';
      } else {
        ReactDOM.createRoot(rootEl).render(<App />);
      }
    </script>
  </body>
</html>
