    <!-- Tailwind Play CDN: ビルド不要で単一HTML配布を成立させるため。 -->
    <!-- Tailwind は semver 付き CDN URL を公開していないため URL 上ピン留め不可。 -->
    <!-- マイナー更新時の挙動差異は README.md の「開発者向け」運用メモで吸収する (C01-05)。 -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React / ReactDOM / Babel: ブラウザ内 JSX 変換で外部ビルドを回避。 -->
    <!-- マイナーまでピンし CDN 側サイレント退行を防ぐ (C01-05)。 -->

    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>

    <!-- KUKU-CDN-END -->

    <!-- SPEC.md §5.0 / CLAUDE.md 光過敏性チェックリスト準拠: prefers-reduced-motion フォールバック (C04-14) -->
    <!-- ユーザーが OS 設定でアニメ抑制を指示した場合、Tailwind のトランジション・カスタム animation も全停止する -->
    <!-- Step 7 追加の kuku-* keyframes も * セレクタで停止するので個別対応不要 -->
    <style>
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          /* C08-04: forwards fill-mode を打ち消す。toast-pop 等 100% opacity:0 keyframe を
             forwards で定着させる inline style があり、reduced-motion で要素が完全に非表示になる退行を防ぐ */
          animation-fill-mode: none !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
        /* C10-07: backdrop-filter: blur は transition 対象外で上の transition-duration 無効化では落とせない。
           reduced-motion 指定下では blur を無効化してフォーカスアシストが効くコントラストを確保する。
           モーダル背景 (WelcomeNotice / CreateAccountModal / DeleteConfirmModal / PauseConfirmModal) に適用される。 */
        .backdrop-blur-sm, .backdrop-blur {
          backdrop-filter: none !important;
          -webkit-backdrop-filter: none !important;
        }
      }

      /* Step 7 子供向けエフェクト用 keyframes (SPEC §5.0 PSE 配慮)
         - 全周期 ≥ 0.33s (3Hz 超の点滅を出さない)
         - infinite は breath (4s=0.25Hz) / tilt (2s=0.5Hz) のみ、いずれも ≤ 1Hz
         - background-color の白⇄黒切替は使わず transform / opacity 補間のみ
         - 1 回きりの演出は全て 1.5s 以内で終息 */
      @keyframes kuku-mascot-breath {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.06); }
      }
      @keyframes kuku-mascot-tilt {
        0%, 100% { transform: rotate(-4deg); }
        50%      { transform: rotate(4deg); }
      }
      @keyframes kuku-mascot-bounce {
        0%   { transform: translateY(0); }
        30%  { transform: translateY(-14px); }
        60%  { transform: translateY(0); }
        100% { transform: translateY(0); }
      }
      @keyframes kuku-mascot-shake {
        0%, 100% { transform: translateX(0); }
        25%      { transform: translateX(-5px); }
        75%      { transform: translateX(5px); }
      }
      @keyframes kuku-mascot-jump {
        0%   { transform: translateY(0) scale(1); }
        40%  { transform: translateY(-26px) scale(1.08); }
        80%  { transform: translateY(0) scale(1); }
        100% { transform: translateY(0) scale(1); }
      }
      @keyframes kuku-toast-pop {
        0%   { opacity: 0; transform: translate(-50%, -12px); }
        15%  { opacity: 1; transform: translate(-50%, 0); }
        85%  { opacity: 1; transform: translate(-50%, 0); }
        100% { opacity: 0; transform: translate(-50%, -8px); }
      }
      @keyframes kuku-combo-pop {
        0%   { transform: scale(0.85); }
        40%  { transform: scale(1.12); }
        100% { transform: scale(1); }
      }
    </style>

      /** 簡易 UUID v4 生成 */
      function uuid() {
        return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
          const r = (Math.random() * 16) | 0;
          const v = c === "x" ? r : (r & 0x3) | 0x8;
          return v.toString(16);
        });

      // tests/helpers/load-core.mjs の VM sandbox には document が存在しないため typeof ガードで
      // 空辞書 fallback する。current は v1.2.0 Phase B 以降 applyEffectiveLang() 経由で確定後に代入する
      // (第13回 C13-15 / 第17回 C17-09 / 第18回 C18-19)。
      // 第17回 C17-03: element 消失 (dist 側 post-processor による改変 / browser extension の DOM 操作) /
      //   JSON.parse 失敗 (BOM 混入 / 文字化け) でも空辞書 fallback し起動を止めない。Util.t は
      //   key 文字列フォールバックで一応描画可能 (UI が英字 key だらけになる劣化表示だが、空白画面よりはマシ)。
      const I18n = (function () {
        let messages = { ja: {} };
        if (typeof document !== "undefined" && document.getElementById) {
          const el = document.getElementById("kuku-messages");
          if (el && el.textContent) {
            try {
              const parsed = JSON.parse(el.textContent);
              // parsed が object 以外 (null / 配列 / 数値) の場合も fallback 維持
              if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) {

              }
            } catch (e) {
              console.warn("[kuku-dojo] I18n: MESSAGES parse failed, falling back to empty ja dict:", e.message);
            }
          } else {
            console.warn("[kuku-dojo] I18n: #kuku-messages element missing, falling back to empty ja dict");
          }
        }
        return { messages, current: null };
      })();

      /**
       * ブラウザの言語設定から実効言語 (SUPPORTED_LANGS から "auto" を除いた値) を決定する。
       * SPEC §8.9.3 / C12-19 (navigator.languages の undefined / 空文字列ガード)。
       * - navigator.languages[] を先に走査、無ければ [navigator.language || "ja"]
       * - Phase C (v1.3.0): 初期 6 言語フル展開 (ja/en/zh-CN/zh-TW/ko/vi)。FALLBACKS で region variant

       * - 完全一致 → base 部分一致 の順で採用、最終的に ja フォールバック
       * @returns {"ja"|"en"|"zh-CN"|"zh-TW"|"ko"|"vi"}
       */
      function detectLang() {
        const SUPPORTED = ["ja", "en", "zh-CN", "zh-TW", "ko", "vi"];
        const FALLBACKS = { "zh-HK": "zh-TW", "zh-MO": "zh-TW", "zh-SG": "zh-CN" };

          ? nav.languages
          : [nav.language || "ja"];

          const raw = raws[i];
          // C12-19: raw が string 以外 (undefined / null / 数値) の混入に対する防御
          if (typeof raw !== "string" || raw === "") continue;
          const tag = FALLBACKS[raw] || raw;
          if (SUPPORTED.indexOf(tag) !== -1) return tag;
          const base = tag.split("-")[0];
          if (SUPPORTED.indexOf(base) !== -1) return base;

      // 既存の「setSettings より前に I18n.current を同期更新して次 render で新言語描画」
      // パターンを維持するため、useEffect ではなく呼出側でインライン実行する関数として提供。

      //
      // 第18回 C18-01 / 旧 C17-11 注記: 本ヘルパー導入後も「アカウント切替時の useEffect 経路」では

        I18n.current = effective;
        if (typeof document !== "undefined" && document.documentElement) {

        uuid,
        detectLang,
        applyEffectiveLang,
        /**
         * MESSAGES から翻訳文字列を取得する (v1.2.0 Phase A / SPEC §8.9.5)。
         * フォールバック順: I18n.current の辞書 → ja → key 文字列そのまま。
         * params は `{name}` プレースホルダ置換。数値は呼出側で `toFixed` / `toLocaleString` 等で
         * 文字列化してから渡す (SPEC §8.9.4 / C13-11)。
         * @param {string} key - ドット区切り (例: "quiz.correct")
         * @param {Record<string, string|number>} [params]
         * @returns {string}
         */
        t(key, params) {
          const lang = I18n.current || "ja";
          const dict = I18n.messages[lang] || I18n.messages.ja;
          let s = (dict && dict[key]) || (I18n.messages.ja && I18n.messages.ja[key]) || key;
          if (params) {
            for (const [k, v] of Object.entries(params)) s = s.split("{" + k + "}").join(String(v));

        /**

         * 置換し、retry summary 等の和英混合 ("×3・5・7") を解消する。
         * Intl.ListFormat 非対応環境 (極めて稀) は ", " 連結に fallback する。

         */

          const lang = I18n.current || "ja";
          const arr = Array.from(items, String);
          if (typeof Intl !== "undefined" && typeof Intl.ListFormat === "function") {

              return new Intl.ListFormat(lang, { style: "narrow", type: "conjunction" }).format(arr);

            }

          return arr.join(", ");

      const SUPPORTED_LANGS = Object.freeze(["auto", "ja", "en", "zh-CN", "zh-TW", "ko", "vi"]);

      const WRONG_WEIGHT_BOOST_PRESETS = Object.freeze([0.5, 1.0, 2.0]);

        try {
          const raw = localStorage.getItem(key);
          if (raw === null) return fallback;
          return JSON.parse(raw);
        } catch (e) {

          }
          return fallback;
        }

       * @param {string|null} [accountId] - 容量超過時にセッション削除する対象アカウント
       * @returns {boolean}
       */
      function _writeJSON(key, value, accountId) {
        if (!Storage._available) return false;
        try {
          localStorage.setItem(key, JSON.stringify(value));
          return true;
        } catch (e) {
          if (e.name === "QuotaExceededError" || e.code === 22) {
            if (_trimOldestSessions(accountId)) {
              try {
                localStorage.setItem(key, JSON.stringify(value));
                return true;
              } catch (_) {}
            }
            console.warn("[kuku-dojo] storage: quota exceeded, retry failed:", key);
            if (Storage._onStorageError) Storage._onStorageError(Util.t("storage.error.saveFailed"));
            return false;
          }
          console.warn("[kuku-dojo] storage: write failed:", key, e.message);
          if (Storage._onStorageError) Storage._onStorageError(Util.t("storage.error.saveFailed"));
          return false;
        }
      }

       * @param {string|null|undefined} accountId
       * @returns {boolean} 1 件以上削除できたら true
       */
      function _trimOldestSessions(accountId) {
        try {
          const ids = accountId
            ? [accountId]
            : Storage.loadAccounts().map(function (a) { return a.id; });
          let trimmed = false;
          for (let i = 0; i < ids.length; i++) {
            const sKey = "kuku_sessions_" + ids[i];
            const raw = localStorage.getItem(sKey);
            if (!raw) continue;
            let sessions;
            try {
              sessions = JSON.parse(raw);
            } catch (_) {

              try { localStorage.removeItem(sKey); } catch (__) {}

            if (!Array.isArray(sessions) || sessions.length === 0) continue;
            sessions.sort(function (a, b) { return a.timestamp - b.timestamp; });
            sessions.splice(0, Math.min(QUOTA_TRIM_COUNT, sessions.length));
            localStorage.setItem(sKey, JSON.stringify(sessions));
            trimmed = true;
          }
          return trimmed;
        } catch (_) {
          return false;
        }
      }

      const Storage = {
        /** @type {((msg: string) => void) | null} */
        _onStorageError: null,
        _available: true,

        /**
         * プライベートブラウズ検出: 起動直後に書き込みテスト (SPEC.md §2.4)。
         * @returns {boolean}
         */
        checkAvailability() {
          try {
            var testKey = "kuku__storage_test";
            localStorage.setItem(testKey, "1");
            localStorage.removeItem(testKey);
            Storage._available = true;
          } catch (e) {
            Storage._available = false;
            console.warn("[kuku-dojo] storage: not available (private browsing?)", e.message);
            if (Storage._onStorageError) {
              Storage._onStorageError(Util.t("storage.error.privateMode"));
            }
          }
          return Storage._available;
        },

        /** @returns {Account[]} */
        loadAccounts() {
          return _readJSON("kuku_accounts", []);
        },

        /**
         * @param {Account[]} accounts
         * @returns {boolean} 書き込み成功で true、_available===false / QuotaExceeded 再試行失敗で false (C04-05)
         */
        saveAccounts(accounts) {
          return _writeJSON("kuku_accounts", accounts);
        },

        /** @returns {string|null} */
        loadCurrentAccountId() {
          if (!Storage._available) return null;
          try {
            return localStorage.getItem("kuku_current_account_id") || null;
          } catch (e) {
            console.warn("[kuku-dojo] storage: cannot read current account id:", e.message);
            return null;
          }
        },

        /**
         * @param {string|null} id
         * @returns {boolean} 書き込み成功で true、失敗で false (C04-05)
         */
        saveCurrentAccountId(id) {
          if (!Storage._available) return false;
          try {
            if (id === null) {
              localStorage.removeItem("kuku_current_account_id");
            } else {
              localStorage.setItem("kuku_current_account_id", id);
            }
            return true;
          } catch (e) {
            console.warn("[kuku-dojo] storage: cannot write current account id:", e.message);
            if (Storage._onStorageError) Storage._onStorageError(Util.t("storage.error.saveFailed"));
            return false;
          }
        },

        /**
         * @param {string} accountId
         * @returns {WeightMap}
         */
        loadWeights(accountId) {
          return _readJSON("kuku_weights_" + accountId, {});
        },

        /**
         * @param {string} accountId
         * @param {WeightMap} weights
         * @returns {boolean} 書き込み成否 (C04-05)
         */
        saveWeights(accountId, weights) {
          return _writeJSON("kuku_weights_" + accountId, weights, accountId);
        },

        /**
         * @param {string} accountId
         * @returns {SessionResult[]}
         */
        loadSessions(accountId) {
          return _readJSON("kuku_sessions_" + accountId, []);
        },

        /**
         * 100 件を超えたら古い順に切り落とす (SPEC.md §2.3)。
         * C07-09: 呼び出し側契約「末尾 = 新セッション」を守り、clock skew (端末時計巻き戻り) で
         * 新セッションが最古扱いになっても trim の対象にしない。
         * @param {string} accountId
         * @param {SessionResult[]} sessions
         * @returns {boolean} 書き込み成否 (C04-05)
         */
        saveSessions(accountId, sessions) {
          try {
            // 末尾 = 新セッションを常に保持し、それ以外を timestamp 昇順で並べ替えて末尾側を残す。
            const keepNewestTrim = function (arr, limit) {
              if (arr.length <= limit) return arr;
              const newest = arr[arr.length - 1];
              const others = arr.slice(0, -1);
              others.sort(function (a, b) { return a.timestamp - b.timestamp; });
              return others.slice(others.length - (limit - 1)).concat([newest]);
            };
            sessions = keepNewestTrim(sessions, SESSION_LIMIT);
            if (_writeJSON("kuku_sessions_" + accountId, sessions, accountId)) return true;
            // Quota 回復失敗: sessions をさらに削減してリトライ (C02-02)。末尾は変わらず保持。
            const reduced = keepNewestTrim(sessions, Math.max(1, sessions.length - QUOTA_TRIM_COUNT));
            return _writeJSON("kuku_sessions_" + accountId, reduced, accountId);
          } catch (e) {
            console.warn("[kuku-dojo] storage: saveSessions failed:", e.message);
            if (Storage._onStorageError) Storage._onStorageError(Util.t("storage.error.saveFailed"));
            return false;
          }
        },

        /**
         * @param {string} accountId
         * @returns {Settings}
         */
        loadSettings(accountId) {
          const raw = _readJSON("kuku_settings_" + accountId, null);
          // 旧バージョンで保存された Settings に wrongWeightBoost 等の新フィールドが
          // 無い場合は DEFAULT_SETTINGS で欠損分だけ補う (前方互換マイグレーション)。
          // C11-04: typeof [] === "object" なので配列は typeof ガードを通過する。
          // 配列が入っていると数値インデックスキー "0"/"1"/... が Settings に混入するため明示除外。
          if (!raw || typeof raw !== "object" || Array.isArray(raw)) return { ...DEFAULT_SETTINGS };
          const merged = { ...DEFAULT_SETTINGS, ...raw };
          // C11-06: wrongWeightBoost が 3 プリセット (0.5/1.0/2.0) 外のときは 1.0 (ふつう) に正規化。
          // localStorage 手編集で 1.5 等が入ると SettingsModal の 3 ボタンが全非選択になる UX 退行を防ぐ。
          // v1.2.0 Phase A: PRESETS は [value,...] に縮退したため map 不要で直接参照。
          if (WRONG_WEIGHT_BOOST_PRESETS.indexOf(merged.wrongWeightBoost) === -1) {
            merged.wrongWeightBoost = DEFAULT_SETTINGS.wrongWeightBoost;
          }
          // v1.1.0 §8.8.2 / C12-21: slowThresholdSec も 4 プリセット外 (旧 3 秒 / 手編集 / 文字列) は
          // 10 (ふつう) に正規化。v1.0.x → v1.1.0 の前方互換マイグレは {...DEFAULT_SETTINGS, ...raw}
          // のスプレッドで欠損補完されるため、ここは「プリセット外値の正規化」のみ担う。
          const slowPresetValues = SLOW_THRESHOLD_PRESETS;
          if (slowPresetValues.indexOf(merged.slowThresholdSec) === -1) {
            merged.slowThresholdSec = DEFAULT_SETTINGS.slowThresholdSec;
          }
          // v1.2.0 Phase A (SPEC §8.9.9): lang も SUPPORTED_LANGS 外 (未知言語コード / 手編集 / 型不正)
          // は "auto" に正規化。v1.0.x / v1.1.0 → v1.2.0 の前方互換マイグレは DEFAULT_SETTINGS の
          // lang:"auto" スプレッド補完で自動的に埋まる。ここは「値域外の正規化」を担う。
          if (SUPPORTED_LANGS.indexOf(merged.lang) === -1) {
            merged.lang = DEFAULT_SETTINGS.lang;
          }
          return merged;
        },

        /**
         * @param {string} accountId
         * @param {Settings} settings
         * @returns {boolean} 書き込み成否 (C04-05)
         */
        saveSettings(accountId, settings) {
          return _writeJSON("kuku_settings_" + accountId, settings, accountId);
        },

        /**
         * アカウント削除: 関連する全 kuku_* キーを破棄 (SPEC.md §2.5)。
         * kuku_*_{accountId} パターンに一致するキーも列挙して掃除する。
         * @param {string} accountId
         */
        deleteAccount(accountId) {
          try {
            // kuku_accounts から除去
            const accounts = Storage.loadAccounts().filter(function (a) { return a.id !== accountId; });
            Storage.saveAccounts(accounts);

            // kuku_current_account_id が一致すれば null に
            if (Storage.loadCurrentAccountId() === accountId) {
              Storage.saveCurrentAccountId(null);
            }

            // kuku_*_{accountId} パターンに一致するキーを全て削除
            const suffix = "_" + accountId;
            const keysToRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
              const key = localStorage.key(i);
              if (key && key.startsWith("kuku_") && key.endsWith(suffix)) {
                keysToRemove.push(key);
              }
            }
            for (let j = 0; j < keysToRemove.length; j++) {
              try { localStorage.removeItem(keysToRemove[j]); } catch (_) {}
            }
          } catch (e) {
            console.warn("[kuku-dojo] storage: deleteAccount failed:", accountId, e.message);
          }
        },

        /**
         * 初回起動判定 (Step 9)。
         * `kuku_welcomed` が true で書き込まれていれば既に案内を見た判定。
         * プライベートブラウズ等で Storage._available=false のときは毎回 true を返すと
         * 注意書きが毎回出てうるさいため、false（= 表示しない）を返す。
         * @returns {boolean} true なら「まだ案内を見ていない」
         */
        isFirstLaunch() {
          if (!Storage._available) return false;
          return _readJSON("kuku_welcomed", false) !== true;
        },

        /**
         * 初回案内を「見た」状態に永続化する。
         * C10-11: 書き込み可否を呼び出し側に伝えるため boolean を返す。
         * 失敗時 (Quota / プライベートブラウズ直後) は _onStorageError 経由で「ほぞん できなかったよ」が表示され、
         * 次回起動で WelcomeNotice が再度出る。呼び出し側はそれを踏まえた UX 判断を行うこと。
         * @returns {boolean} 書き込み成功で true
         */
        markLaunched() {
          return _writeJSON("kuku_welcomed", true);
        },

        /**
         * device-level 言語 preference の読み出し (v1.2.0 Phase B / 第18回ユーザー判断 案 A)。
         * 直近にユーザーが Account 経由で確定した言語 (Settings.lang 生値、"auto" 含む) を
         * デバイス全体で共有する localStorage キー。Login 画面 (Account 未確定時) で
         * applyEffectiveLang の引数として使い、ja 環境ブラウザ + en 設定 Account ユーザーの
         * 「ログアウト → Login が ja に戻る」UX を解消する。
         *
         * 値域は SUPPORTED_LANGS と同一 (Phase C 時点 ["auto","ja","en","zh-CN","zh-TW","ko","vi"])。
         * Phase D で言語追加と同じ commit で SUPPORTED_LANGS が拡張されれば、本キーの許容値も自動的に拡張される。
         * 旧バージョン (v1.0.x / v1.1.0) には本キー無し → "auto" を返し従来挙動と同等。
         *
         * @returns {string} 未保存 / Storage 不可 / 範囲外なら DEFAULT_SETTINGS.lang ("auto")
         */
        loadLangPreference() {
          if (!Storage._available) return DEFAULT_SETTINGS.lang;
          try {
            const raw = localStorage.getItem("kuku_lang_preference");
            if (typeof raw === "string" && SUPPORTED_LANGS.indexOf(raw) !== -1) return raw;
          } catch (e) {
            console.warn("[kuku-dojo] storage: cannot read lang preference:", e.message);
          }
          return DEFAULT_SETTINGS.lang;
        },

        /**
         * device-level 言語 preference の書き込み。
         * SUPPORTED_LANGS 範囲外 / Storage 不可 / Quota は silent に no-op (二重通知回避)。
         * 呼び出しタイミング: アカウント切替成功時 / updateSettings で lang 変更時。
         * @param {string} lang - SUPPORTED_LANGS のいずれか
         * @returns {boolean} 書き込み成功で true
         */
        saveLangPreference(lang) {
          if (!Storage._available) return false;
          if (typeof lang !== "string" || SUPPORTED_LANGS.indexOf(lang) === -1) return false;
          try {
            localStorage.setItem("kuku_lang_preference", lang);
            return true;
          } catch (e) {
            console.warn("[kuku-dojo] storage: cannot write lang preference:", e.message);
            return false;
          }
        },
      };

      // ── engine ────────────────────────────────────────────────────
      // 参照: SPEC.md §3.1〜§3.3

      /**
       * 全 81 問 (1×1〜9×9) の重みを 1.0 で初期化する。
       * @returns {WeightMap}
       */
      function initialWeights() {
        const w = {};
        for (let dan = 1; dan <= 9; dan++) {
          for (let m = 1; m <= 9; m++) {
            w[dan + "-" + m] = 1.0;
          }
        }
        return w;
      }

      /**
       * 重み比例の抽選で次の出題を選ぶ (SPEC.md §3.1)。
       * @param {number[]} selectedDans - 選択された段。空 / null / undefined / 値域外 / 重複は冒頭で正規化
       * @param {WeightMap} weights - null / undefined は空オブジェクト扱い
       * @param {string[]} recent - 直前 2 問のキー配列。null / undefined は空配列扱い
       * @returns {{ dan: number, multiplier: number }}
       */
      function pickQuestion(selectedDans, weights, recent) {
        // 0. 入力正規化 — SPEC §3.1「エンジン側もランタイムエラーにならない自己防御」
        // null / undefined / 非整数 / 値域外 / 重複を弾いて正規化する (C03-01 / C03-03 / C03-05)
        const validDans = (Array.isArray(selectedDans) ? selectedDans : [])
          .filter(function (d) { return Number.isInteger(d) && d >= 1 && d <= 9; });
        const dedupedDans = Array.from(new Set(validDans));
        const dans = dedupedDans.length > 0 ? dedupedDans : [1, 2, 3, 4, 5, 6, 7, 8, 9];
        const safeRecent = Array.isArray(recent) ? recent : [];
        const safeWeights = (weights && typeof weights === "object") ? weights : {};

        // 1. 候補プール
        const pool = [];
        for (let i = 0; i < dans.length; i++) {
          for (let m = 1; m <= 9; m++) {
            pool.push({ dan: dans[i], multiplier: m, key: dans[i] + "-" + m });
          }
        }

        // 2. recent 除外（候補が空になる場合は除外しない）
        const filtered = pool.filter(function (c) { return safeRecent.indexOf(c.key) === -1; });
        const candidates = filtered.length > 0 ? filtered : pool;

        // 3. 各候補に重みを割当
        // 4. 累積重み配列で抽選
        let total = 0;
        const cumulative = [];
        for (let i = 0; i < candidates.length; i++) {
          const w = safeWeights[candidates[i].key] !== undefined ? safeWeights[candidates[i].key] : 1.0;
          total += w;
          cumulative.push(total);
        }

        const r = Math.random() * total;
        for (let i = 0; i < cumulative.length; i++) {
          if (r < cumulative[i]) {
            return { dan: candidates[i].dan, multiplier: candidates[i].multiplier };
          }
        }
        // 浮動小数点の丸め誤差で末尾に到達した場合
        const last = candidates[candidates.length - 1];
        return { dan: last.dan, multiplier: last.multiplier };
      }

      /**
       * 重みを更新する。元オブジェクトを破壊しない (SPEC.md §3.2)。
       * 不正解: +2.0 * wrongWeightBoost / 正解: -0.3 / 下限 0.5 / 上限 10.0 (C03-07)
       * wrongWeightBoost は Settings で 0.5 (ひかえめ) / 1.0 (ふつう) / 2.0 (しっかり) から選択。
       * 既定 1.0 は従来挙動と互換。上位の 2.0 は +4.0/回、下位の 0.5 は +1.0/回となる。
       * 上限 10.0 でクランプされるため、しっかりでも 3 連続不正解で上限に届く想定 (1→5→9→10)。
       * @param {WeightMap} weights
       * @param {number} dan
       * @param {number} multiplier
       * @param {boolean} isCorrect
       * @param {number} [wrongWeightBoost=1.0] - 不正解加算の倍率 (Settings.wrongWeightBoost)
       * @returns {WeightMap}
       */
      function updateWeight(weights, dan, multiplier, isCorrect, wrongWeightBoost) {
        const boost = typeof wrongWeightBoost === "number" && wrongWeightBoost > 0 ? wrongWeightBoost : 1.0;
        const key = dan + "-" + multiplier;
        const current = weights[key] !== undefined ? weights[key] : 1.0;
        const next = isCorrect ? current - 0.3 : current + 2.0 * boost;
        const newWeights = Object.assign({}, weights);
        newWeights[key] = Math.min(10.0, Math.max(0.5, next));
        return newWeights;
      }

      /**
       * 習熟度レベルを算出する (SPEC.md §3.3)。
       * 上位から順に評価し、最初にマッチしたレベルを返す。
       * 苦手側 (L1/L2) は OR で早期救済、得意側 (L4) は AND で慎重に格上げ (C03-12)。
       * L3 は L1/L2/L4 のいずれにも該当しない中間状態すべてを吸収する包括ルール (C03-02 / SPEC §3.3)。
       * @param {number} weight - 現在の重み
       * @param {number} correctRate - 直近正答率 (0.0〜1.0)
       * @param {number} attempts - 総挑戦回数
       * @returns {number} 0..4
       */
      function proficiencyLevel(weight, correctRate, attempts) {
        if (attempts === 0) return 0;
        if (weight >= 2.0 || correctRate < 0.4) return 1;
        if (weight >= 1.2 || correctRate < 0.7) return 2;
        if (weight <= 0.6 && correctRate >= 0.9) return 4;
        return 3; // L1/L2/L4 のいずれにも該当しない領域を包括 (SPEC §3.3)
      }

      /**
       * 平均回答時間が「遅い」判定しきい値を超えているかを判定する (v1.1.0 / SPEC §8.8)。
       * **proficiencyLevel / updateWeight には組み込まず、Stats 可視化専用**（第12回 C12-01 / C12-04 解消）。
       * - データ無し (number 以外 / <= 0) は false（Stats 画面で "まだ でていないよ" 側に回す）
       * - ちょうど境界 (avgResponseMs === thresholdSec * 1000) は false（> のみ true）
       * @param {number} avgResponseMs - セル平均回答時間 (ms)
       * @param {number} thresholdSec - しきい値 (秒) = Settings.slowThresholdSec
       * @returns {boolean}
       */
      function isSlowAverage(avgResponseMs, thresholdSec) {
        if (typeof avgResponseMs !== "number" || !Number.isFinite(avgResponseMs) || avgResponseMs <= 0) return false;
        if (typeof thresholdSec !== "number" || !Number.isFinite(thresholdSec) || thresholdSec <= 0) return false;
        return avgResponseMs > thresholdSec * 1000;
      }

      const Engine = { initialWeights, pickQuestion, updateWeight, proficiencyLevel, isSlowAverage };

      // ── helpers ───────────────────────────────────────────────────
      // ResultHelpers / StatsHelpers: セッション結果の検証・整形・集計を行うピュアヘルパ。
      // 第14回レビュー C14-06 を受け、screens セクション (JSX 混在) の内部から本節に移設。
      // node:test の VM 抽出ローダ (tests/helpers/load-core.mjs) が JSX を含まないセクションとして
      // 取り込み、StatsHelpers.aggregate / ResultHelpers.isValidSession 等のユニットテストを可能にする。
      //
      // 配置順: storage / engine → helpers → effects / hooks / context / screens。
      // 本節は React / JSX に依存しないピュアロジックのみ (SPEC §1.2 レイヤ分離)。

      // SPEC §3.3: 習熟度マップ算出に使う参照セッション数。
      // StatsHelpers.aggregate / StatsScreen の両者が参照するため helpers 節に置く。
      const STATS_RECENT_N = 5;
      // v1.1.0 §8.8: セッション先頭 COLD_START_COUNT 問の responseTime は集計から除外する。
      // 起動直後は操作慣れ / 画面暗順応 / 指ならし等で有意に遅くなりがちで、平均を歪めるため (C12-07)。
      // 「がんばった きろく」タブ専用で、既存 proficiencyLevel / 9×9 マップには関与しない (C12-01)。
      const COLD_START_COUNT = 3;
      // 「がんばった きろく」タブで per-cell に表示する最新 responseTime サンプル件数。
      // 横棒グラフの視認性を保つため 5 件に制限。N=5 では trimmed mean は数学的に単純平均と一致するため
      // 採用しない (C13-06)。
      const STATS_RESPONSE_TIME_SAMPLES = 5;

      const ResultHelpers = {
        /**
         * 正答率に応じて 1〜5 の星数を返す。子供の自己肯定感を下げないため最低 1 個は灯す。
         * @param {number} correctRate - 0.0 〜 1.0
         * @returns {number} 1〜5
         */
        starRating(correctRate) {
          if (correctRate >= 0.9) return 5;
          if (correctRate >= 0.7) return 4;
          if (correctRate >= 0.5) return 3;
          if (correctRate >= 0.3) return 2;
          return 1;
        },

        /**
         * 秒数を M:SS / H:MM:SS 形式に整形。負値・NaN は 0 にクランプ。
         * SPEC §2.2 で elapsedTime は最小 1 秒 (C06-09) だが防御的に 0 も受ける。
         * 60 分超は時間繰り上げ (C07-16) で 60:00 のまま分が肥大化するのを避ける。
         * @param {number} elapsedSeconds
         * @returns {string}
         */
        formatTime(elapsedSeconds) {
          const safe = Number.isFinite(elapsedSeconds) ? Math.max(0, Math.floor(elapsedSeconds)) : 0;
          const h = Math.floor(safe / 3600);
          const m = Math.floor((safe % 3600) / 60);
          const s = safe % 60;
          const pad = (n) => (n < 10 ? "0" + n : "" + n);
          if (h > 0) return h + ":" + pad(m) + ":" + pad(s);
          return m + ":" + pad(s);
        },

        /**
         * SessionResult が最低限のスキーマを満たすか検証。
         * C07-03 / C07-08: timestamp NaN / 非数値 correctCount / totalQuestions <= 0 を弾く。
         * localStorage 破損 / 拡張機能干渉 / 旧スキーマ混入で不正 SessionResult が混じる前提の防御。
         * @param {*} s
         * @returns {boolean}
         */
        isValidSession(s) {
          return !!s
            && Number.isFinite(s.timestamp)
            && Number.isFinite(s.totalQuestions) && s.totalQuestions > 0
            && Number.isFinite(s.correctCount) && s.correctCount >= 0
            && s.correctCount <= s.totalQuestions;
        },

        /**
         * セッション一覧から最新 1 件と前回 1 件を取り出す。
         * SPEC §2.2 mutation 禁止契約 (C06-13): in-place sort を避けるため slice してから sort する。
         * C07-08: 破損エントリは isValidSession で除外し、pickLatestAndPrevious の結果が NaN 伝播で
         * UI に `NaN%` / 意図外 sort を起こさないようにする。
         * @param {SessionResult[]} sessions
         * @returns {{ latest: SessionResult|null, previous: SessionResult|null }}
         */
        pickLatestAndPrevious(sessions) {
          if (!Array.isArray(sessions) || sessions.length === 0) {
            return { latest: null, previous: null };
          }
          const valid = sessions.filter(ResultHelpers.isValidSession);
          if (valid.length === 0) return { latest: null, previous: null };
          const sorted = valid.slice().sort(function (a, b) { return b.timestamp - a.timestamp; });
          return { latest: sorted[0] || null, previous: sorted[1] || null };
        },
      };

      const StatsHelpers = {
        /**
         * 履歴用のかんたんな日時表記。
         * 同じ年は "M/D HH:MM"、異なる年は "YY/M/D HH:MM"（年跨ぎの時系列誤認を防ぐ / C09-02）。
         * NaN / 未来ズレは "-" にフォールバック。
         * @param {number} ts - UNIX ms
         */
        formatDate(ts) {
          if (!Number.isFinite(ts)) return "-";
          const d = new Date(ts);
          if (Number.isNaN(d.getTime())) return "-";
          const pad = (n) => (n < 10 ? "0" + n : "" + n);
          const nowYear = new Date().getFullYear();
          const y = d.getFullYear();
          const mdhm = (d.getMonth() + 1) + "/" + d.getDate() +
            " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
          return y === nowYear ? mdhm : (y % 100) + "/" + mdhm;
        },

        /**
         * セッション配列を集計する。C06-13 mutation 禁止契約を守り、slice / filter で新配列を作る。
         * - sortedDesc: ResultHelpers.isValidSession を通過したセッションを timestamp 降順で
         * - cellStats[key]: **直近 N セッション**の (dan,m) 別 { attempts, correct, wrong, correctRate }
         *                   SPEC §3.3 proficiencyLevel の入力としてこれを使う
         * - danStats[dan]: **全セッション**の段別 { attempts, correct } (全体傾向把握用)
         * @param {SessionResult[]} sessions
         */
        aggregate(sessions) {
          const valid = (Array.isArray(sessions) ? sessions : []).filter(ResultHelpers.isValidSession);
          const sortedDesc = valid.slice().sort(function (a, b) { return b.timestamp - a.timestamp; });
          const recent = sortedDesc.slice(0, STATS_RECENT_N);

          const cellStats = {};
          for (let dan = 1; dan <= 9; dan++) {
            for (let m = 1; m <= 9; m++) {
              // v1.1.0 §8.8: responseTimes / avgResponseMs / responseAttempts は「がんばった きろく」
              // タブ用。9×9 マップ（既存）は attempts/correct/wrong/correctRate のみ参照し、
              // 時間要素に触れないことで C12-02 (マップの UX 毀損) を回避する。
              cellStats[dan + "-" + m] = {
                attempts: 0, correct: 0, wrong: 0, correctRate: 0,
                responseTimes: [], avgResponseMs: null, responseAttempts: 0,
              };
            }
          }
          for (let si = 0; si < recent.length; si++) {
            const details = Array.isArray(recent[si].details) ? recent[si].details : [];
            for (let di = 0; di < details.length; di++) {
              const d = details[di];
              if (!d || !Number.isInteger(d.dan) || !Number.isInteger(d.multiplier)) continue;
              if (d.dan < 1 || d.dan > 9 || d.multiplier < 1 || d.multiplier > 9) continue;
              const cs = cellStats[d.dan + "-" + d.multiplier];
              cs.attempts++;
              if (d.isCorrect === true) cs.correct++;
              else cs.wrong++;
            }
          }
          Object.keys(cellStats).forEach(function (k) {
            const cs = cellStats[k];
            cs.correctRate = cs.attempts > 0 ? cs.correct / cs.attempts : 0;
          });

          // v1.1.0 §8.8: 全有効セッション（sortedDesc = timestamp 降順）を走査し、各セッションの
          // 先頭 COLD_START_COUNT 問 (cold start) を除外しつつ、セル別に responseTime を蓄積する。
          // 蓄積順は「新 → 古」（sortedDesc 順 + 同一セッション内は details[] 順）になる。
          // 最後に最新 STATS_RESPONSE_TIME_SAMPLES 件だけを残して per-cell 平均を算出する。
          for (let si = 0; si < sortedDesc.length; si++) {
            const details = Array.isArray(sortedDesc[si].details) ? sortedDesc[si].details : [];
            for (let di = COLD_START_COUNT; di < details.length; di++) {
              const d = details[di];
              if (!d || !Number.isInteger(d.dan) || !Number.isInteger(d.multiplier)) continue;
              if (d.dan < 1 || d.dan > 9 || d.multiplier < 1 || d.multiplier > 9) continue;
              if (typeof d.responseTime !== "number" || !Number.isFinite(d.responseTime) || d.responseTime <= 0) continue;
              const cs = cellStats[d.dan + "-" + d.multiplier];
              if (cs.responseTimes.length < STATS_RESPONSE_TIME_SAMPLES) {
                cs.responseTimes.push(d.responseTime);
              }
              cs.responseAttempts++;
            }
          }
          Object.keys(cellStats).forEach(function (k) {
            const cs = cellStats[k];
            if (cs.responseTimes.length === 0) {
              cs.avgResponseMs = null;
            } else {
              let sum = 0;
              for (let i = 0; i < cs.responseTimes.length; i++) sum += cs.responseTimes[i];
              cs.avgResponseMs = sum / cs.responseTimes.length; // trimmed mean は不採用 (C13-06)
            }
          });

          const danStats = {};
          for (let dan = 1; dan <= 9; dan++) danStats[dan] = { attempts: 0, correct: 0 };
          for (let si = 0; si < valid.length; si++) {
            const details = Array.isArray(valid[si].details) ? valid[si].details : [];
            for (let di = 0; di < details.length; di++) {
              const d = details[di];
              if (!d || !Number.isInteger(d.dan)) continue;
              if (d.dan < 1 || d.dan > 9) continue;
              danStats[d.dan].attempts++;
              if (d.isCorrect === true) danStats[d.dan].correct++;
            }
          }

          return { sortedDesc, cellStats, danStats };
        },
      };

      // ── effects ───────────────────────────────────────────────────
      // SoundPlayer: Web Audio API シングルトン。外部音源ファイルは使わず
      // OscillatorNode + GainNode の包絡で音を生成する (SPEC §5.2)。
      //
      // 設計上の要点:
      // - AudioContext は最初のユーザー操作で遅延生成する (iOS/macOS Safari の自動再生ポリシー対策)
      // - ensureAudioContext は resume() を同期的に呼び、await は resume の Promise に対してのみ行う。
      //   await の後に resume を呼ぶと「最初のジェスチャの tick」を外れて suspended のままになる端末がある。
      // - settings は React 外から参照するため、App 側の useEffect で SoundPlayer.setSettings を呼ぶ契約にする。
      //   soundEnabled === false ならすべての play 系は即 return (prompts.md Step 7 要件)。
      // - OscillatorNode は start/stop した後は再利用不可。再生ごとに生成する。
      const SoundPlayer = {
        _ctx: null,
        _resumed: false,
        _settings: { soundEnabled: true, volume: 0.4 },

        /**
         * settings の更新を受け取る。App 側の useEffect から呼び出される。
         * volume は 0.0〜1.0 の範囲にクランプ (不正値耐性)。
         */
        setSettings(next) {
          if (!next || typeof next !== "object") return;
          const vol = typeof next.volume === "number" && Number.isFinite(next.volume)
            ? Math.max(0, Math.min(1, next.volume))
            : 0.4;
          this._settings = {
            soundEnabled: next.soundEnabled !== false,
            volume: vol,
          };
        },

        /**
         * 最初のユーザー操作で呼ぶ。AudioContext を生成し suspended なら resume する。
         * async 関数だが resume() の呼び出しは await を挟まずに同期発火させる。
         * C08-01: state === "closed"/"interrupted" (iOS 電話着信・画面ロック復帰等) は ctx を破棄して再生成する。
         */
        async ensureAudioContext() {
          try {
            // C08-01: 既存 ctx が使えない状態なら破棄して作り直す
            if (this._ctx && (this._ctx.state === "closed" || this._ctx.state === "interrupted")) {
              this._ctx = null;
              this._resumed = false;
            }
            if (!this._ctx) {
              const Ctor = window.AudioContext || window.webkitAudioContext;
              if (!Ctor) return null;
              this._ctx = new Ctor();
            }
            if (this._ctx.state === "suspended") {
              // ジェスチャ tick 内で同期的に resume() を発火させる。
              // Promise を return するブラウザ (Chrome/Firefox) と undefined を返す古い Safari の両対応。
              const p = this._ctx.resume();
              if (p && typeof p.then === "function") {
                await p;
              }
            }
            this._resumed = this._ctx.state === "running";
            return this._ctx;
          } catch (e) {
            console.warn("[kuku-dojo] audio: ensureAudioContext failed:", e && e.message);
            return null;
          }
        },

        /**
         * C08-01: ページ復帰 / 可視性変化で ctx が interrupted 相当になっている可能性があるため、
         *        次の play 前に ensureAudioContext を走らせ直す契約にするためのマーク。
         */
        invalidate() {
          this._resumed = false;
        },

        /**
         * 共通再生ヘルパー。tones 配列の各要素を順に Oscillator で鳴らす。
         * 先頭 10ms でフェードイン、末尾で exponentialRampToValueAtTime で自然減衰させ
         * ぷちっというノイズ (DC オフセット起因) を避ける。
         * @param {{freq:number, delay:number, duration:number, type?:string, peak?:number}[]} tones
         */
        _playTones(tones) {
          if (!this._settings.soundEnabled) return;
          if (!this._ctx || !this._resumed) return;
          // C08-01: ctx が closed / interrupted 状態で createOscillator すると InvalidStateError が
          //        同期的に throw されるため、state チェック + try/catch で二重防御する。
          //        例外発生時は _resumed を false に戻し、次のユーザー操作で再 resume される経路に乗せる。
          if (this._ctx.state !== "running") {
            this._resumed = false;
            return;
          }
          try {
            const ctx = this._ctx;
            const master = ctx.createGain();
            master.gain.value = this._settings.volume;
            master.connect(ctx.destination);
            const start = ctx.currentTime;
            for (let i = 0; i < tones.length; i++) {
              const t = tones[i];
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.type = t.type || "sine";
              osc.frequency.value = t.freq;
              osc.connect(gain);
              gain.connect(master);
              const beginAt = start + (t.delay || 0);
              const endAt = beginAt + t.duration;
              const peak = typeof t.peak === "number" ? t.peak : 0.7;
              gain.gain.setValueAtTime(0.0001, beginAt);
              gain.gain.linearRampToValueAtTime(peak, beginAt + 0.01);
              gain.gain.exponentialRampToValueAtTime(0.0005, endAt);
              osc.start(beginAt);
              osc.stop(endAt + 0.03);
            }
          } catch (e) {
            // C08-01: iOS 電話着信復帰等で createOscillator が InvalidStateError を投げるケース。
            //        次の firstGesture 相当の呼び出しで ensureAudioContext を再実行させるためフラグを落とす。
            this._resumed = false;
            console.warn("[kuku-dojo] audio: _playTones failed:", e && e.message);
          }
        },

        playCorrect() {
          this._playTones([
            { freq: 523.25, delay: 0.00, duration: 0.14, type: "sine" },  // C5
            { freq: 659.25, delay: 0.09, duration: 0.14, type: "sine" },  // E5
            { freq: 783.99, delay: 0.18, duration: 0.22, type: "sine" },  // G5
          ]);
        },
        playWrong() {
          this._playTones([
            // 強い不協和音は避け、柔らかい低音を 1 音だけ減衰。自己否定感を煽らない (SPEC §5.1)
            { freq: 246.94, delay: 0.00, duration: 0.28, type: "triangle", peak: 0.5 }, // B3
          ]);
        },
        playClick() {
          this._playTones([
            { freq: 1200, delay: 0.00, duration: 0.04, type: "square", peak: 0.25 },
          ]);
        },
        playFanfare() {
          this._playTones([
            { freq: 523.25, delay: 0.00, duration: 0.18, type: "sine" },  // C5
            { freq: 659.25, delay: 0.18, duration: 0.18, type: "sine" },  // E5
            { freq: 783.99, delay: 0.36, duration: 0.18, type: "sine" },  // G5
            { freq: 1046.50, delay: 0.54, duration: 0.40, type: "sine", peak: 0.75 }, // C6
          ]);
        },
      };

      // ── effect components ─────────────────────────────────────────
      // ConfettiCanvas / MascotCharacter / ComboCounter / CelebrationToast は全て
      // useContext(AppContext).settings.effectsEnabled を参照し、OFF 時は null を返す。
      // AppContext は後方で createContext するが、関数ボディの評価は render 時なので順序問題なし。

      // パステル調の紙吹雪色 (Tailwind の *-200 相当): 原色の高彩度ベタ塗りを避ける (SPEC §5.0)
      const CONFETTI_COLORS = ["#fbcfe8", "#fde68a", "#bfdbfe", "#bbf7d0", "#ddd6fe", "#fed7aa"];
      const CONFETTI_LIFETIME_MS = 1500;  // SPEC §5.0: 個別エフェクトは 1.5 秒以内に終息

      /**
       * 画面全体の紙吹雪 Canvas。burstId を変えると新しいバーストが追加される。
       * 一度に描画する領域は粒ごとに数 px² で合計 < 画面面積 25% (PSE 配慮)。
       * count は 10-30 (正解時) / 60-100 (セッション完了時) を想定。
       * shape: "square" (既定) / "star"。5 連続時は星バースト。
       * effectsEnabled=false なら canvas ごと null を返して DOM にも出さない。
       */
      function ConfettiCanvas({ burstId, count, shape }) {
        const { settings } = useContext(AppContext);
        const enabled = !!(settings && settings.effectsEnabled);
        const canvasRef = useRef(null);
        const rafRef = useRef(0);
        const particlesRef = useRef([]);
        const dimsRef = useRef({ w: 0, h: 0 });
        const lastTsRef = useRef(0);

        // 星型パスを Path2D で事前生成しておく (毎フレーム再構築を避ける)
        const starPathRef = useRef(null);
        useEffect(() => {
          if (typeof Path2D === "undefined") return;
          const p = new Path2D();
          // 5 角星: 外半径 1, 内半径 0.45
          for (let i = 0; i < 10; i++) {
            const r = i % 2 === 0 ? 1 : 0.45;
            const a = -Math.PI / 2 + (i * Math.PI) / 5;
            const x = Math.cos(a) * r;
            const y = Math.sin(a) * r;
            if (i === 0) p.moveTo(x, y); else p.lineTo(x, y);
          }
          p.closePath();
          starPathRef.current = p;
        }, []);

        const startLoop = () => {
          if (rafRef.current) return;
          lastTsRef.current = performance.now();
          const tick = (t) => {
            const canvas = canvasRef.current;
            if (!canvas) { rafRef.current = 0; return; }
            const ctx2d = canvas.getContext("2d");
            const { w, h } = dimsRef.current;
            const dt = Math.min(0.05, (t - lastTsRef.current) / 1000);
            lastTsRef.current = t;
            ctx2d.clearRect(0, 0, w, h);
            const list = particlesRef.current;
            const next = [];
            for (let i = 0; i < list.length; i++) {
              const p = list[i];
              const age = t - p.born;
              if (age > p.life) continue;
              p.vy += 360 * dt;    // gravity
              p.x += p.vx * dt;
              p.y += p.vy * dt;
              p.rot += p.vrot * dt;
              // 後半 1/3 で opacity フェード (白⇄黒フラッシュを避け滑らかに消す)
              const fadeStart = p.life * 0.66;
              const fade = age < fadeStart ? 1 : Math.max(0, 1 - (age - fadeStart) / (p.life - fadeStart));
              ctx2d.save();
              ctx2d.globalAlpha = fade;
              ctx2d.translate(p.x, p.y);
              ctx2d.rotate(p.rot);
              ctx2d.fillStyle = p.color;
              if (p.shape === "star" && starPathRef.current) {
                const s = p.size;
                ctx2d.scale(s, s);
                ctx2d.fill(starPathRef.current);
              } else {
                ctx2d.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
              }
              ctx2d.restore();
              next.push(p);
            }
            particlesRef.current = next;
            if (next.length > 0) {
              rafRef.current = requestAnimationFrame(tick);
            } else {
              ctx2d.clearRect(0, 0, w, h);
              rafRef.current = 0;
            }
          };
          rafRef.current = requestAnimationFrame(tick);
        };

        useEffect(() => {
          if (!enabled) return;
          if (!burstId) return;
          const canvas = canvasRef.current;
          if (!canvas) return;
          const w = window.innerWidth;
          const h = window.innerHeight;
          const dpr = window.devicePixelRatio || 1;
          canvas.width = Math.floor(w * dpr);
          canvas.height = Math.floor(h * dpr);
          canvas.style.width = w + "px";
          canvas.style.height = h + "px";
          const ctx2d = canvas.getContext("2d");
          ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
          dimsRef.current = { w, h };

          const N = Math.max(1, Math.min(150, count || 15));
          const originX = w / 2;
          const originY = h * 0.35;
          const now = performance.now();
          const isStar = shape === "star";
          for (let i = 0; i < N; i++) {
            // 上向きに広がる扇形 (-π/2 中心に ±π/2 の範囲)
            const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
            const speed = 180 + Math.random() * 280;
            particlesRef.current.push({
              x: originX + (Math.random() - 0.5) * 40,
              y: originY,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              size: isStar ? 10 + Math.random() * 6 : 7 + Math.random() * 6,
              color: CONFETTI_COLORS[(Math.random() * CONFETTI_COLORS.length) | 0],
              rot: Math.random() * Math.PI * 2,
              vrot: (Math.random() - 0.5) * 6,
              born: now,
              life: CONFETTI_LIFETIME_MS,
              shape: isStar ? "star" : "square",
            });
          }
          startLoop();
        }, [burstId, enabled, count, shape]);

        // アンマウント時の rAF 停止 + 粒バッファ破棄 (SPEC §4.2 ConfettiCanvas 要件)
        useEffect(() => {
          return () => {
            if (rafRef.current) cancelAnimationFrame(rafRef.current);
            rafRef.current = 0;
            particlesRef.current = [];
          };
        }, []);

        if (!enabled) return null;
        return (
          <canvas
            ref={canvasRef}
            aria-hidden="true"
            className="fixed inset-0 pointer-events-none z-40"
          />
        );
      }

      // マスコット絵文字: LOGIN_AVATARS (🐱🐶🐰🐼🦊🐸🐯🐻) と被らない 1 種類を選定 (C04-18)
      const MASCOT_EMOJI = "🦉";
      // C08-06: SPEC §5.3 celebrate 持続時間 (3 連続 1200ms / 5 連続・結果画面 1500ms) を差別化。
      // 呼び出し側 (QuizScreen / ResultScreen) が combo / 正答率に応じて celebrateDurationMs を渡す。
      const MASCOT_CELEBRATE_MS_DEFAULT = 1500;
      const MASCOT_CELEBRATE_MS_SHORT = 1200;

      /**
       * マスコット「くくちゃん」。state を props で受け取り表情/動作を切り替える (SPEC §5.3)。
       * celebrate 中に別 state が来ても上書きせず、アニメ完了 (props 指定の celebrateDurationMs) まで待つ。
       * effectsEnabled=false は return null でテキストのみ表示に退行する。
       * @param {Object} props
       * @param {"idle"|"thinking"|"happy"|"sad"|"celebrate"} [props.state]
       * @param {"sm"|"md"|"lg"} [props.size]
       * @param {number} [props.celebrateDurationMs] - SPEC §5.3 準拠で 3連続=1200 / 5連続=1500 / 結果=1500 を呼び出し側が指定
       */
      function MascotCharacter({ state, size, celebrateDurationMs }) {
        const { settings } = useContext(AppContext);
        const enabled = !!(settings && settings.effectsEnabled);
        const [displayed, setDisplayed] = useState(state || "idle");
        const celebrateLockUntilRef = useRef(0);

        useEffect(() => {
          const now = Date.now();
          // celebrate 中で新 state が celebrate 以外なら、ロック終了まで適用を遅延
          if (state !== "celebrate" && celebrateLockUntilRef.current > now) {
            const remaining = celebrateLockUntilRef.current - now;
            const t = window.setTimeout(() => setDisplayed(state || "idle"), remaining);
            return () => window.clearTimeout(t);
          }
          if (state === "celebrate") {
            // C08-06: 呼び出し側の duration を優先、未指定は 1500ms 既定
            const lockMs = typeof celebrateDurationMs === "number" && celebrateDurationMs > 0
              ? celebrateDurationMs
              : MASCOT_CELEBRATE_MS_DEFAULT;
            celebrateLockUntilRef.current = now + lockMs;
          }
          setDisplayed(state || "idle");
        }, [state, celebrateDurationMs]);

        if (!enabled) return null;

        // size → 絵文字サイズ。Tailwind 静的クラスを三項で選択 (動的クラス構築禁止ルール遵守)
        const sizeClass = size === "lg"
          ? "text-8xl"
          : size === "md"
            ? "text-6xl"
            : "text-4xl";

        // 状態ごとの animation 指定。JS オブジェクトなので Tailwind 抽出対象外 (問題なし)
        let animStyle;
        if (displayed === "idle") {
          animStyle = { animation: "kuku-mascot-breath 4s ease-in-out infinite" };
        } else if (displayed === "thinking") {
          animStyle = { animation: "kuku-mascot-tilt 2s ease-in-out infinite" };
        } else if (displayed === "happy") {
          animStyle = { animation: "kuku-mascot-bounce 0.6s ease-out 1" };
        } else if (displayed === "sad") {
          animStyle = { animation: "kuku-mascot-shake 0.5s ease-in-out 1" };
        } else if (displayed === "celebrate") {
          animStyle = { animation: "kuku-mascot-jump 1.2s ease-out 1" };
        } else {
          animStyle = {};
        }

        // 目 (表情) は emoji 固定のため別要素で簡易表現: sad 時だけグレースケール気味にして「しょんぼり」
        const tone = displayed === "sad" ? " opacity-70 grayscale" : "";

        return (
          <div
            className={"inline-block select-none leading-none " + sizeClass + tone}
            style={animStyle}
            role="img"
            aria-label={
              displayed === "happy" ? Util.t("mascot.aria.happy")
              : displayed === "sad" ? Util.t("mascot.aria.sad")
              : displayed === "celebrate" ? Util.t("mascot.aria.celebrate")
              : displayed === "thinking" ? Util.t("mascot.aria.thinking")
              : Util.t("mascot.aria.default")
            }
          >
            {MASCOT_EMOJI}
          </div>
        );
      }

      /**
       * 右上に固定表示するコンボカウンタ。combo<1 または effectsEnabled=false は null。
       * key={combo} で値変化のたびに再マウントして kuku-combo-pop アニメを再生する。
       */
      function ComboCounter({ combo }) {
        const { settings } = useContext(AppContext);
        if (!settings || !settings.effectsEnabled) return null;
        if (!combo || combo < 1) return null;
        return (
          <div
            key={combo}
            aria-live="polite"
            aria-label={Util.t("combo.ariaLabel", { combo })}
            className="fixed top-3 right-3 z-30 flex items-center gap-2 px-3 py-2 rounded-2xl bg-amber-100/90 border-2 border-amber-300 shadow-md pointer-events-none"
            style={{ animation: "kuku-combo-pop 0.4s ease-out 1" }}
          >
            <span className="text-amber-700 text-sm font-bold">{Util.t("combo.label")}</span>
            <span className="text-amber-800 text-2xl font-bold tabular-nums">× {combo}</span>
          </div>
        );
      }

      /**
       * 画面上部中央に一時的に表示するトースト。message が truthy で burstKey が変わるたびに再アニメ。
       * 親が setTimeout で 1.5s 後に null クリアする運用。
       */
      function CelebrationToast({ burstKey, message, tone }) {
        const { settings } = useContext(AppContext);
        if (!settings || !settings.effectsEnabled) return null;
        if (!message) return null;
        // tone: "celebrate" (amber) / "encourage" (sky)
        const colorClass = tone === "encourage"
          ? "bg-sky-100 text-sky-800 border-sky-300"
          : "bg-amber-100 text-amber-800 border-amber-300";
        return (
          <div
            key={burstKey}
            role="status"
            aria-live="polite"
            className={"fixed top-20 left-1/2 z-40 px-6 py-3 rounded-2xl shadow-lg pointer-events-none text-xl font-bold border-2 " + colorClass}
            style={{ animation: "kuku-toast-pop 1.5s ease-out 1 forwards", transform: "translate(-50%, 0)" }}
          >
            {message}
          </div>
        );
      }

      // ── hooks ─────────────────────────────────────────────────────
      /**
       * window.location.hash を購読するカスタムフック。
       * 空ハッシュは SPEC §2.1 に従って正規化する (C01-01 / C05-04):
       *   - `kuku_current_account_id` が存在すれば #/home に自動復帰
       *   - 無ければ #/login
       * いずれも replace で履歴を積まず差し替える。
       */
      function useHash() {
        const [hash, setHash] = useState(() => {
          if (!window.location.hash) {
            const currentId = Storage.loadCurrentAccountId();
            const target = currentId ? "#/home" : "#/login";
            window.location.replace(target);
            return target;
          }
          return window.location.hash;
        });
        useEffect(() => {
          const onChange = () => setHash(window.location.hash || "#/login");
          window.addEventListener("hashchange", onChange);
          return () => window.removeEventListener("hashchange", onChange);
        }, []);
        return hash;
      }

      // ── context ───────────────────────────────────────────────────
      // App の状態 (accounts / currentAccountId / settings / selectedDans / totalQuestions)
      // と操作関数を子孫コンポーネントに配布する。画面間の共有はすべてここを経由する。
      // 画面遷移時の state loss を避けるため、quiz 設定 (selectedDans / totalQuestions) は
      // localStorage ではなく Context に保持し、アプリのメモリ上のみで引き継ぐ (SPEC.md §4.1)。

      /**
       * @typedef {Object} AppContextValue
       * @property {Account[]} accounts
       * @property {Account|null} account
       * @property {Settings} settings
       * @property {number[]} selectedDans
       * @property {number} totalQuestions
       * @property {(dans: number[]) => void} setSelectedDans
       * @property {(n: number) => void} setTotalQuestions
       * @property {(next: Settings) => void} updateSettings
       * @property {(name: string, avatarIndex: number) => Account} createAccount
       * @property {(accountId: string) => void} login
       * @property {() => void} logout
       * @property {() => void} removeAccount
       */
      const AppContext = React.createContext(null);

      // モーダルスタック: Escape は常に最上位モーダルのみに配送する (C05-02)。
      // window level の keydown を複数モーダルが listen すると、1 回の Escape で全モーダルが
      // onClose を呼んでしまうため、マウント順に push / pop し、スタック末尾だけが処理する。
      const ModalStack = [];

      /**
       * モーダル open 中のフォーカストラップ + Escape クローズ + 元フォーカス復帰 (C04-06 / C05-02 / C05-03 / C05-09 / C05-10)。
       *
       * - Tab / Shift+Tab はモーダル内で循環。`a[href]` も focusable として収集 (C05-09)。
       *   `disabled` / `aria-disabled="true"` は Tab 循環から除外 (C05-10)。
       * - Escape は最上位モーダルのみに配送 (C05-02)。
       * - `previousFocusRef` はモーダルを開くトリガ側で `document.activeElement` を事前保存
       *   して渡すこと。子要素の `autoFocus` は commit 中に同期で .focus() を呼ぶため、
       *   フック側で後から activeElement を取ると復帰先が壊れる (C05-03)。
       *
       * @param {React.RefObject} modalRef - モーダルルート DOM の ref
       * @param {() => void} onClose - Escape / 外部操作で呼ばれる close ハンドラ
       * @param {React.RefObject<Element|null>|null|undefined} [previousFocusRef] - トリガ側が保存した復帰先 ref
       */
      function useModalFocusTrap(modalRef, onClose, previousFocusRef) {
        // onClose の再生成で listener を add/remove するのを避けつつ、最新 onClose を参照するため ref 経由に集約
        const onCloseRef = useRef(onClose);
        useEffect(() => { onCloseRef.current = onClose; });

        useEffect(() => {
          const entry = {}; // 参照同一性でスタック位置を識別
          ModalStack.push(entry);
          const captured = previousFocusRef && previousFocusRef.current ? previousFocusRef.current : null;

          const onKey = (e) => {
            if (e.key === "Escape") {
              // 最上位モーダルのみが Escape を受け取る (C05-02)
              if (ModalStack[ModalStack.length - 1] !== entry) return;
              e.preventDefault();
              onCloseRef.current();
              return;
            }
            if (e.key !== "Tab" || !modalRef.current) return;
            // a[href] を含む汎用 focusable セレクタ (C05-09)
            const focusables = modalRef.current.querySelectorAll(
              'a[href], input, button, select, textarea, [tabindex]:not([tabindex="-1"])'
            );
            // disabled / aria-disabled="true" を除外 (C05-10)
            const list = Array.from(focusables).filter(
              (el) => !el.disabled && el.getAttribute("aria-disabled") !== "true"
            );
            if (list.length === 0) return;
            const first = list[0];
            const last = list[list.length - 1];
            if (e.shiftKey && document.activeElement === first) {
              e.preventDefault();
              last.focus();
            } else if (!e.shiftKey && document.activeElement === last) {
              e.preventDefault();
              first.focus();
            }
          };
          window.addEventListener("keydown", onKey);

          return () => {
            window.removeEventListener("keydown", onKey);
            const idx = ModalStack.indexOf(entry);
            if (idx !== -1) ModalStack.splice(idx, 1);
            if (captured && typeof captured.focus === "function") {
              captured.focus();
            }
          };
        }, []); // mount/unmount 1 回のみ。onClose は ref 経由で最新値を参照する
      }

      // ── screens: LoginScreen ──────────────────────────────────────
      // 参照: SPEC.md §3.1.1〜§3.1.2 / §4.1 / §5.2

      // アバター選択肢 (6〜8 個) — SPEC.md §5.3 マスコット方針に倣い絵文字ベース
      // マスコット「くくちゃん」（Step 7 実装）との意匠整理は SPEC.md §5.3 を参照 (C04-18)
      const LOGIN_AVATARS = ["🐱", "🐶", "🐰", "🐼", "🦊", "🐸", "🐯", "🐻"];

      // LoginScreen 層のヘルパーは LoginHelpers に集約して裸のグローバル関数を避ける (C04-17)。
      // C03-09 で確立した namespace 規律を screens 層にも適用。
      const LoginHelpers = {
        /**
         * 不正な avatarIndex でも落ちないように安全側へ寄せる。
         * @param {number} idx
         * @returns {string} アバター絵文字
         */
        avatarOf(idx) {
          const i = Number.isInteger(idx) && idx >= 0 && idx < LOGIN_AVATARS.length ? idx : 0;
          return LOGIN_AVATARS[i];
        },

        /**
         * 直近のプレイ日時を子供向けにやさしく表示する。
         * 未来タイムスタンプ (端末時計ズレ) は「きょう」に畳み、NaN は「まだ あそんでないよ」扱い (C04-13)。
         * @param {number|null|undefined} timestamp - UNIX ms
         * @returns {string}
         */
        formatLastPlayed(timestamp) {
          if (timestamp === null || timestamp === undefined || !Number.isFinite(timestamp)) {
            return Util.t("login.lastPlayed.none");
          }
          const d = new Date(timestamp);
          if (Number.isNaN(d.getTime())) return Util.t("login.lastPlayed.none");
          const now = new Date();
          const dayMs = 24 * 60 * 60 * 1000;
          const startOf = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
          const diff = Math.floor((startOf(now) - startOf(d)) / dayMs);
          // diff < 0 (未来) は端末時計ずれの補正として「きょう」にクランプ (C04-13)
          if (diff <= 0) return Util.t("login.lastPlayed.today");
          if (diff === 1) return Util.t("login.lastPlayed.yesterday");
          if (diff < 7) return Util.t("login.lastPlayed.nDaysAgo", { n: diff });
          return Util.t("login.lastPlayed.dateFormat", { month: d.getMonth() + 1, day: d.getDate() });
        },
      };

      /**
       * 単一アカウントの選択カード。アバター・名前・最終プレイ日時を横並びで表示する。
       * @param {Object} props
       * @param {Account} props.account
       * @param {() => void} props.onSelect - クリック時に handleSelect(account.id) を呼ぶ
       * @param {boolean} [props.autoFocus] - マウント時にフォーカスを当てるか (C05-11 LoginScreen 初期焦点用)
       */
      function AccountCard({ account, onSelect, autoFocus }) {
        // セッション履歴の最大 timestamp を最終プレイ日時として扱う。
        // Account 自体には lastPlayedAt が無いので sessions から導出する。
        // SPEC.md §2.2 将来拡張 (C04-19) で Account.lastPlayedAt を追加する候補。
        const lastPlayed = useMemo(() => {
          const sessions = Storage.loadSessions(account.id);
          if (!sessions.length) return null;
          let max = 0;
          for (let i = 0; i < sessions.length; i++) {
            if (sessions[i].timestamp > max) max = sessions[i].timestamp;
          }
          return max;
        }, [account.id]);

        return (
          <li>
            <button
              type="button"
              onClick={onSelect}
              autoFocus={autoFocus}
              className="w-full min-h-[96px] bg-white rounded-2xl shadow-md hover:shadow-lg hover:bg-indigo-50 border border-indigo-100 p-4 flex items-center gap-4 focus:outline-none focus:ring-4 focus:ring-indigo-300 text-left transition-shadow"
              aria-label={Util.t("login.accountCard.ariaLabel", { name: account.name })}
            >
              <span className="text-5xl leading-none" aria-hidden="true">
                {LoginHelpers.avatarOf(account.avatarIndex)}
              </span>
              <span className="flex-1 min-w-0">
                <span className="block text-2xl font-bold text-slate-800 truncate">{account.name}</span>
                <span className="block text-sm text-slate-500 mt-1">{LoginHelpers.formatLastPlayed(lastPlayed)}</span>
              </span>
              <span className="text-indigo-400 text-2xl" aria-hidden="true">▶</span>
            </button>
          </li>
        );
      }

      /**
       * 名前入力に紛れる制御文字・ゼロ幅空白を除去してから trim する (C04-09)。
       * String.prototype.trim() は U+3000 など WhiteSpace カテゴリは除去するが
       * U+200B (ZWSP) / U+200E (LRM) / U+FEFF (BOM) 等は残るため独自に除去。
       * @param {string} s
       * @returns {string}
       */
      function sanitizeAccountName(s) {
        return String(s).replace(/[\u200B-\u200F\u202A-\u202E\u2028\u2029\uFEFF]/g, "").trim();
      }

      /**
       * 新規アカウント作成モーダル。名前 (10 コードポイント以内) とアバターを入力させる。
       * @param {Object} props
       * @param {() => void} props.onCancel
       * @param {(name: string, avatarIndex: number) => void} props.onCreate
       * @param {string[]} props.existingNames - 既存アカウント名 (重複検知用 / C04-03)
       * @param {React.RefObject<Element|null>} props.previousFocusRef - トリガ要素の焦点復帰先 (C05-03)
       */
      function CreateAccountModal({ onCancel, onCreate, existingNames, previousFocusRef }) {
        const [name, setName] = useState("");
        const [avatarIndex, setAvatarIndex] = useState(0);
        const [isComposing, setIsComposing] = useState(false);
        const [isSubmitting, setIsSubmitting] = useState(false);
        const modalRef = useRef(null);

        // フォーカストラップ + 元フォーカス復帰 + Escape 閉じ (C04-06 / C05-02 / C05-03)
        // 共有フック useModalFocusTrap に集約 (HomeScreen の各モーダルと重複回避)
        useModalFocusTrap(modalRef, onCancel, previousFocusRef);

        const trimmed = sanitizeAccountName(name);
        // 絵文字・サロゲートペアの誤カウント回避のためコードポイント数で評価。
        // maxLength={10} 属性は UTF-16 単位なので、ここで再度コードポイント計算 (C04-08 と合わせ二重防御)。
        const charCount = Array.from(trimmed).length;
        const tooLong = charCount > 10;
        const isEmpty = charCount === 0;
        const isDuplicate = !isEmpty && existingNames.indexOf(trimmed) !== -1;
        // IME 変換中は canSubmit を停止し、未確定文字列のまま Enter 確定するのを防ぐ (C04-08)。
        // Enter 連打による重複 submit は isSubmitting ガードで抑止 (C04-15)。
        const canSubmit = !isEmpty && !tooLong && !isDuplicate && !isComposing && !isSubmitting;

        const handleSubmit = (e) => {
          e.preventDefault();
          if (!canSubmit) return;
          setIsSubmitting(true);
          onCreate(trimmed, avatarIndex);
        };

        // エラー表示の優先度: tooLong > isDuplicate > isEmpty
        let hintText = "\u00A0"; // 固定高さ維持用の非改行スペース
        let hintClass = "text-slate-500";
        if (tooLong) {
          hintText = Util.t("login.createModal.tooLong");
          hintClass = "text-rose-600";
        } else if (isDuplicate) {
          hintText = Util.t("login.createModal.duplicate");
          hintClass = "text-rose-600";
        } else if (isEmpty) {
          hintText = Util.t("login.createModal.empty");
        }

        return (
          <div
            ref={modalRef}
            className="fixed inset-0 z-40 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4"
            role="dialog"
            aria-modal="true"
            aria-labelledby="kuku-create-title"
          >
            <form
              onSubmit={handleSubmit}
              className="w-full max-w-md bg-white rounded-3xl shadow-2xl p-6"
            >
              <h2 id="kuku-create-title" className="text-2xl font-bold text-indigo-700 text-center">
                {Util.t("login.createModal.title")}
              </h2>

              <div className="mt-6">
                <label className="block text-base font-bold text-slate-700 mb-2" htmlFor="kuku-name-input">
                  {Util.t("login.createModal.nameLabel")}
                </label>
                <input
                  id="kuku-name-input"
                  type="text"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  onCompositionStart={() => setIsComposing(true)}
                  onCompositionEnd={(e) => {
                    setIsComposing(false);
                    // Chrome/Firefox は compositionend 後に onChange が走るが、
                    // Safari では走らない場合があるため確定値をここで同期反映 (C04-08)。
                    setName(e.target.value);
                  }}
                  maxLength={10}
                  placeholder={Util.t("login.createModal.namePlaceholder")}
                  className="w-full min-h-[48px] px-4 py-3 text-xl border-2 border-slate-300 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100"
                  autoFocus
                  autoComplete="off"
                  inputMode="text"
                />
                <div className="mt-1 flex justify-between items-baseline">
                  {/* エラー系 (tooLong / isDuplicate) は text-base + role="alert" で読み上げ優先。
                      非エラー (空・プレースホルダ) は text-sm のままサイズを抑える (Step 9 UX バランス)。
                      C10-04: 要素は常駐し role 属性のみ切替わるため、NVDA/VoiceOver の一部バージョンで
                      alert イベントが再発火しない。aria-live="assertive" を併用して属性切替時にも
                      読み上げが起きるよう担保する。 */}
                  <span className={(tooLong || isDuplicate ? "text-base font-bold " : "text-sm ") + hintClass}
                        role={tooLong || isDuplicate ? "alert" : undefined}
                        aria-live="assertive">
                    {hintText}
                  </span>
                  <span className="text-sm text-slate-500 tabular-nums">{charCount}/10</span>
                </div>
              </div>

              <fieldset className="mt-4" role="radiogroup" aria-labelledby="kuku-avatar-legend">
                <legend id="kuku-avatar-legend" className="block text-base font-bold text-slate-700 mb-2">
                  {Util.t("login.createModal.avatarLegend")}
                </legend>
                <div className="grid grid-cols-4 gap-2">
                  {LOGIN_AVATARS.map((emoji, i) => (
                    <button
                      type="button"
                      key={i}
                      onClick={() => setAvatarIndex(i)}
                      role="radio"
                      aria-checked={avatarIndex === i}
                      aria-label={Util.t("login.createModal.avatarAriaLabel", { n: i + 1 })}
                      className={
                        avatarIndex === i
                          ? "min-h-[56px] min-w-[48px] text-4xl rounded-xl border-4 border-indigo-500 bg-indigo-50 focus:outline-none focus:ring-4 focus:ring-indigo-300"
                          : "min-h-[56px] min-w-[48px] text-4xl rounded-xl border-2 border-slate-200 bg-white hover:bg-indigo-50 focus:outline-none focus:ring-4 focus:ring-indigo-300"
                      }
                    >
                      <span aria-hidden="true">{emoji}</span>
                    </button>
                  ))}
                </div>
              </fieldset>

              <div className="mt-6 flex gap-3">
                <button
                  type="button"
                  onClick={onCancel}
                  className="flex-1 min-h-[48px] px-4 py-3 bg-slate-200 text-slate-700 font-bold rounded-xl hover:bg-slate-300 focus:outline-none focus:ring-4 focus:ring-slate-300"
                >
                  {Util.t("login.createModal.cancel")}
                </button>
                <button
                  type="submit"
                  disabled={!canSubmit}
                  className={
                    canSubmit
                      ? "flex-1 min-h-[48px] px-4 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-300"
                      : "flex-1 min-h-[48px] px-4 py-3 bg-indigo-200 text-white font-bold rounded-xl cursor-not-allowed"
                  }
                >
                  {Util.t("login.createModal.submit")}
                </button>
              </div>
            </form>
          </div>
        );
      }

      /**
       * ログイン画面。既存アカウント一覧・新規作成モーダル・選択導線を担当する。
       * SPEC.md §2.1 / §4.1 / §5.2 に準拠。
       * accounts / createAccount / login は AppContext 経由で受け取る (Step 4 で context 化)。
       */
      function LoginScreen() {
        const { accounts, createAccount, login } = useContext(AppContext);
        const [showModal, setShowModal] = useState(false);
        // CreateAccountModal に渡す既存名一覧 (C04-03)。accounts の変化に追従する。
        const existingNames = useMemo(() => accounts.map(function (a) { return a.name; }), [accounts]);
        // 新規作成モーダルのトリガ要素フォーカスを事前保存して、閉じたあとに復帰させる (C05-03)
        const createModalPrevFocusRef = useRef(null);

        const handleSelect = (accountId) => {
          // AudioContext の初回 resume は App level の first-gesture フックが担当 (C04-01 / C04-12)。
          // login() 内部で saveCurrentAccountId + setCurrentAccountId。
          // 失敗時のバナー警告は Storage._onStorageError 経由で既に表示されているため遷移は継続 (C04-05)。
          login(accountId);
          // SPEC §4.1「ログイン直後の自動遷移」は replace で。戻るボタンでログイン画面に戻らないようにする (C05-08)。
          window.location.replace("#/home");
        };

        const handleCreate = (name, avatarIndex) => {
          // createAccount は accounts / weights / settings をまとめて永続化 (C04-04)。
          // 個別の save 失敗は _onStorageError 経由でバナー通知されるので、UI 上の遷移は継続する (C04-07)。
          const newAccount = createAccount(name, avatarIndex);
          setShowModal(false);
          // 作成直後に自動で選択状態にして #/home へ
          handleSelect(newAccount.id);
        };

        return (
          <main className="min-h-screen flex flex-col items-center justify-start px-6 py-10">
            <header className="text-center mb-8">
              <div className="text-7xl md:text-8xl leading-none" aria-hidden="true">🐱</div>
              <h1 className="mt-4 text-5xl md:text-6xl font-bold text-indigo-700 tracking-wide">
                {Util.t("app.title")}
              </h1>
              <p className="mt-3 text-lg text-slate-600">{Util.t("login.chooseChild")}</p>
            </header>

            <section className="w-full max-w-3xl">
              {accounts.length === 0 ? (
                <div className="bg-white/70 backdrop-blur rounded-2xl border border-indigo-100 p-6 text-center text-slate-600 text-lg">
                  {Util.t("login.empty.line1")}<br />
                  {Util.t("login.empty.line2")}
